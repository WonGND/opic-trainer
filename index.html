<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>OPIc 영어 재료 창고 · Input Trainer</title>
<meta name="theme-color" id="themeColor" content="#1F6F6B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="OPIc 창고" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231F6F6B'/><text x='32' y='45' font-size='36' text-anchor='middle' fill='white' font-family='Georgia'>A</text></svg>" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231F6F6B'/><text x='32' y='45' font-size='36' text-anchor='middle' fill='white' font-family='Georgia'>A</text></svg>" />
<style>
  /* ============================================================
     [디자인 토큰] 색상·폰트 변수 — 여기만 바꾸면 앱 전체가 바뀝니다.
     영어=세리프, 한국어=산세리프로 시각 구분합니다.
     ============================================================ */
  :root{
    --bg:#FBFAF7; --surface:#FFFFFF; --ink:#1D2433; --ink-soft:#5A6273; --ink-faint:#9AA0AC;
    --line:#E8E4DB; --teal:#1F6F6B; --teal-soft:#E7F0EF; --amber:#DD9626; --amber-soft:#FBF1DE;
    --green:#2E9E6B; --green-soft:#E5F4EC; --red:#D6514C; --red-soft:#FBE9E8;
    --shadow:0 1px 2px rgba(29,36,51,.05), 0 4px 14px rgba(29,36,51,.06);
    --radius:16px;
    --font-ko:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-en:'Iowan Old Style','Palatino Linotype','Palatino','Georgia',serif;
  }
  /* 다크 모드: data-theme="dark" 일 때 변수만 교체 */
  :root[data-theme="dark"]{
    --bg:#13171C; --surface:#1B2026; --ink:#E7EAEE; --ink-soft:#A2ABB5; --ink-faint:#6B7480;
    --line:#2A323B; --teal:#54B9B2; --teal-soft:#15302E; --amber:#E0A23C; --amber-soft:#3A2E16;
    --green:#49BC86; --green-soft:#133024; --red:#E5716C; --red-soft:#341A1A;
    --shadow:0 1px 2px rgba(0,0,0,.45),0 6px 20px rgba(0,0,0,.35);
  }
  :root[data-theme="dark"] .topbar{background:rgba(19,23,28,.9);}
  :root[data-theme="dark"] .nav{background:rgba(27,32,38,.96);}
  /* 다크모드 대비 보정: 어두운 *-soft 배경 위 텍스트를 밝은 테마색으로 */
  :root[data-theme="dark"] .opt.correct,:root[data-theme="dark"] .explain.ok,:root[data-theme="dark"] .model .lab,:root[data-theme="dark"] .wchip.correct{color:var(--green);}
  :root[data-theme="dark"] .opt.wrong,:root[data-theme="dark"] .explain.no,:root[data-theme="dark"] .fb-box.err,:root[data-theme="dark"] .danger,:root[data-theme="dark"] .wchip.wrong{color:var(--red);}
  :root[data-theme="dark"] .explain,:root[data-theme="dark"] .combo-guide,:root[data-theme="dark"] .badge.got .b-desc{color:var(--teal);}
  body{transition:background-color .3s,color .3s;}
  /* 큰 글씨(페이지 확대) — 가로 넘침 없이 전체 비례 확대 */
  :root[data-textsize="lg"]{zoom:1.10;}
  :root[data-textsize="xl"]{zoom:1.22;}
  /* 키보드 포커스 표시(접근성) */
  a:focus-visible,button:focus-visible,[data-action]:focus-visible,input:focus-visible,textarea:focus-visible,.pill:focus-visible{outline:3px solid var(--teal);outline-offset:2px;border-radius:8px;}
  /* 충분한 터치 영역 */
  .btn{min-height:44px;}
  /* 부드러운 전환 애니메이션 */
  @keyframes appIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  #app.anim{animation:appIn .26s ease;}
  @keyframes pop{0%{transform:scale(.96)}55%{transform:scale(1.03)}100%{transform:scale(1)}}
  .opt.correct,.opt.wrong,.quiz-fb.ok,.quiz-fb.no{animation:pop .3s ease;}
  .flash .veil .meaning,.flash .veil .ex{transition:filter .25s,opacity .25s;}
  .card,.pill,.nav-btn,.icon-btn,.btn{transition:background-color .2s,border-color .2s,color .2s,transform .12s;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-ko);line-height:1.55;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .en{font-family:var(--font-en);}

  /* ---- 레이아웃(모바일 우선) ---- */
  .layout{display:flex;flex-direction:column;min-height:100vh;}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(251,250,247,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .topbar-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand-mark{width:30px;height:30px;border-radius:9px;background:var(--teal);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;font-family:var(--font-en);}
  .brand-title{font-size:15px;font-weight:700;letter-spacing:-.2px;}
  .brand-sub{font-size:11px;color:var(--ink-faint);margin-top:-2px;}
  .topics{display:flex;gap:7px;overflow-x:auto;padding:4px 18px 12px;scrollbar-width:none;}
  .topics::-webkit-scrollbar{display:none;}
  .pill{flex:0 0 auto;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);transition:all .15s;white-space:nowrap;}
  .pill.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  .content{flex:1;}
  #app{padding:18px 18px 96px;max-width:760px;margin:0 auto;}

  /* ---- 네비게이션 ---- */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:6px 2px calc(6px + env(safe-area-inset-bottom));}
  .nav-btn{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 1px;color:var(--ink-faint);font-size:10.5px;font-weight:600;border-radius:12px;transition:color .15s;}
  .nav-btn svg{width:22px;height:22px;}
  .nav-btn.on{color:var(--teal);}
  .nav-btn .badge{position:absolute;top:0;left:50%;transform:translate(6px,-2px);background:var(--amber);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 4px;}

  /* ---- 공통 ---- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}
  .section-intro{margin-bottom:16px;}
  .section-intro h2{font-size:20px;font-weight:800;letter-spacing:-.3px;margin:0 0 4px;}
  .section-intro p{margin:0;color:var(--ink-soft);font-size:13.5px;}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;background:var(--teal-soft);color:var(--teal);}
  .chip.lv-초{background:#EAF4EF;color:#2E9E6B;} .chip.lv-중{background:#FBF1DE;color:#C5851B;} .chip.lv-고{background:#FBE9E8;color:#C0413C;}
  .icon-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;border:1px solid var(--line);background:var(--surface);transition:all .15s;}
  .icon-btn svg{width:20px;height:20px;}
  .icon-btn.star.on{background:var(--amber-soft);border-color:#EBCF98;color:var(--amber);}
  .icon-btn.check.on{background:var(--green-soft);border-color:#B5DEC7;color:var(--green);}
  .btn{padding:11px 18px;border-radius:12px;font-weight:700;font-size:14px;background:var(--teal);color:#fff;border:1px solid var(--teal);transition:all .15s;}
  .btn.ghost{background:var(--surface);color:var(--teal);}
  .btn.soft{background:var(--teal-soft);color:var(--teal);border-color:transparent;}
  .btn.red{background:var(--red);border-color:var(--red);color:#fff;}
  .btn.big{padding:14px 22px;font-size:15px;width:100%;}
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.45;pointer-events:none;}

  /* ---- 단어 플래시카드 ---- */
  .flash-wrap{max-width:440px;margin:0 auto;}
  .flash{min-height:300px;display:flex;flex-direction:column;cursor:pointer;position:relative;overflow:hidden;}
  .flash-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;}
  .flash-actions{display:flex;gap:8px;}
  .word{font-size:34px;font-weight:600;letter-spacing:-.5px;margin:14px 0 2px;}
  .pron{color:var(--ink-faint);font-size:14px;font-family:var(--font-en);font-style:italic;}
  .meaning{font-size:18px;font-weight:700;color:var(--teal);margin:16px 0 6px;}
  .ex{border-top:1px dashed var(--line);padding-top:12px;margin-top:6px;}
  .ex-en{font-size:16px;margin-bottom:2px;} .ex-ko{font-size:13.5px;color:var(--ink-soft);}
  .ex + .ex{margin-top:12px;}
  .veil{position:relative;}
  .veil.hidden > *{filter:blur(7px);opacity:.55;user-select:none;}
  .veil .tap-hint{position:absolute;inset:0;display:none;place-items:center;font-size:13px;font-weight:700;color:var(--teal);background:rgba(231,240,239,.35);border-radius:10px;}
  .veil.hidden .tap-hint{display:grid;}
  .flash-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;}
  .flash-pos{font-size:13px;font-weight:700;color:var(--ink-soft);font-family:var(--font-en);}
  .navbtn{width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;box-shadow:var(--shadow);}
  .navbtn svg{width:22px;height:22px;}
  .toolbar{display:flex;justify-content:center;margin-bottom:14px;}

  /* ---- 문장·표현 ---- */
  .pat-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .pat-expr{font-size:20px;font-weight:600;letter-spacing:-.3px;}
  .pat-mean{color:var(--teal);font-weight:700;font-size:14px;margin:3px 0 12px;}
  .pat-ex{background:var(--bg);border-radius:12px;padding:12px 14px;}
  .pat-ex .ex-en{font-size:15.5px;}
  .pat-blank{margin-top:12px;font-size:14px;color:var(--ink-soft);}
  .pat-blank b{color:var(--ink);font-family:var(--font-en);font-weight:600;}
  .pat-actions{display:flex;gap:8px;}

  /* ---- 독해 ---- */
  .read-title{font-size:19px;font-weight:800;margin:2px 0 10px;}
  .passage{font-size:16.5px;line-height:1.85;}
  .passage .gloss{color:var(--teal);font-weight:600;border-bottom:1.5px dotted var(--teal);cursor:pointer;}
  .passage .gloss .ko{font-family:var(--font-ko);font-size:13px;color:var(--ink-soft);font-weight:600;}
  .read-tools{display:flex;gap:8px;margin:14px 0 4px;flex-wrap:wrap;}
  .passage-ko{margin-top:12px;padding:13px 15px;background:var(--bg);border-radius:12px;font-size:14.5px;color:var(--ink-soft);line-height:1.8;}
  .q{border-top:1px solid var(--line);padding-top:16px;margin-top:18px;}
  .q-text{font-weight:700;font-size:15px;margin-bottom:10px;}
  .q-text .qn{color:var(--teal);font-family:var(--font-en);margin-right:6px;}
  .opt{display:block;width:100%;text-align:left;padding:12px 14px;border-radius:11px;border:1px solid var(--line);background:var(--surface);font-size:14.5px;margin-bottom:8px;transition:all .12s;}
  .opt .en{font-size:14.5px;}
  .opt.correct{background:var(--green-soft);border-color:#A9D9C0;color:#1f7a52;font-weight:600;}
  .opt.wrong{background:var(--red-soft);border-color:#EDB6B3;color:#b33d39;font-weight:600;}
  .opt.correct,.opt.wrong{position:relative;padding-right:40px;}
  .opt.correct::after{content:"✓";position:absolute;right:14px;top:50%;transform:translateY(-50%);font-weight:800;font-size:16px;color:var(--green);}
  .opt.wrong::after{content:"✗";position:absolute;right:14px;top:50%;transform:translateY(-50%);font-weight:800;font-size:16px;color:var(--red);}
  .opt.locked{pointer-events:none;}
  .explain{margin-top:6px;padding:11px 14px;border-radius:10px;background:var(--teal-soft);font-size:13.5px;color:#155f5b;}
  .explain.ok{background:var(--green-soft);color:#1f7a52;} .explain.no{background:var(--red-soft);color:#b33d39;}

  /* ---- 작문 ---- */
  .w-type{font-size:11.5px;font-weight:800;color:var(--ink-faint);letter-spacing:.4px;text-transform:uppercase;}
  .w-prompt{font-size:16px;font-weight:700;margin:6px 0 14px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;min-height:46px;}
  .chips.answer-area{background:var(--bg);border:1.5px dashed var(--line);border-radius:12px;padding:10px;margin-bottom:10px;align-content:flex-start;}
  .wchip{padding:8px 13px;border-radius:10px;background:var(--surface);border:1px solid var(--line);font-family:var(--font-en);font-size:15px;box-shadow:var(--shadow);}
  .wchip.in{background:var(--teal-soft);border-color:transparent;color:var(--teal);font-weight:600;}
  .wchip.correct{background:var(--green-soft);border-color:#A9D9C0;color:#1f7a52;font-weight:700;}
  .wchip.wrong{background:var(--red-soft);border-color:#EDB6B3;color:#b33d39;font-weight:700;}
  .wchip.correct::after{content:" ✓";font-weight:800;}
  .wchip.wrong::after{content:" ✗";font-weight:800;}
  .placeholder{color:var(--ink-faint);font-size:13px;align-self:center;padding:4px;}
  .w-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .opt-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
  .blank-sentence{font-size:16px;margin-bottom:12px;}
  .blank-sentence .slot{display:inline-block;min-width:64px;border-bottom:2px solid var(--teal);color:var(--teal);font-weight:700;text-align:center;font-family:var(--font-en);}
  textarea.w-input{width:100%;min-height:80px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;font-family:var(--font-en);resize:vertical;background:var(--surface);color:var(--ink);}
  textarea.w-input:focus{outline:2px solid var(--teal-soft);border-color:var(--teal);}
  .model{margin-top:12px;padding:13px 15px;border-radius:12px;background:var(--green-soft);}
  .model .lab{font-size:11.5px;font-weight:800;color:#1f7a52;letter-spacing:.3px;}
  .model .ans{font-size:16px;margin-top:3px;}
  .model .hint{font-size:13px;color:var(--ink-soft);margin-top:8px;}
  .w-result{margin-top:12px;font-weight:700;font-size:14px;}
  .w-result.ok{color:var(--green);} .w-result.no{color:var(--red);}
  /* AI 첨삭 */
  .fb-box{margin-top:12px;padding:13px 15px;border-radius:12px;background:var(--teal-soft);border:1px solid transparent;}
  .fb-box.loading{color:var(--teal);font-weight:600;}
  .fb-box.err{background:var(--red-soft);color:#b33d39;font-weight:600;}
  .fb-head{font-size:12px;font-weight:800;color:var(--teal);letter-spacing:.3px;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
  .fb-score{background:var(--teal);color:#fff;border-radius:999px;padding:1px 9px;font-size:11.5px;}
  .fb-row{display:flex;gap:8px;margin-bottom:6px;}
  .fb-lab{flex:0 0 auto;font-size:11.5px;font-weight:700;color:var(--ink-faint);width:34px;padding-top:2px;}
  .fb-corr{font-size:15.5px;color:var(--ink);}
  .fb-comment{font-size:13.5px;color:var(--ink-soft);line-height:1.7;border-top:1px dashed var(--line);padding-top:8px;margin-top:4px;}
  .fb-note{margin-top:10px;font-size:12px;color:var(--ink-faint);line-height:1.6;}
  .setting-input{flex:1;min-width:180px;padding:10px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;background:var(--surface);color:var(--ink);font-family:var(--font-en);}
  .setting-input:focus{outline:2px solid var(--teal-soft);border-color:var(--teal);}
  /* 콤보 */
  .combo-steps{display:flex;gap:8px;margin-bottom:16px;}
  .combo-steps button{flex:1;padding:10px 4px;border-radius:12px;border:1px solid var(--line);background:var(--surface);font-size:12.5px;font-weight:700;color:var(--ink-soft);line-height:1.3;}
  .combo-steps button.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  .combo-steps .s-num{font-family:var(--font-en);font-size:16px;display:block;margin-bottom:2px;}
  .combo-q{font-size:18px;font-weight:600;line-height:1.5;margin:4px 0 4px;}
  .combo-q-ko{font-size:13.5px;color:var(--ink-soft);margin-bottom:12px;}
  .combo-guide{font-size:12.5px;color:#155f5b;background:var(--teal-soft);border-radius:10px;padding:9px 12px;margin-bottom:14px;line-height:1.6;}
  /* 모의 인터뷰 */
  .mock-guide{font-size:12.5px;color:var(--ink-soft);margin:0 0 16px;line-height:1.6;}
  .mock-q{margin-bottom:16px;}
  .mock-q-label{font-size:14px;font-weight:700;color:var(--ink);line-height:1.45;}
  .mock-q-ko{font-size:12.5px;color:var(--ink-soft);margin:3px 0 7px;}
  /* 데일리 골 */
  .goal-card.met{border-color:#A9D9C0;background:var(--green-soft);animation:goalPulse .5s ease;}
  @keyframes goalPulse{0%{transform:scale(1)}50%{transform:scale(1.015)}100%{transform:scale(1)}}
  .goal-opts{display:flex;gap:6px;flex-wrap:wrap;}
  .goal-opts button{padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:13.5px;font-weight:700;color:var(--ink-soft);}
  .goal-opts button.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  /* 오늘의 학습 추천 */
  .today-card{padding:18px;}
  .today-h{font-size:12.5px;font-weight:800;color:var(--teal);letter-spacing:.4px;text-transform:uppercase;}
  .today-sub{font-size:14.5px;color:var(--ink-soft);margin:5px 0 14px;line-height:1.55;}
  /* XP / 레벨 */
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .lv-badge{font-size:12.5px;font-weight:800;color:var(--teal);background:var(--teal-soft);border-radius:999px;padding:4px 11px;font-family:var(--font-en);white-space:nowrap;}
  .xp-card{padding:14px 16px;}
  .xp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .xp-lv{font-size:17px;font-weight:800;color:var(--ink);font-family:var(--font-en);}
  .xp-num{font-size:12.5px;color:var(--ink-faint);font-family:var(--font-en);}
  .xp-bar{height:10px;border-radius:999px;background:var(--bg);overflow:hidden;}
  .xp-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--teal),#3fd0bd);border-radius:999px;transition:width .5s ease;}
  .xp-sub{font-size:11.5px;color:var(--ink-faint);margin-top:7px;}
  /* 레벨업 토스트 */
  .toast-host{position:fixed;left:0;right:0;top:14px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:80;pointer-events:none;}
  .toast{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);box-shadow:0 10px 28px rgba(0,0,0,.16);border-radius:14px;padding:12px 14px 12px 18px;max-width:92%;pointer-events:auto;animation:toastIn .35s ease;}
  .t-body{flex:1;}
  .t-close{flex:0 0 auto;border:none;background:var(--teal);color:#fff;font-weight:700;font-size:13px;border-radius:9px;padding:7px 14px;cursor:pointer;}
  .t-close:hover{filter:brightness(1.05);}
  .toast.out{animation:toastOut .45s ease forwards;}
  .t-emoji{font-size:26px;}
  .t-title{font-weight:800;font-size:15px;color:var(--ink);}

  reading:[
    {id:"r1",topic:"selfintro",title:"Meet Jiwon",level:"중",
      passage_en:"Hi, my name is Jiwon, and I'm an office worker in Seoul. I work for a small company that [[designs|디자인하다]] mobile apps. In my free time, I enjoy playing the piano and going to the gym. People often say I'm [[calm|차분한]] and easy to talk to, which helps me work well in a team. On weekends, I usually meet my friends for coffee or visit my parents. I'm not a big traveler, but I hope to visit Europe someday. I'm always trying to learn something new, and right now I'm studying English to [[improve|향상시키다]] my speaking skills.",
      passage_ko:"안녕하세요, 제 이름은 지원이고 서울에서 일하는 직장인이에요. 모바일 앱을 디자인하는 작은 회사에 다녀요. 여가 시간에는 피아노 치는 것과 헬스장 가는 것을 좋아해요. 사람들은 제가 차분하고 대화하기 편하다고 자주 말하는데, 덕분에 팀에서 잘 어울려 일해요. 주말에는 보통 친구들과 커피를 마시거나 부모님을 뵈러 가요. 여행을 즐기는 편은 아니지만 언젠가 유럽에 가보고 싶어요. 저는 늘 새로운 것을 배우려 하고, 지금은 말하기 실력을 향상시키려고 영어를 공부하고 있어요.",
      questions:[
        {q:"What does Jiwon do for a living?",options:["A piano teacher","An office worker","A gym trainer","A travel guide"],answer:1,explanation:"지원은 서울의 한 회사에 다니는 직장인이라고 했습니다."},
        {q:"What does Jiwon do in her free time?",options:["Plays the piano and exercises","Travels abroad often","Designs apps at home","Teaches English"],answer:0,explanation:"여가 시간에 피아노를 치고 헬스장에 간다고 했습니다."},
        {q:"Why is Jiwon studying English?",options:["To get a new job","To travel to Europe","To improve her speaking","To teach others"],answer:2,explanation:"말하기 실력을 향상시키기 위해 영어를 공부한다고 했습니다."}]},

    {id:"r2",topic:"hobby",title:"A Weekend Hobby",level:"중",
      passage_en:"Minho has loved hiking ever since he was a college student. Almost every weekend, he wakes up early and takes a bus to a nearby mountain. He says hiking is the best way for him to [[relieve|해소하다]] stress and clear his mind. The fresh air and quiet [[trails|등산로]] help him forget about work for a few hours. Sometimes he goes alone, but he [[prefers|더 좋아하다]] hiking with a small group of friends. After reaching the top, they usually share snacks and enjoy the view together. For Minho, hiking is not just exercise — it's a chance to slow down and feel grateful.",
      passage_ko:"민호는 대학생 때부터 등산을 좋아해 왔어요. 거의 매주 주말에 일찍 일어나 근처 산으로 가는 버스를 타요. 그는 등산이 스트레스를 해소하고 마음을 비우는 가장 좋은 방법이라고 말해요. 신선한 공기와 조용한 등산로는 몇 시간 동안 일을 잊게 해줘요. 가끔은 혼자 가지만, 그는 소규모 친구들과 함께 등산하는 것을 더 좋아해요. 정상에 오른 뒤에는 보통 간식을 나눠 먹고 함께 경치를 즐겨요. 민호에게 등산은 단순한 운동이 아니라 잠시 속도를 늦추고 감사함을 느끼는 시간이에요.",
      questions:[
        {q:"How often does Minho go hiking?",options:["Once a month","Almost every weekend","Only in summer","Every morning"],answer:1,explanation:"거의 매주 주말에 등산을 간다고 했습니다."},
        {q:"Why does Minho enjoy hiking?",options:["To make money","To relieve stress","To lose weight fast","To meet strangers"],answer:1,explanation:"스트레스를 해소하고 마음을 비우기 위해 등산을 즐깁니다."},
        {q:"What do they do after reaching the top?",options:["Go home right away","Share snacks and enjoy the view","Start running","Take a long nap"],answer:1,explanation:"정상에서 간식을 나눠 먹고 경치를 즐긴다고 했습니다."}]},

    {id:"r3",topic:"travel",title:"A Trip to Busan",level:"중",
      passage_en:"Last summer, Sora took a short trip to Busan with two of her closest friends. They [[booked|예약했다]] a small guesthouse near Haeundae Beach a month in advance. During the day, they went [[sightseeing|관광]], tried fresh seafood, and walked along the coast. In the evening, they sat by the sea and talked for hours. The weather was perfect, and the city felt relaxed and friendly. Although the trip was only three days, it gave Sora a chance to rest and [[recharge|재충전하다]]. She still remembers it as one of the most enjoyable trips she has ever taken, and she hopes to go back again soon.",
      passage_ko:"지난여름, 소라는 가장 친한 친구 두 명과 함께 부산으로 짧은 여행을 다녀왔어요. 그들은 한 달 전에 해운대 해변 근처의 작은 게스트하우스를 예약했어요. 낮에는 관광을 하고, 신선한 해산물을 먹고, 해안을 따라 걸었어요. 저녁에는 바닷가에 앉아 몇 시간 동안 이야기를 나눴어요. 날씨는 완벽했고, 도시는 여유롭고 친근하게 느껴졌어요. 여행은 3일뿐이었지만 소라에게 쉬고 재충전할 기회를 주었어요. 그녀는 지금도 그 여행을 가장 즐거웠던 여행 중 하나로 기억하며, 곧 다시 가고 싶어 해요.",
      questions:[
        {q:"Who did Sora travel with?",options:["Her family","Two close friends","Her coworkers","No one"],answer:1,explanation:"가장 친한 친구 두 명과 함께 여행했습니다."},
        {q:"Where did they stay?",options:["A luxury hotel","A guesthouse near the beach","A friend's house","A campsite"],answer:1,explanation:"해운대 해변 근처 게스트하우스를 예약해 머물렀습니다."},
        {q:"How long was the trip?",options:["One day","Three days","One week","One month"],answer:1,explanation:"여행 기간은 3일이었다고 했습니다."}]},

    {id:"r4",topic:"work",title:"A Day at the Office",level:"중",
      passage_en:"Daniel works as an engineer at a company that makes car parts. He usually arrives at the office around nine and starts by checking his email. Most of his day is spent testing products and writing reports. He often works [[closely|긴밀하게]] with his colleagues to solve problems quickly. Although the [[deadlines|마감 기한]] can be stressful, he enjoys the feeling of finishing a difficult task. During lunch, he likes to take a short walk to [[clear his head|머리를 식히다]]. After work, he sometimes stays a little longer to prepare for the next day. Daniel finds his job [[challenging|도전적인]], but he is proud of what he does.",
      passage_ko:"다니엘은 자동차 부품을 만드는 회사에서 엔지니어로 일해요. 보통 아홉 시쯤 사무실에 도착해 이메일 확인부터 시작해요. 하루 대부분을 제품을 테스트하고 보고서를 쓰는 데 보내요. 문제를 빠르게 해결하려고 동료들과 긴밀하게 일하는 경우가 많아요. 마감 기한이 스트레스가 될 수 있지만, 그는 어려운 일을 끝냈을 때의 기분을 좋아해요. 점심시간에는 머리를 식히려고 잠깐 산책하는 걸 좋아해요. 퇴근 후에는 다음 날을 준비하느라 가끔 조금 더 남기도 해요. 다니엘은 자신의 일이 도전적이라고 느끼지만, 자기 일에 자부심을 가지고 있어요.",
      questions:[
        {q:"What is Daniel's job?",options:["A car salesman","An engineer","A delivery driver","A manager"],answer:1,explanation:"자동차 부품 회사의 엔지니어라고 했습니다."},
        {q:"What does Daniel do during lunch?",options:["Takes a short walk","Sleeps at his desk","Goes shopping","Visits clients"],answer:0,explanation:"점심시간에 머리를 식히려고 잠깐 산책을 합니다."},
        {q:"How does Daniel feel about his job?",options:["Bored and tired","Challenged but proud","Angry and stressed","Confused"],answer:1,explanation:"도전적이라고 느끼지만 자부심을 가지고 있다고 했습니다."}]},

    {id:"r5",topic:"fitness",title:"Staying Active",level:"중",
      passage_en:"Hyemin started going to the gym about a year ago to [[stay in shape|건강을 유지하다]]. At first, it was hard to wake up early, but now exercise is part of her daily routine. She usually does some [[stretching|스트레칭]] before lifting light weights. On weekends, she prefers to go for a run in the park near her house. She says working out gives her more energy and helps her sleep better at night. Although she is not training for anything special, she feels [[proud|자랑스러운]] of how far she has come. Her goal is simply to stay healthy and feel good.",
      passage_ko:"혜민은 약 1년 전에 건강을 유지하려고 헬스장에 다니기 시작했어요. 처음엔 일찍 일어나는 게 힘들었지만, 이제 운동은 그녀의 일상 중 하나예요. 보통 가벼운 웨이트를 들기 전에 스트레칭을 해요. 주말에는 집 근처 공원에서 달리는 걸 더 좋아해요. 그녀는 운동이 에너지를 더 주고 밤에 잠을 더 잘 자게 해준다고 말해요. 특별히 무언가를 위해 훈련하는 건 아니지만, 지금까지 해온 것이 자랑스럽다고 느껴요. 그녀의 목표는 그저 건강을 유지하고 기분 좋게 지내는 거예요.",
      questions:[
        {q:"Why did Hyemin start going to the gym?",options:["To win a competition","To stay in shape","To make friends","To become a trainer"],answer:1,explanation:"건강을 유지하려고 헬스장에 다니기 시작했다고 했습니다."},
        {q:"What does she do on weekends?",options:["Lifts heavy weights","Goes for a run in the park","Rests all day","Swims at the gym"],answer:1,explanation:"주말에는 집 근처 공원에서 달리는 것을 더 좋아한다고 했습니다."},
        {q:"How does working out affect her?",options:["It makes her tired","It gives her more energy","It costs too much","It hurts her back"],answer:1,explanation:"운동이 에너지를 더 주고 잠을 더 잘 자게 해준다고 했습니다."}]},

    {id:"r6",topic:"restaurant",title:"My Favorite Cafe",level:"중",
      passage_en:"There is a small cafe near my office that I visit almost every day. The staff are friendly, and they already know my [[usual|늘 먹는]] order. I always get an iced americano and sometimes a slice of cheesecake. What I like most is the quiet [[atmosphere|분위기]], which makes it a great place to read or work. On busy days, I just grab my coffee to go, but when I have time, I sit by the window and relax. The prices are reasonable, and the coffee is always fresh. I would definitely [[recommend|추천하다]] this place to anyone who loves a calm cafe.",
      passage_ko:"제 사무실 근처에 거의 매일 가는 작은 카페가 있어요. 직원들이 친절하고, 제가 늘 시키는 주문을 이미 알아요. 저는 항상 아이스 아메리카노를 마시고 가끔 치즈케이크 한 조각을 먹어요. 가장 마음에 드는 건 조용한 분위기인데, 책을 읽거나 일하기에 아주 좋은 곳이에요. 바쁜 날엔 커피만 테이크아웃하지만, 시간이 있을 땐 창가에 앉아 쉬어요. 가격도 합리적이고 커피는 늘 신선해요. 차분한 카페를 좋아하는 사람이라면 누구에게나 이곳을 꼭 추천하고 싶어요.",
      questions:[
        {q:"How often does the writer visit the cafe?",options:["Once a week","Almost every day","Only on weekends","Rarely"],answer:1,explanation:"사무실 근처라 거의 매일 간다고 했습니다."},
        {q:"What does the writer like most about the cafe?",options:["The loud music","The quiet atmosphere","The large size","The free parking"],answer:1,explanation:"가장 좋아하는 점은 조용한 분위기라고 했습니다."},
        {q:"What does the writer usually order?",options:["An iced americano","Green tea","A hamburger","Orange juice"],answer:0,explanation:"항상 아이스 아메리카노를 마신다고 했습니다."}]},

    {id:"r7",topic:"home",title:"My Studio Apartment",level:"중",
      passage_en:"I live alone in a small studio apartment in the city. It is not very big, but it has everything I need. My favorite part is the large window, which lets in plenty of [[sunlight|햇빛]] during the day. I keep my place simple and tidy, with only a bed, a desk, and a few plants. The [[neighborhood|동네]] is quiet, and there is a convenience store right downstairs. The subway station is only five minutes away, which makes commuting very easy. Although the apartment is small, it feels [[cozy|아늑한]] and comfortable. For now, it is the perfect home for me.",
      passage_ko:"저는 도시의 작은 원룸에서 혼자 살아요. 아주 크진 않지만 필요한 건 다 있어요. 가장 마음에 드는 부분은 큰 창문인데, 낮에 햇빛이 많이 들어와요. 침대, 책상, 화분 몇 개만 두고 집을 단순하고 깔끔하게 유지해요. 동네는 조용하고, 바로 아래층에 편의점이 있어요. 지하철역도 5분 거리라 출퇴근이 아주 편해요. 집은 작지만 아늑하고 편안하게 느껴져요. 지금으로선 저에게 딱 맞는 집이에요.",
      questions:[
        {q:"What type of home does the writer live in?",options:["A large house","A small studio apartment","A dormitory","A shared house"],answer:1,explanation:"도시의 작은 원룸에서 혼자 산다고 했습니다."},
        {q:"What is the writer's favorite part of the home?",options:["The large window","The kitchen","The balcony","The garage"],answer:0,explanation:"가장 좋아하는 부분은 큰 창문이라고 했습니다."},
        {q:"Why is commuting easy?",options:["The subway is close","He has a car","He works from home","The bus is free"],answer:0,explanation:"지하철역이 5분 거리라 출퇴근이 편하다고 했습니다."}]},

    {id:"r8",topic:"weather",title:"Four Seasons in Korea",level:"중",
      passage_en:"Korea has four distinct seasons, and each one feels completely different. Spring is mild and full of flowers, so many people enjoy walking outside. Summer is hot and very [[humid|습한]], which can make the days feel longer than they are. In autumn, the weather becomes cool and the leaves turn beautiful colors. Winter is cold and dry, and it sometimes [[snows|눈이 오다]] heavily. My favorite season is autumn because I love the clear sky and comfortable temperature. Before I go out, I always check the [[forecast|예보]] so I know what to wear. The changing seasons are one of the things I love most about living here.",
      passage_ko:"한국에는 뚜렷한 사계절이 있고, 각 계절은 완전히 다르게 느껴져요. 봄은 온화하고 꽃이 가득해서 많은 사람들이 밖에서 산책하는 걸 즐겨요. 여름은 덥고 아주 습해서 하루가 실제보다 길게 느껴질 수 있어요. 가을에는 날씨가 선선해지고 잎이 아름다운 색으로 물들어요. 겨울은 춥고 건조하며 가끔 눈이 많이 내려요. 제가 가장 좋아하는 계절은 가을인데, 맑은 하늘과 쾌적한 기온을 좋아하기 때문이에요. 외출 전에는 무엇을 입을지 알려고 항상 일기예보를 확인해요. 변화하는 계절은 이곳에 사는 것에서 제가 가장 좋아하는 것 중 하나예요.",
      questions:[
        {q:"How many seasons does Korea have?",options:["Two","Three","Four","Five"],answer:2,explanation:"한국에는 뚜렷한 사계절이 있다고 했습니다."},
        {q:"What is the summer weather like?",options:["Cold and dry","Hot and humid","Cool and clear","Mild and windy"],answer:1,explanation:"여름은 덥고 습하다고 했습니다."},
        {q:"Which season does the writer like most?",options:["Spring","Summer","Autumn","Winter"],answer:2,explanation:"맑은 하늘과 쾌적한 기온 때문에 가을을 가장 좋아한다고 했습니다."}]},

    {id:"r9",topic:"recycling",title:"Recycling in Korea",level:"중",
      passage_en:"In Korea, [[recycling|재활용]] is part of everyday life. Each household has to [[separate|분리하다]] its trash into different types, such as paper, plastic, glass, and food waste. There are special bags for general garbage, and people usually take out their recycling on certain days. At first, the rules felt complicated to me, but now I am used to them. I think these rules are helpful because they keep the streets clean and protect the environment. To [[reduce|줄이다]] waste, I also try to use fewer plastic products and carry my own cup. Small habits like these can make a real difference over time.",
      passage_ko:"한국에서는 재활용이 일상생활의 일부예요. 각 가정은 종이, 플라스틱, 유리, 음식물 쓰레기 같은 여러 종류로 쓰레기를 분리해야 해요. 일반 쓰레기용 전용 봉투가 있고, 사람들은 보통 정해진 날에 재활용품을 내놓아요. 처음에는 규칙이 복잡하게 느껴졌지만 지금은 익숙해졌어요. 이런 규칙은 거리를 깨끗하게 유지하고 환경을 보호하기 때문에 도움이 된다고 생각해요. 쓰레기를 줄이기 위해 저는 플라스틱 제품을 덜 쓰고 개인 컵을 가지고 다니려고 해요. 이런 작은 습관들이 시간이 지나면 정말 큰 차이를 만들 수 있어요.",
      questions:[
        {q:"What do households in Korea have to do with their trash?",options:["Burn it","Separate it into types","Bury it","Sell it"],answer:1,explanation:"가정은 쓰레기를 종류별로 분리해야 한다고 했습니다."},
        {q:"How did the writer feel about the rules at first?",options:["Simple","Complicated","Boring","Unfair"],answer:1,explanation:"처음에는 규칙이 복잡하게 느껴졌다고 했습니다."},
        {q:"What does the writer do to reduce waste?",options:["Uses a personal cup","Buys more plastic","Throws everything away","Stops shopping"],answer:0,explanation:"플라스틱을 덜 쓰고 개인 컵을 가지고 다닌다고 했습니다."}]},

    {id:"r10",topic:"tech",title:"Life with Smartphones",level:"중",
      passage_en:"Like most people, I use my smartphone almost all day. In the morning, I check the news and reply to messages before I even get out of bed. My phone is the one [[device|기기]] I really cannot live without. I use it to [[connect|접속하다]] to the internet, take photos, listen to music, and find my way around the city. It has made daily life much more [[convenient|편리한]], but I also try not to depend on it too much. Sometimes I turn it off for a few hours to rest my eyes and focus on other things. Technology is helpful, but balance is important.",
      passage_ko:"대부분의 사람들처럼 저도 하루 종일 스마트폰을 써요. 아침에는 침대에서 일어나기도 전에 뉴스를 확인하고 메시지에 답해요. 제 폰은 정말 없이는 못 사는 유일한 기기예요. 인터넷에 접속하고, 사진을 찍고, 음악을 듣고, 도시에서 길을 찾는 데 써요. 덕분에 일상이 훨씬 편리해졌지만, 너무 의존하지 않으려고도 해요. 가끔은 몇 시간 꺼두고 눈을 쉬게 하고 다른 일에 집중해요. 기술은 유용하지만 균형이 중요해요.",
      questions:[
        {q:"When does the writer first use the phone?",options:["After breakfast","Before getting out of bed","At work","Late at night"],answer:1,explanation:"아침에 침대에서 일어나기도 전에 폰을 쓴다고 했습니다."},
        {q:"What does the writer do to take a break from the phone?",options:["Turns it off for a few hours","Gives it away","Buys a new one","Uses it more"],answer:0,explanation:"가끔 몇 시간 꺼두고 눈을 쉬게 한다고 했습니다."},
        {q:"What is the writer's main point?",options:["Technology is useless","Balance is important","Phones are cheap","He hates technology"],answer:1,explanation:"기술은 유용하지만 균형이 중요하다고 했습니다."}]},

    {id:"r11",topic:"bank",title:"Banking These Days",level:"중",
      passage_en:"These days, I rarely visit a bank in person. Most of my banking is done on my phone, which saves a lot of time. I can check my [[account|계좌]], pay bills, and [[transfer|송금하다]] money in just a few minutes. When I need cash, I simply [[withdraw|인출하다]] it from an ATM near my house. I still remember waiting in long lines at the bank when I was younger. Now, almost everything can be done online, even opening a new account. Mobile banking is convenient, but I am always careful to keep my password safe.",
      passage_ko:"요즘 저는 은행에 직접 가는 일이 거의 없어요. 대부분의 은행 업무를 폰으로 처리하는데, 시간이 많이 절약돼요. 계좌를 확인하고, 공과금을 내고, 송금하는 걸 몇 분 만에 할 수 있어요. 현금이 필요하면 집 근처 ATM에서 그냥 인출해요. 어릴 때 은행에서 긴 줄을 서서 기다리던 게 아직 기억나요. 이제는 새 계좌를 만드는 것까지 거의 모든 걸 온라인으로 할 수 있어요. 모바일 뱅킹은 편리하지만, 비밀번호를 안전하게 지키려고 늘 조심해요.",
      questions:[
        {q:"How does the writer usually do banking?",options:["By visiting the bank","On the phone","By mail","Through a friend"],answer:1,explanation:"대부분의 은행 업무를 폰으로 한다고 했습니다."},
        {q:"Where does the writer get cash?",options:["From an ATM","From a teller","From a friend","From work"],answer:0,explanation:"집 근처 ATM에서 인출한다고 했습니다."},
        {q:"What is the writer careful about?",options:["Keeping the password safe","Saving receipts","Visiting often","Carrying cash"],answer:0,explanation:"비밀번호를 안전하게 지키려고 조심한다고 했습니다."}]},

    {id:"r12",topic:"fashion",title:"My Style",level:"중",
      passage_en:"I would describe my style as simple and practical. Most days, I wear [[comfortable|편안한]] clothes like jeans and a plain shirt. I don't spend much time choosing an [[outfit|옷차림]], but I always make sure it is clean and neat. I am not someone who follows every [[trend|유행]]; instead, I buy clothes that last a long time. For special occasions, of course, I dress up a little more. I believe that good clothes should make you feel confident and comfortable at the same time. In the end, comfort matters more to me than looking fashionable.",
      passage_ko:"제 스타일은 단순하고 실용적이라고 표현하고 싶어요. 대부분의 날에는 청바지와 무난한 셔츠 같은 편안한 옷을 입어요. 옷차림을 고르는 데 시간을 많이 쓰진 않지만, 항상 깨끗하고 단정한지 확인해요. 저는 모든 유행을 따르는 사람은 아니고, 대신 오래 입을 수 있는 옷을 사요. 물론 특별한 날에는 조금 더 차려입어요. 좋은 옷은 자신감과 편안함을 동시에 느끼게 해줘야 한다고 생각해요. 결국 저에게는 멋지게 보이는 것보다 편안함이 더 중요해요.",
      questions:[
        {q:"How does the writer describe their style?",options:["Simple and practical","Bright and bold","Formal and expensive","Always trendy"],answer:0,explanation:"단순하고 실용적이라고 표현했습니다."},
        {q:"Does the writer follow every trend?",options:["Yes, always","No, not every trend","Only in summer","Only at work"],answer:1,explanation:"모든 유행을 따르는 사람은 아니라고 했습니다."},
        {q:"What matters most to the writer?",options:["Comfort","Price","Brand","Color"],answer:0,explanation:"멋지게 보이는 것보다 편안함이 더 중요하다고 했습니다."}]},

    {id:"r13",topic:"geography",title:"The Land of Korea",level:"중",
      passage_en:"Korea is a country located on a [[peninsula|반도]] in East Asia. About seventy percent of its land is covered with [[mountains|산]], so beautiful hiking trails can be found almost everywhere. The country is [[surrounded|둘러싸인]] by the sea on three sides, which means fresh seafood is easy to find. There are also many rivers that flow through the cities and provide water for farming. Because of its clear four seasons, the scenery changes greatly throughout the year. I feel lucky to live in a country with such varied and beautiful nature. Every region has something special to offer.",
      passage_ko:"한국은 동아시아의 반도에 위치한 나라예요. 국토의 약 70%가 산으로 덮여 있어서, 아름다운 등산로를 거의 어디서나 찾을 수 있어요. 나라가 삼면이 바다로 둘러싸여 있어 신선한 해산물을 쉽게 구할 수 있어요. 또한 도시를 가로지르며 흐르고 농사에 물을 공급하는 강도 많아요. 뚜렷한 사계절 덕분에 경치가 일 년 내내 크게 바뀌어요. 이렇게 다양하고 아름다운 자연을 가진 나라에 사는 게 행운이라고 느껴요. 모든 지역이 저마다 특별한 것을 지니고 있어요.",
      questions:[
        {q:"Where is Korea located?",options:["On an island","On a peninsula","In the desert","Inland only"],answer:1,explanation:"동아시아의 반도에 위치해 있다고 했습니다."},
        {q:"About how much of Korea is mountains?",options:["About 30%","About 50%","About 70%","About 90%"],answer:2,explanation:"국토의 약 70%가 산으로 덮여 있다고 했습니다."},
        {q:"Why is fresh seafood easy to find?",options:["It is surrounded by sea on three sides","There are many farms","It is all imported","There are many lakes"],answer:0,explanation:"삼면이 바다로 둘러싸여 있기 때문이라고 했습니다."}]},

/* ---------------- 2) store ---------------- */
const store={
  read(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}},
  write(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
  clear(){try{["opic_favorites","opic_memorized","opic_settings","opic_srs","opic_progress","opic_stats","opic_drafts","opic_feedback","opic_xp","opic_badges"].forEach(k=>localStorage.removeItem(k));}catch(e){}}
};
let favorites=new Set(store.read("opic_favorites",[]));   // "vocab:v1" 형태
let memorized=new Set(store.read("opic_memorized",[]));   // 암기/익힘 완료
let srs=store.read("opic_srs",{});                        // 간격 반복 상태 {fid:{box,due}}
let progress=store.read("opic_progress",{reading:{},writing:{}}); // 독해/작문 풀이 기록
if(!progress.reading)progress.reading={}; if(!progress.writing)progress.writing={};
let stats=store.read("opic_stats",{streak:0,lastDay:null,days:{}}); // 스트릭/일별 활동
let drafts=store.read("opic_drafts",{});                  // 한→영 작문 답안 초안 {wid:text} — 밖에서 써도 보존
let feedback=store.read("opic_feedback",{});              // AI 첨삭 결과 {wid:{corrected,comment,score,ts}}
const saveFav=()=>store.write("opic_favorites",[...favorites]);
const saveMem=()=>store.write("opic_memorized",[...memorized]);
const saveSrs=()=>store.write("opic_srs",srs);
const saveProgress=()=>store.write("opic_progress",progress);
const saveStats=()=>store.write("opic_stats",stats);
const saveDrafts=()=>store.write("opic_drafts",drafts);
const saveFeedback=()=>store.write("opic_feedback",feedback);
// XP: 처음이면(키 없음=-1) 기존 진도로 1회 백필해 공정한 시작 레벨 부여
let xp=store.read("opic_xp",-1);
if(xp<0){xp=memorized.size*5+Object.keys(progress.reading).length*10+Object.keys(progress.writing).length*10;}
const saveXp=()=>store.write("opic_xp",xp);
saveXp();
const XP_PER_LEVEL=100;
function addXP(n){const b=Math.floor(xp/XP_PER_LEVEL);xp+=n;saveXp();const a=Math.floor(xp/XP_PER_LEVEL);if(a>b)ui.levelUp=a+1;}
function xpInfo(){const lvl=Math.floor(xp/XP_PER_LEVEL)+1,inLvl=xp%XP_PER_LEVEL;return {lvl,inLvl,need:XP_PER_LEVEL,total:xp};}

}

const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const byTopic=arr=>state.topic==="all"?arr:arr.filter(x=>x.topic===state.topic);
const topicLabel=k=>(TOPICS.find(t=>t.key===k)||{}).label||"";
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
const normalize=s=>s.toLowerCase().replace(/[.,!?;:'"]/g,"").replace(/\s+/g," ").trim();
function ymd(d){d=new Date(d);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
const todayKey=()=>ymd(new Date());

/* 활동 기록 + 스트릭 갱신 (학습 행동이 있을 때마다 호출) */
function touchDay(){
  const t=todayKey();
  stats.days[t]=stats.days[t]||{reviews:0,questions:0};
  if(stats.lastDay!==t){
    const y=ymd(Date.now()-86400000);
    stats.streak=(stats.lastDay===y)?(stats.streak||0)+1:1;
    stats.lastDay=t;
  }
  saveStats();
}
function bumpReview(){touchDay();stats.days[todayKey()].reviews++;saveStats();addXP(5);}
function bumpQuestion(){touchDay();stats.days[todayKey()].questions++;saveStats();addXP(10);}

/* ---------------- 간격 반복(SRS) ---------------- */
const SRS_DAYS={1:0,2:1,3:2,4:4,5:7}; // 박스가 높을수록 다음 복습까지 더 오래
function deckFids(){return [...DATA.vocab.map(v=>"vocab:"+v.id),...DATA.patterns.map(p=>"pattern:"+p.id)];}
function isDue(fid){const s=srs[fid];return !s||s.due<=Date.now();}
function dueFids(){return deckFids().filter(isDue);}
function srsRate(fid,good){
  const cur=srs[fid]||{box:1,due:0};
  const box=good?Math.min(5,cur.box+1):1;
  const due=good?Date.now()+SRS_DAYS[box]*86400000:Date.now()+60*1000; // 모르면 1분 뒤(이번 세션 재등장)
  srs[fid]={box,due};saveSrs();
}
function cardOf(fid){
  const i=fid.indexOf(":"),mode=fid.slice(0,i),id=fid.slice(i+1);
  if(mode==="vocab"){const v=DATA.vocab.find(x=>x.id===id);return{mode,front:v.word,pron:v.pron,mean:v.meaning,ex:v.examples[0],kind:"단어",topic:v.topic};}
  const p=DATA.patterns.find(x=>x.id===id);return{mode,front:p.expression,pron:"",mean:p.meaning,ex:p.example,kind:"표현",topic:p.topic};
}

function parsePassage(r){
  let idx=0;
  return esc(r.passage_en).replace(/\[\[([^|\]]+)\|([^\]]+)\]\]/g,(m,en,ko)=>{
    const key=r.id+"-"+(idx++),open=ui.glossOpen.has(key);
    return `<span class="gloss" data-action="gloss" data-key="${key}">${en}${open?`<span class="ko"> (${ko})</span>`:""}</span>`;

}
/* 지문에서 아직 안 푼 첫 문제 번호(전부 풀었으면 마지막 번호) */
function firstUnansweredQ(r){
  for(let i=0;i<r.questions.length;i++) if(progress.reading[r.id+"-"+i]==null) return i;
  return r.questions.length-1;
}
/* 지문 위치를 안전하게 이동하고, 해당 지문의 시작 문제를 설정 */
function setReadingPos(idx){
  const list=byTopic(DATA.reading);
  if(!list.length){state.readingPos=0;state.readingQPos=0;return;}
  state.readingPos=Math.max(0,Math.min(list.length-1,idx));
  state.readingQPos=firstUnansweredQ(list[state.readingPos]);
}
function renderReading(){
  const list=byTopic(DATA.reading);
  if(!list.length)return emptyMsg("이 주제의 지문이 아직 없어요.");

function renderBlank(w){

  }).join("");

    const ok=w.options[chosen]===w.answer;
    result=`<div class="w-result ${ok?"ok":"no"}">${ok?"✅ 정답!":"❌ 정답은 '"+esc(w.answer)+"' 입니다."}</div>

/* 수동 닫기형 토스트(레벨업/배지 공용) — '확인'을 눌러야 사라짐 */
function showToast(emoji,title,sub){
  const host=document.getElementById("toastHost");if(!host)return;
  const t=document.createElement("div");t.className="toast";
  t.innerHTML=`<span class="t-emoji">${emoji}</span><div class="t-body"><div class="t-title">${esc(title)}</div><div class="t-sub">${esc(sub)}</div></div><button class="t-close" type="button">확인</button>`;
  host.appendChild(t);
  t.querySelector(".t-close").addEventListener("click",()=>{t.classList.add("out");setTimeout(()=>t.remove(),300);});
}

function confettiHtml(){
  const colors=["#2BB3A3","#F4B400","#E8615A","#5B8DEF","#9B6DD6"];
  let s="";
  for(let i=0;i<26;i++){

/* 퀴즈: 단어·표현 뜻 쓰기 + 빈칸 채우기 (능동 회상) */
const escapeRe=s=>String(s).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
function quizPool(){
  let n=0;
  byTopic(DATA.vocab).forEach(v=>{n++;if(!v.word.includes(" ")&&new RegExp("\\b"+escapeRe(v.word)+"\\b","i").test(v.examples[0].en))n++;});
  n+=byTopic(DATA.patterns).length;
  return n;
}
function buildQuiz(){
  const items=[];
  byTopic(DATA.vocab).forEach(v=>{
    items.push({type:"vmean",fid:"vocab:"+v.id,prompt:v.word,pron:v.pron,answer:v.meaning,kind:"단어 뜻 쓰기"});
    if(!v.word.includes(" ")){
      const re=new RegExp("\\b"+escapeRe(v.word)+"\\b","i");
      if(re.test(v.examples[0].en))
        items.push({type:"blank",fid:"vocab:"+v.id,prompt:v.examples[0].en.replace(re,"_____"),answer:v.word,ko:v.examples[0].ko,kind:"빈칸 채우기"});
    }
  });
  byTopic(DATA.patterns).forEach(p=>items.push({type:"pmean",fid:"pattern:"+p.id,prompt:p.expression,answer:p.meaning,kind:"표현 뜻 쓰기"}));
  return shuffle(items).slice(0,10);
}
function looseKoMatch(user,ans){
  const n=s=>String(s).replace(/[\s,.~·/()]/g,"").toLowerCase();
  const u=n(user);if(!u)return false;const a=n(ans);if(u===a)return true;
  const parts=ans.split(/[,/]/).map(n).filter(Boolean);
  if(parts.some(pt=>pt.includes(u)||u.includes(pt)))return true;
  return a.includes(u)||u.includes(a);
}
function renderQuiz(){
  const q=ui.quiz;
  if(q.finished){
    const acc=q.items.length?Math.round(q.correct/q.items.length*100):0;

    const celebrate=ui.celebrate; ui.celebrate=false;
    const msg=acc>=80?"훌륭해요! 이 주제는 거의 마스터했어요.":acc>=50?"좋아요. 틀린 것만 복습하면 금방 올라가요.":"괜찮아요. 복습 카드로 약점을 채워봐요.";
    return `${celebrate&&acc>=50?confettiHtml():""}<div class="card done-screen"><div class="big pop-in">${acc>=80?"🏆":acc>=50?"👍":"💪"}</div>
      <h3>${q.correct} / ${q.items.length} 정답 (${acc}%)</h3>
      <p>${msg}</p>
      <button class="btn big" data-action="quiz-start">한 번 더 풀기</button></div>
      ${wrong.length?`<div class="fav-group-title">다시 볼 문항 (${wrong.length})</div>`+wrong.map(r=>`<div class="card wrong-card">
        <div class="wq en">${esc(r.prompt.replace("_____","____"))}</div>

      </div>`).join(""):""}`;
  }
  if(!q.active){
    const n=Math.min(10,quizPool());
    if(!n)return emptyMsg("이 주제에는 퀴즈로 낼 항목이 없어요. 주제를 바꿔보세요.");
    return `<div class="card done-screen"><div class="big">📝</div><h3>단어·문장 퀴즈</h3>

      <button class="btn big" data-action="quiz-start">퀴즈 시작</button></div>`;
  }
  const it=q.items[q.pos],pct=Math.round(q.pos/q.items.length*100),txt=q.text[q.pos]||"";
  const head=`<div class="rev-progress">${q.pos+1} / ${q.items.length}문항</div><div class="rev-bar"><span style="width:${pct}%"></span></div>`;
  let card;
  if(q.stage==="input"){
    const label=it.type==="blank"?"빈칸에 들어갈 영어 단어를 쓰세요":it.type==="vmean"?"이 단어의 뜻을 한국어로 쓰세요":"이 표현의 뜻을 한국어로 쓰세요";
    card=`<div class="card quiz-card">

      ${it.pron?`<div class="rev-pron">/ ${esc(it.pron)} /</div>`:""}
      <div class="quiz-label">${label}</div>
      <input class="quiz-input ${it.type==="blank"?"en":""}" data-qpos="${q.pos}" value="${esc(txt)}" placeholder="${it.type==="blank"?"English word":"한국어 뜻"}" autocomplete="off"/>
      <button class="btn big" data-action="quiz-check">정답 확인</button>
    </div>`;
  }else if(it.type==="blank"){
    card=`<div class="card quiz-card">
      <div class="rev-kind">${it.kind} · ${q.lastCorrect?"정답":"오답"}</div>
      <div class="quiz-prompt en">${esc(it.prompt.replace("_____","[ "+it.answer+" ]"))}</div>
      <div class="quiz-fb ${q.lastCorrect?"ok":"no"}">${q.lastCorrect?"✅ 정답!":"❌ 정답: "+esc(it.answer)}</div>
      <div class="ex-ko" style="margin-top:6px">${esc(it.ko||"")}</div>
      <button class="btn big" data-action="quiz-next">다음 문항</button>
    </div>`;
  }else{
    const auto=looseKoMatch(txt,it.answer);
    card=`<div class="card quiz-card">
      <div class="rev-kind">${it.kind} · 채점</div>
      <div class="quiz-prompt en">${esc(it.prompt)}</div>
      <div class="quiz-fb"><span class="lab2">내 답</span><b class="mine">${esc(txt||"(빈칸)")}</b></div>
      <div class="quiz-fb"><span class="lab2">정답</span><b class="ans">${esc(it.answer)}</b></div>

    </div>`;
  }
  return head+card;
}

  const vTotal=DATA.vocab.length, vMem=DATA.vocab.filter(v=>memorized.has("vocab:"+v.id)).length;
  const pTotal=DATA.patterns.length, pMem=DATA.patterns.filter(p=>memorized.has("pattern:"+p.id)).length;
  let qTotal=0; DATA.reading.forEach(r=>qTotal+=r.questions.length);
  const qAns=Object.keys(progress.reading).length;
  const qCorrect=Object.values(progress.reading).filter(v=>v&&v.correct).length;
  const wTotal=DATA.writing.length, wDone=Object.keys(progress.writing).length;
  const coverage=Math.round((vMem+pMem+qAns+wDone)/Math.max(1,vTotal+pTotal+qTotal+wTotal)*100);
  const comprehension=qAns>0?Math.round(qCorrect/qAns*100):null;
  const fbScores=Object.values(feedback).map(f=>(f&&typeof f.score==="number")?f.score:null).filter(s=>s!=null);
  const production=fbScores.length?Math.round(fbScores.reduce((a,b)=>a+b,0)/fbScores.length):null;
  const comboStages=Object.keys(COMBO).length*3;
  const comboDone=Object.keys(drafts).filter(k=>k.indexOf("combo:")===0&&(drafts[k]||"").trim()).length;
  const speaking=Math.round(Math.min(1,comboDone/Math.max(1,comboStages))*100);
  const parts=[[coverage,0.30],[comprehension,0.20],[production,0.35],[speaking,0.15]];
  let sum=0,wsum=0; parts.forEach(([v,wt])=>{if(v!=null){sum+=v*wt;wsum+=wt;}});
  const score=wsum?Math.round(sum/wsum):0;
  const band=score>=82?"AL":score>=65?"IH":score>=45?"IM":score>=25?"IL":"NH";
  const bandLabel={AL:"Advanced Low",IH:"Intermediate High",IM:"Intermediate Mid",IL:"Intermediate Low",NH:"Novice High"}[band];
  return {score,band,bandLabel,coverage,comprehension,production,speaking,hasProduction:production!=null};
}
function topicMastery(){
  return TOPICS.filter(t=>t.key!=="all").map(t=>{
    const vs=DATA.vocab.filter(v=>v.topic===t.key),vM=vs.filter(v=>memorized.has("vocab:"+v.id)).length;
    const ps=DATA.patterns.filter(p=>p.topic===t.key),pM=ps.filter(p=>memorized.has("pattern:"+p.id)).length;
    const rs=DATA.reading.filter(r=>r.topic===t.key);let rTotalQ=0,rAns=0;
    rs.forEach(r=>{rTotalQ+=r.questions.length;r.questions.forEach((q,i)=>{if(progress.reading[r.id+"-"+i]!=null)rAns++;});});
    const ws=DATA.writing.filter(w=>w.topic===t.key),wD=ws.filter(w=>progress.writing[w.id]).length;
    const total=vs.length+ps.length+rTotalQ+ws.length,done=vM+pM+rAns+wD;
    return {key:t.key,label:t.label,pct:total?Math.round(done/total*100):0};
  }).sort((a,b)=>a.pct-b.pct);
}
function feedbackSeries(){
  return Object.entries(feedback)
    .filter(([k,v])=>v&&typeof v.score==="number")
    .map(([k,v])=>({ts:v.ts||0,score:v.score}))
    .sort((a,b)=>a.ts-b.ts);
}
function weekInfo(){

  const dows=["월","화","수","목","금","토","일"];
  const tkey=todayKey();const week=[];let activeDays=0,total=0;
  for(let i=0;i<7;i++){

    const a=stats.days[k]||{reviews:0,questions:0};const v=(a.reviews||0)+(a.questions||0);
    const isToday=k===tkey,isFuture=dt>now&&!isToday;
    if(v>0)activeDays++;total+=v;
    week.push({label:dows[i],active:v>0,today:isToday,future:isFuture});

  const goal=state.weeklyGoal||5;

}

  ui.fbError[fbKey]="";ui.fbLoading[fbKey]=true;renderAll();
  try{
    const res=await fetch(state.aiEndpoint,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({task:"opic-writing-feedback",prompt_ko,answer,model})
    });
    if(!res.ok) throw new Error("서버 응답 오류 ("+res.status+")");
    const data=await res.json();
    feedback[fbKey]={corrected:data.corrected||"",comment:data.feedback||data.comment||"",score:(data.score==null?null:data.score),ts:Date.now()};
    saveFeedback();
  }catch(err){
    ui.fbError[fbKey]="첨삭을 가져오지 못했어요: "+(err&&err.message||err)+" (서버 주소·온라인 상태를 확인하세요)";
  }finally{
    ui.fbLoading[fbKey]=false;renderAll();
  }
}
function requestFeedback(id){
  const w=DATA.writing.find(x=>x.id===id);if(!w)return;
  const text=((ui.translate[id]&&ui.translate[id].text)||drafts[id]||"").trim();
  if(!text){alert("먼저 영어로 답안을 작성해 주세요.");return;}
  if(!state.aiEndpoint){state.tab="dash";saveSettings();renderAll();return;}
  callFeedback(id,w.prompt_ko,text,w.answer_en);
}
function requestComboFeedback(topic,stage){
  const c=COMBO[topic];if(!c)return;
  const q=c[["describe","routine","experience"][stage]];
  const comboId="combo:"+topic+":"+stage;
  const text=((ui.translate[comboId]&&ui.translate[comboId].text)||drafts[comboId]||"").trim();
  if(!text){alert("먼저 영어로 답안을 작성해 주세요.");return;}
  if(!state.aiEndpoint){state.tab="dash";saveSettings();renderAll();return;}
  callFeedback(comboId,q.ko+" / "+q.en,text,"");
}
function requestMockFeedback(topic){
  const c=COMBO[topic];if(!c)return;
  const order=["describe","routine","experience"],labels=["묘사","루틴","경험"];
  const parts=order.map((k,i)=>{const id="combo:"+topic+":"+i;return {q:c[k],a:((ui.translate[id]&&ui.translate[id].text)||drafts[id]||"").trim()};});
  if(parts.every(p=>!p.a)){alert("먼저 답변을 작성해 주세요.");return;}
  if(!state.aiEndpoint){state.tab="dash";saveSettings();renderAll();return;}
  const prompt_ko=parts.map((p,i)=>`${labels[i]}: ${p.q.ko}`).join("\n");
  const answer=parts.map((p,i)=>`[${labels[i]}] Q: ${p.q.en}\nA: ${p.a||"(빈칸)"}`).join("\n\n");
  callFeedback("mock:"+topic,prompt_ko,answer,"");
}
document.body.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]");if(!el)return;
  const a=el.getAttribute("data-action");
  if(el.hasAttribute("data-stop")||["fav","mem"].includes(a))e.stopPropagation();
  captureInputs();
  switch(a){
    case "theme": state.theme=state.theme==="dark"?"light":"dark";saveSettings();applyTheme();break;
    case "tab": state.tab=el.dataset.tab;state.revealed=false;saveSettings();break;
    case "topic": state.topic=el.dataset.topic;state.vocabPos=0;state.patternPos=0;state.writingPos=0;state.comboStage=0;state.revealed=false;ui.quiz.active=false;ui.quiz.finished=false;setReadingPos(0);saveSettings();break;

    /* 단어 */
    case "flip": state.revealed=!state.revealed;break;
    case "toggle-hide": state.hideMeaning=!state.hideMeaning;state.revealed=false;break;
    case "prev": state.vocabPos=Math.max(0,state.vocabPos-1);state.revealed=false;break;
    case "next": state.vocabPos=Math.min(byTopic(DATA.vocab).length-1,state.vocabPos+1);state.revealed=false;break;
    case "fav":{const f=el.dataset.fid;favorites.has(f)?favorites.delete(f):favorites.add(f);saveFav();break;}
    case "mem":{const f=el.dataset.fid;memorized.has(f)?memorized.delete(f):(memorized.add(f),touchDay(),addXP(5));saveMem();break;}

    /* 문장 네비 */
    case "pat-prev": state.patternPos=Math.max(0,state.patternPos-1);break;
    case "pat-next": state.patternPos=Math.min(byTopic(DATA.patterns).length-1,state.patternPos+1);break;
    /* 작문 네비 */
    case "write-prev": state.writingPos=Math.max(0,state.writingPos-1);break;
    case "write-next": state.writingPos=Math.min(byTopic(DATA.writing).length-1,state.writingPos+1);break;
    /* 독해 지문/문제 네비 */
    case "read-prev": setReadingPos(state.readingPos-1);break;
    case "read-next": case "read-passnext": setReadingPos(state.readingPos+1);break;
    case "read-qnext":{const rl=byTopic(DATA.reading);const rr=rl[state.readingPos];if(!rr)break;state.readingQPos=Math.min(rr.questions.length-1,state.readingQPos+1);break;}

    /* 독해 */
    case "gloss":{const k=el.dataset.key;ui.glossOpen.has(k)?ui.glossOpen.delete(k):ui.glossOpen.add(k);break;}
    case "toggle-ko":{const k="ko-"+el.dataset.rid;ui.glossOpen.has(k)?ui.glossOpen.delete(k):ui.glossOpen.add(k);break;}
    case "answer":{
      const key=el.dataset.key;
      if(progress.reading[key]==null){
        const chosen=+el.dataset.oi,r=DATA.reading.find(x=>x.id===el.dataset.rid);
        const correct=chosen===r.questions[+el.dataset.qi].answer;
        progress.reading[key]={chosen,correct};saveProgress();bumpQuestion();
      }break;
    }

    /* 작문 */
    case "arr-add":{const id=el.dataset.id;ui.arrange[id]=ui.arrange[id]||[];ui.arrange[id].push(+el.dataset.i);ui.arrange[id+"_done"]=false;break;}
    case "arr-del":{const id=el.dataset.id;if(!ui.arrange[id])break;ui.arrange[id].splice(+el.dataset.pos,1);ui.arrange[id+"_done"]=false;break;}
    case "arr-check":{
      const id=el.dataset.id,w=DATA.writing.find(x=>x.id===id);
      ui.arrange[id+"_done"]=true;
      const ok=normalize((ui.arrange[id]||[]).map(i=>w.words[i]).join(" "))===normalize(w.answer_en);
      if(!progress.writing[id])bumpQuestion();
      progress.writing[id]={done:true,correct:ok};saveProgress();break;
    }
    case "arr-reset":{const id=el.dataset.id;ui.arrange[id]=[];ui.arrange[id+"_done"]=false;break;}
    case "blank-pick":{
      const id=el.dataset.id,w=DATA.writing.find(x=>x.id===id);
      if(ui.blank[id]==null){
        const oi=+el.dataset.oi;ui.blank[id]=oi;
        if(!progress.writing[id])bumpQuestion();
        progress.writing[id]={done:true,correct:w.options[oi]===w.answer};saveProgress();
      }break;
    }
    case "blank-reset": delete ui.blank[el.dataset.id];break;
    case "trans-show":{
      const id=el.dataset.id;ui.translate[id]=ui.translate[id]||{text:"",show:false};ui.translate[id].show=true;
      if(!progress.writing[id]){progress.writing[id]={done:true,correct:null};saveProgress();bumpQuestion();}
      break;
    }
    case "ai-feedback": requestFeedback(el.dataset.id);break;   // 비동기 — 내부에서 다시 렌더
    case "copy-answer":{
      const id=el.dataset.id,txt=(ui.translate[id]&&ui.translate[id].text||"").trim();
      if(!txt){alert("먼저 영어로 답안을 작성해 주세요.");return;}
      const w=DATA.writing.find(x=>x.id===id);
      const payload=`다음 OPIc 한→영 작문을 첨삭해줘.\n[한국어] ${w.prompt_ko}\n[내 답안] ${txt}`;
      try{navigator.clipboard.writeText(payload).then(()=>alert("답안이 복사됐어요. 채팅에 붙여넣어 첨삭을 요청하세요."),()=>alert(payload));}
      catch(e){alert(payload);}
      return;
    }
    case "save-endpoint":{
      const inp=document.getElementById("aiEndpointInput");
      const v=inp?inp.value.trim():"";
      if(v&&!/^https?:\/\//i.test(v)){alert("http:// 또는 https:// 로 시작하는 주소를 입력해 주세요.");return;}
      state.aiEndpoint=v;saveSettings();
      alert(v?"첨삭 서버가 등록됐어요.":"첨삭 서버 주소를 비웠어요.");
      break;
    }

    /* 말하기 콤보 */
    case "combo-go": state.comboStage=Math.max(0,Math.min(2,+el.dataset.i));break;
    case "combo-prev": state.comboStage=Math.max(0,state.comboStage-1);break;
    case "combo-next": state.comboStage=Math.min(2,state.comboStage+1);break;
    case "combo-feedback": requestComboFeedback(state.topic,state.comboStage);break;
    case "combo-copy":{
      const c=COMBO[state.topic];if(!c)return;
      const q=c[["describe","routine","experience"][state.comboStage]];
      const comboId="combo:"+state.topic+":"+state.comboStage;
      const txt=((ui.translate[comboId]&&ui.translate[comboId].text)||drafts[comboId]||"").trim();
      if(!txt){alert("먼저 영어로 답안을 작성해 주세요.");return;}
      const payload=`다음 OPIc 답변을 첨삭해줘.\n[질문] ${q.en}\n[내 답변] ${txt}`;
      try{navigator.clipboard.writeText(payload).then(()=>alert("답안이 복사됐어요. 채팅에 붙여넣어 첨삭을 요청하세요."),()=>alert(payload));}
      catch(e){alert(payload);}
      return;
    }
    case "combo-mode": ui.comboMode=el.dataset.mode==="mock"?"mock":"step";break;
    case "mock-feedback": requestMockFeedback(state.topic);break;
    case "mock-copy":{
      const c=COMBO[state.topic];if(!c)return;
      const order=["describe","routine","experience"],labels=["묘사","루틴","경험"];
      const parts=order.map((k,i)=>{const id="combo:"+state.topic+":"+i;return {q:c[k],a:((ui.translate[id]&&ui.translate[id].text)||drafts[id]||"").trim()};});
      if(parts.every(p=>!p.a)){alert("먼저 답변을 작성해 주세요.");return;}
      const payload="다음 OPIc 모의 인터뷰 답변(묘사→루틴→경험)을 종합 첨삭해줘.\n\n"+parts.map((p,i)=>`[${labels[i]}] ${p.q.en}\n${p.a||"(빈칸)"}`).join("\n\n");
      try{navigator.clipboard.writeText(payload).then(()=>alert("답변이 복사됐어요. 채팅에 붙여넣어 첨삭을 요청하세요."),()=>alert(payload));}
      catch(e){alert(payload);}
      return;
    }

    /* 복습 세그먼트 + SRS */
    case "rseg": state.reviewSeg=el.dataset.seg;ui.quiz.active=false;ui.quiz.finished=false;break;
    case "quiz-start":{
      const qitems=buildQuiz();
      if(!qitems.length){ui.quiz.active=false;ui.quiz.finished=false;break;}
      ui.quiz={active:true,finished:false,items:qitems,pos:0,stage:"input",text:{},results:[],correct:0,lastCorrect:false};break;
    }
    case "quiz-check":{
      const q=ui.quiz,it=q.items[q.pos],t=(q.text[q.pos]||"").trim();
      if(!it)break;
      if(it.type==="blank"){
        const ok=normalize(t)===normalize(it.answer);q.lastCorrect=ok;
        q.results.push({type:it.type,prompt:it.prompt,answer:it.answer,user:t,correct:ok});
        if(ok)q.correct++; if(it.fid)srsRate(it.fid,ok); bumpQuestion();
      }
      q.stage="checked";break;
    }
    case "quiz-mark":{
      const q=ui.quiz,it=q.items[q.pos],t=(q.text[q.pos]||"").trim(),ok=el.dataset.correct==="1";
      if(!it)break;
      q.results.push({type:it.type,prompt:it.prompt,answer:it.answer,user:t,correct:ok});
      if(ok)q.correct++; if(it.fid)srsRate(it.fid,ok); bumpQuestion();
      q.pos++;q.stage="input"; if(q.pos>=q.items.length){q.active=false;q.finished=true;ui.celebrate=true;}
      break;
    }
    case "quiz-next":{
      const q=ui.quiz;q.pos++;q.stage="input"; if(q.pos>=q.items.length){q.active=false;q.finished=true;ui.celebrate=true;}
      break;
    }
    case "srs-start":{
      const due=shuffle(dueFids());
      ui.review={active:true,finished:false,queue:due,total:due.length,revealed:false,count:0};break;
    }
    case "srs-reveal": ui.review.revealed=true;break;
    case "srs-rate":{
      const r=ui.review,fid=r.queue[0],good=el.dataset.good==="1";
      srsRate(fid,good);bumpReview();r.count++;r.revealed=false;
      r.queue.shift();
      if(!good)r.queue.push(fid);              // 모르면 이번 세션 뒤쪽에 다시 등장
      if(!r.queue.length){r.active=false;r.finished=true;}
      break;
    }
    case "srs-exit": ui.review={active:false,finished:false,queue:[],total:0,revealed:false,count:0};state.tab="dash";saveSettings();break;

    /* 오답노트 제거 */
    case "wrong-clear":{
      if(el.dataset.kind==="reading")delete progress.reading[el.dataset.key];
      else delete progress.writing[el.dataset.key];
      saveProgress();break;
    }

    /* 대시보드 */
    case "set-goal": state.dailyGoal=+el.dataset.n;saveSettings();break;
    case "set-weekly": state.weeklyGoal=+el.dataset.n;saveSettings();break;
    case "set-textsize": state.textSize=el.dataset.size;saveSettings();applyTextSize();break;
    case "toggle-sec": state.dashSections[el.dataset.sec]=!state.dashSections[el.dataset.sec];saveSettings();break;
    case "study-topic": state.topic=el.dataset.topic;state.tab="vocab";state.vocabPos=0;state.patternPos=0;state.writingPos=0;state.comboStage=0;state.revealed=false;ui.quiz.active=false;ui.quiz.finished=false;setReadingPos(0);saveSettings();break;
    case "goto-tab": state.tab=el.dataset.tab;saveSettings();break;
    case "goto-review": state.tab="review";state.reviewSeg="srs";saveSettings();break;
    case "reset-data":
      if(confirm("즐겨찾기·암기·복습·통계 기록을 모두 지울까요?")){
        store.clear();favorites=new Set();memorized=new Set();srs={};progress={reading:{},writing:{}};
        stats={streak:0,lastDay:null,days:{}};drafts={};feedback={};xp=0;saveXp();badges=new Set();saveBadges();
        ui.arrange={};ui.blank={};ui.translate={};ui.glossOpen=new Set();ui.fbLoading={};ui.fbError={};
        ui.review={active:false,finished:false,queue:[],total:0,revealed:false,count:0};
        ui.quiz={active:false,finished:false,items:[],pos:0,stage:"input",text:{},results:[],correct:0,lastCorrect:false};
        state.topic="all";state.vocabPos=0;state.patternPos=0;state.writingPos=0;state.readingPos=0;state.readingQPos=0;state.comboStage=0;
      }else return;
      break;
    default: return;
  }
  renderAll();
});
document.body.addEventListener("input",e=>{
  if(e.target.classList.contains("w-input")){
    const id=e.target.getAttribute("data-tid");
    ui.translate[id]=ui.translate[id]||{text:"",show:false};ui.translate[id].text=e.target.value;
    drafts[id]=e.target.value;saveDrafts();   // 타이핑 즉시 저장
  }
  if(e.target.classList.contains("quiz-input")){
    ui.quiz.text[e.target.getAttribute("data-qpos")]=e.target.value;
  }
});

applyTheme();
// PWA: http(s)로 호스팅된 경우에만 서비스워커 등록(로컬 파일 더블클릭 시엔 생략)
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
renderAll();
</script>
