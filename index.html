<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>OPIc 영어 재료 창고 · Input Trainer</title>
<meta name="theme-color" id="themeColor" content="#1F6F6B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="OPIc 창고" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231F6F6B'/><text x='32' y='45' font-size='36' text-anchor='middle' fill='white' font-family='Georgia'>A</text></svg>" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231F6F6B'/><text x='32' y='45' font-size='36' text-anchor='middle' fill='white' font-family='Georgia'>A</text></svg>" />
<style>
  /* ============================================================
     [디자인 토큰] 색상·폰트 변수 — 여기만 바꾸면 앱 전체가 바뀝니다.
     영어=세리프, 한국어=산세리프로 시각 구분합니다.
     ============================================================ */
  :root{
    --bg:#FBFAF7; --surface:#FFFFFF; --ink:#1D2433; --ink-soft:#5A6273; --ink-faint:#9AA0AC;
    --line:#E8E4DB; --teal:#1F6F6B; --teal-soft:#E7F0EF; --amber:#DD9626; --amber-soft:#FBF1DE;
    --green:#2E9E6B; --green-soft:#E5F4EC; --red:#D6514C; --red-soft:#FBE9E8;
    --shadow:0 1px 2px rgba(29,36,51,.05), 0 4px 14px rgba(29,36,51,.06);
    --radius:16px;
    --font-ko:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-en:'Iowan Old Style','Palatino Linotype','Palatino','Georgia',serif;
  }
  /* 다크 모드: data-theme="dark" 일 때 변수만 교체 */
  :root[data-theme="dark"]{
    --bg:#13171C; --surface:#1B2026; --ink:#E7EAEE; --ink-soft:#A2ABB5; --ink-faint:#6B7480;
    --line:#2A323B; --teal:#54B9B2; --teal-soft:#15302E; --amber:#E0A23C; --amber-soft:#3A2E16;
    --green:#49BC86; --green-soft:#133024; --red:#E5716C; --red-soft:#341A1A;
    --shadow:0 1px 2px rgba(0,0,0,.45),0 6px 20px rgba(0,0,0,.35);
  }
  :root[data-theme="dark"] .topbar{background:rgba(19,23,28,.9);}
  :root[data-theme="dark"] .nav{background:rgba(27,32,38,.96);}
  /* 다크모드 대비 보정: 어두운 *-soft 배경 위 텍스트를 밝은 테마색으로 */
  :root[data-theme="dark"] .opt.correct,:root[data-theme="dark"] .explain.ok,:root[data-theme="dark"] .model .lab,:root[data-theme="dark"] .wchip.correct{color:var(--green);}
  :root[data-theme="dark"] .opt.wrong,:root[data-theme="dark"] .explain.no,:root[data-theme="dark"] .fb-box.err,:root[data-theme="dark"] .danger,:root[data-theme="dark"] .wchip.wrong{color:var(--red);}
  :root[data-theme="dark"] .explain,:root[data-theme="dark"] .combo-guide,:root[data-theme="dark"] .badge.got .b-desc{color:var(--teal);}
  body{transition:background-color .3s,color .3s;}
  /* 큰 글씨(페이지 확대) — 가로 넘침 없이 전체 비례 확대 */
  :root[data-textsize="lg"]{zoom:1.10;}
  :root[data-textsize="xl"]{zoom:1.22;}
  /* 키보드 포커스 표시(접근성) */
  a:focus-visible,button:focus-visible,[data-action]:focus-visible,input:focus-visible,textarea:focus-visible,.pill:focus-visible{outline:3px solid var(--teal);outline-offset:2px;border-radius:8px;}
  /* 충분한 터치 영역 */
  .btn{min-height:44px;}
  /* 부드러운 전환 애니메이션 */
  @keyframes appIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  #app.anim{animation:appIn .26s ease;}
  @keyframes pop{0%{transform:scale(.96)}55%{transform:scale(1.03)}100%{transform:scale(1)}}
  .opt.correct,.opt.wrong,.quiz-fb.ok,.quiz-fb.no{animation:pop .3s ease;}
  .flash .veil .meaning,.flash .veil .ex{transition:filter .25s,opacity .25s;}
  .card,.pill,.nav-btn,.icon-btn,.btn{transition:background-color .2s,border-color .2s,color .2s,transform .12s;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-ko);line-height:1.55;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .en{font-family:var(--font-en);}

  /* ---- 레이아웃(모바일 우선) ---- */
  .layout{display:flex;flex-direction:column;min-height:100vh;}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(251,250,247,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .topbar-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand-mark{width:30px;height:30px;border-radius:9px;background:var(--teal);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;font-family:var(--font-en);}
  .brand-title{font-size:15px;font-weight:700;letter-spacing:-.2px;}
  .brand-sub{font-size:11px;color:var(--ink-faint);margin-top:-2px;}
  .topics{display:flex;gap:7px;overflow-x:auto;padding:4px 18px 12px;scrollbar-width:none;}
  .topics::-webkit-scrollbar{display:none;}
  .pill{flex:0 0 auto;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);transition:all .15s;white-space:nowrap;}
  .pill.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  .content{flex:1;}
  #app{padding:18px 18px 96px;max-width:760px;margin:0 auto;}

  /* ---- 네비게이션 ---- */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:6px 2px calc(6px + env(safe-area-inset-bottom));}
  .nav-btn{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 1px;color:var(--ink-faint);font-size:10.5px;font-weight:600;border-radius:12px;transition:color .15s;}
  .nav-btn svg{width:22px;height:22px;}
  .nav-btn.on{color:var(--teal);}
  .nav-btn .badge{position:absolute;top:0;left:50%;transform:translate(6px,-2px);background:var(--amber);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 4px;}

  /* ---- 공통 ---- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}
  .section-intro{margin-bottom:16px;}
  .section-intro h2{font-size:20px;font-weight:800;letter-spacing:-.3px;margin:0 0 4px;}
  .section-intro p{margin:0;color:var(--ink-soft);font-size:13.5px;}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;background:var(--teal-soft);color:var(--teal);}
  .chip.lv-초{background:#EAF4EF;color:#2E9E6B;} .chip.lv-중{background:#FBF1DE;color:#C5851B;} .chip.lv-고{background:#FBE9E8;color:#C0413C;}
  .icon-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;border:1px solid var(--line);background:var(--surface);transition:all .15s;}
  .icon-btn svg{width:20px;height:20px;}
  .icon-btn.star.on{background:var(--amber-soft);border-color:#EBCF98;color:var(--amber);}
  .icon-btn.check.on{background:var(--green-soft);border-color:#B5DEC7;color:var(--green);}
  .btn{padding:11px 18px;border-radius:12px;font-weight:700;font-size:14px;background:var(--teal);color:#fff;border:1px solid var(--teal);transition:all .15s;}
  .btn.ghost{background:var(--surface);color:var(--teal);}
  .btn.soft{background:var(--teal-soft);color:var(--teal);border-color:transparent;}
  .btn.red{background:var(--red);border-color:var(--red);color:#fff;}
  .btn.big{padding:14px 22px;font-size:15px;width:100%;}
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.45;pointer-events:none;}

  /* ---- 단어 플래시카드 ---- */
  .flash-wrap{max-width:440px;margin:0 auto;}
  .flash{min-height:300px;display:flex;flex-direction:column;cursor:pointer;position:relative;overflow:hidden;}
  .flash-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;}
  .flash-actions{display:flex;gap:8px;}
  .word{font-size:34px;font-weight:600;letter-spacing:-.5px;margin:14px 0 2px;}
  .pron{color:var(--ink-faint);font-size:14px;font-family:var(--font-en);font-style:italic;}
  .meaning{font-size:18px;font-weight:700;color:var(--teal);margin:16px 0 6px;}
  .ex{border-top:1px dashed var(--line);padding-top:12px;margin-top:6px;}
  .ex-en{font-size:16px;margin-bottom:2px;} .ex-ko{font-size:13.5px;color:var(--ink-soft);}
  .ex + .ex{margin-top:12px;}
  .veil{position:relative;}
  .veil.hidden > *{filter:blur(7px);opacity:.55;user-select:none;}
  .veil .tap-hint{position:absolute;inset:0;display:none;place-items:center;font-size:13px;font-weight:700;color:var(--teal);background:rgba(231,240,239,.35);border-radius:10px;}
  .veil.hidden .tap-hint{display:grid;}
  .flash-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;}
  .flash-pos{font-size:13px;font-weight:700;color:var(--ink-soft);font-family:var(--font-en);}
  .navbtn{width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;box-shadow:var(--shadow);}
  .navbtn svg{width:22px;height:22px;}
  .toolbar{display:flex;justify-content:center;margin-bottom:14px;}

  /* ---- 문장·표현 ---- */
  .pat-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .pat-expr{font-size:20px;font-weight:600;letter-spacing:-.3px;}
  .pat-mean{color:var(--teal);font-weight:700;font-size:14px;margin:3px 0 12px;}
  .pat-ex{background:var(--bg);border-radius:12px;padding:12px 14px;}
  .pat-ex .ex-en{font-size:15.5px;}
  .pat-blank{margin-top:12px;font-size:14px;color:var(--ink-soft);}
  .pat-blank b{color:var(--ink);font-family:var(--font-en);font-weight:600;}
  .pat-actions{display:flex;gap:8px;}

  /* ---- 독해 ---- */
  .read-title{font-size:19px;font-weight:800;margin:2px 0 10px;}
  .passage{font-size:16.5px;line-height:1.85;}
  .passage .gloss{color:var(--teal);font-weight:600;border-bottom:1.5px dotted var(--teal);cursor:pointer;}
  .passage .gloss .ko{font-family:var(--font-ko);font-size:13px;color:var(--ink-soft);font-weight:600;}
  .read-tools{display:flex;gap:8px;margin:14px 0 4px;flex-wrap:wrap;}
  .passage-ko{margin-top:12px;padding:13px 15px;background:var(--bg);border-radius:12px;font-size:14.5px;color:var(--ink-soft);line-height:1.8;}
  .q{border-top:1px solid var(--line);padding-top:16px;margin-top:18px;}
  .q-text{font-weight:700;font-size:15px;margin-bottom:10px;}
  .q-text .qn{color:var(--teal);font-family:var(--font-en);margin-right:6px;}
  .opt{display:block;width:100%;text-align:left;padding:12px 14px;border-radius:11px;border:1px solid var(--line);background:var(--surface);font-size:14.5px;margin-bottom:8px;transition:all .12s;}
  .opt .en{font-size:14.5px;}
  .opt.correct{background:var(--green-soft);border-color:#A9D9C0;color:#1f7a52;font-weight:600;}
  .opt.wrong{background:var(--red-soft);border-color:#EDB6B3;color:#b33d39;font-weight:600;}
  .opt.correct,.opt.wrong{position:relative;padding-right:40px;}
  .opt.correct::after{content:"✓";position:absolute;right:14px;top:50%;transform:translateY(-50%);font-weight:800;font-size:16px;color:var(--green);}
  .opt.wrong::after{content:"✗";position:absolute;right:14px;top:50%;transform:translateY(-50%);font-weight:800;font-size:16px;color:var(--red);}
  .opt.locked{pointer-events:none;}
  .explain{margin-top:6px;padding:11px 14px;border-radius:10px;background:var(--teal-soft);font-size:13.5px;color:#155f5b;}
  .explain.ok{background:var(--green-soft);color:#1f7a52;} .explain.no{background:var(--red-soft);color:#b33d39;}

  /* ---- 작문 ---- */
  .w-type{font-size:11.5px;font-weight:800;color:var(--ink-faint);letter-spacing:.4px;text-transform:uppercase;}
  .w-prompt{font-size:16px;font-weight:700;margin:6px 0 14px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;min-height:46px;}
  .chips.answer-area{background:var(--bg);border:1.5px dashed var(--line);border-radius:12px;padding:10px;margin-bottom:10px;align-content:flex-start;}
  .wchip{padding:8px 13px;border-radius:10px;background:var(--surface);border:1px solid var(--line);font-family:var(--font-en);font-size:15px;box-shadow:var(--shadow);}
  .wchip.in{background:var(--teal-soft);border-color:transparent;color:var(--teal);font-weight:600;}
  .wchip.correct{background:var(--green-soft);border-color:#A9D9C0;color:#1f7a52;font-weight:700;}
  .wchip.wrong{background:var(--red-soft);border-color:#EDB6B3;color:#b33d39;font-weight:700;}
  .wchip.correct::after{content:" ✓";font-weight:800;}
  .wchip.wrong::after{content:" ✗";font-weight:800;}
  .placeholder{color:var(--ink-faint);font-size:13px;align-self:center;padding:4px;}
  .w-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .opt-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
  .blank-sentence{font-size:16px;margin-bottom:12px;}
  .blank-sentence .slot{display:inline-block;min-width:64px;border-bottom:2px solid var(--teal);color:var(--teal);font-weight:700;text-align:center;font-family:var(--font-en);}
  textarea.w-input{width:100%;min-height:80px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;font-family:var(--font-en);resize:vertical;background:var(--surface);color:var(--ink);}
  textarea.w-input:focus{outline:2px solid var(--teal-soft);border-color:var(--teal);}
  .model{margin-top:12px;padding:13px 15px;border-radius:12px;background:var(--green-soft);}
  .model .lab{font-size:11.5px;font-weight:800;color:#1f7a52;letter-spacing:.3px;}
  .model .ans{font-size:16px;margin-top:3px;}
  .model .hint{font-size:13px;color:var(--ink-soft);margin-top:8px;}
  .w-result{margin-top:12px;font-weight:700;font-size:14px;}
  .w-result.ok{color:var(--green);} .w-result.no{color:var(--red);}
  /* AI 첨삭 */
  .fb-box{margin-top:12px;padding:13px 15px;border-radius:12px;background:var(--teal-soft);border:1px solid transparent;}
  .fb-box.loading{color:var(--teal);font-weight:600;}
  .fb-box.err{background:var(--red-soft);color:#b33d39;font-weight:600;}
  .fb-head{font-size:12px;font-weight:800;color:var(--teal);letter-spacing:.3px;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
  .fb-score{background:var(--teal);color:#fff;border-radius:999px;padding:1px 9px;font-size:11.5px;}
  .fb-row{display:flex;gap:8px;margin-bottom:6px;}
  .fb-lab{flex:0 0 auto;font-size:11.5px;font-weight:700;color:var(--ink-faint);width:34px;padding-top:2px;}
  .fb-corr{font-size:15.5px;color:var(--ink);}
  .fb-comment{font-size:13.5px;color:var(--ink-soft);line-height:1.7;border-top:1px dashed var(--line);padding-top:8px;margin-top:4px;}
  .fb-note{margin-top:10px;font-size:12px;color:var(--ink-faint);line-height:1.6;}
  .setting-input{flex:1;min-width:180px;padding:10px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;background:var(--surface);color:var(--ink);font-family:var(--font-en);}
  .setting-input:focus{outline:2px solid var(--teal-soft);border-color:var(--teal);}
  /* 콤보 */
  .combo-steps{display:flex;gap:8px;margin-bottom:16px;}
  .combo-steps button{flex:1;padding:10px 4px;border-radius:12px;border:1px solid var(--line);background:var(--surface);font-size:12.5px;font-weight:700;color:var(--ink-soft);line-height:1.3;}
  .combo-steps button.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  .combo-steps .s-num{font-family:var(--font-en);font-size:16px;display:block;margin-bottom:2px;}
  .combo-q{font-size:18px;font-weight:600;line-height:1.5;margin:4px 0 4px;}
  .combo-q-ko{font-size:13.5px;color:var(--ink-soft);margin-bottom:12px;}
  .combo-guide{font-size:12.5px;color:#155f5b;background:var(--teal-soft);border-radius:10px;padding:9px 12px;margin-bottom:14px;line-height:1.6;}
  /* 모의 인터뷰 */
  .mock-guide{font-size:12.5px;color:var(--ink-soft);margin:0 0 16px;line-height:1.6;}
  .mock-q{margin-bottom:16px;}
  .mock-q-label{font-size:14px;font-weight:700;color:var(--ink);line-height:1.45;}
  .mock-q-ko{font-size:12.5px;color:var(--ink-soft);margin:3px 0 7px;}
  /* 데일리 골 */
  .goal-card.met{border-color:#A9D9C0;background:var(--green-soft);animation:goalPulse .5s ease;}
  @keyframes goalPulse{0%{transform:scale(1)}50%{transform:scale(1.015)}100%{transform:scale(1)}}
  .goal-opts{display:flex;gap:6px;flex-wrap:wrap;}
  .goal-opts button{padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:13.5px;font-weight:700;color:var(--ink-soft);}
  .goal-opts button.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  /* 오늘의 학습 추천 */
  .today-card{padding:18px;}
  .today-h{font-size:12.5px;font-weight:800;color:var(--teal);letter-spacing:.4px;text-transform:uppercase;}
  .today-sub{font-size:14.5px;color:var(--ink-soft);margin:5px 0 14px;line-height:1.55;}
  /* XP / 레벨 */
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .lv-badge{font-size:12.5px;font-weight:800;color:var(--teal);background:var(--teal-soft);border-radius:999px;padding:4px 11px;font-family:var(--font-en);white-space:nowrap;}
  .xp-card{padding:14px 16px;}
  .xp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .xp-lv{font-size:17px;font-weight:800;color:var(--ink);font-family:var(--font-en);}
  .xp-num{font-size:12.5px;color:var(--ink-faint);font-family:var(--font-en);}
  .xp-bar{height:10px;border-radius:999px;background:var(--bg);overflow:hidden;}
  .xp-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--teal),#3fd0bd);border-radius:999px;transition:width .5s ease;}
  .xp-sub{font-size:11.5px;color:var(--ink-faint);margin-top:7px;}
  /* 레벨업 토스트 */
  .toast-host{position:fixed;left:0;right:0;top:14px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:80;pointer-events:none;}
  .toast{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);box-shadow:0 10px 28px rgba(0,0,0,.16);border-radius:14px;padding:12px 14px 12px 18px;max-width:92%;pointer-events:auto;animation:toastIn .35s ease;}
  .t-body{flex:1;}
  .t-close{flex:0 0 auto;border:none;background:var(--teal);color:#fff;font-weight:700;font-size:13px;border-radius:9px;padding:7px 14px;cursor:pointer;}
  .t-close:hover{filter:brightness(1.05);}
  .toast.out{animation:toastOut .45s ease forwards;}
  .t-emoji{font-size:26px;}
  .t-title{font-weight:800;font-size:15px;color:var(--ink);}

  reading:[
    {id:"r1",topic:"selfintro",title:"Meet Jiwon",level:"중",
      passage_en:"Hi, my name is Jiwon, and I'm an office worker in Seoul. I work for a small company that [[designs|디자인하다]] mobile apps. In my free time, I enjoy playing the piano and going to the gym. People often say I'm [[calm|차분한]] and easy to talk to, which helps me work well in a team. On weekends, I usually meet my friends for coffee or visit my parents. I'm not a big traveler, but I hope to visit Europe someday. I'm always trying to learn something new, and right now I'm studying English to [[improve|향상시키다]] my speaking skills.",
      passage_ko:"안녕하세요, 제 이름은 지원이고 서울에서 일하는 직장인이에요. 모바일 앱을 디자인하는 작은 회사에 다녀요. 여가 시간에는 피아노 치는 것과 헬스장 가는 것을 좋아해요. 사람들은 제가 차분하고 대화하기 편하다고 자주 말하는데, 덕분에 팀에서 잘 어울려 일해요. 주말에는 보통 친구들과 커피를 마시거나 부모님을 뵈러 가요. 여행을 즐기는 편은 아니지만 언젠가 유럽에 가보고 싶어요. 저는 늘 새로운 것을 배우려 하고, 지금은 말하기 실력을 향상시키려고 영어를 공부하고 있어요.",
      questions:[
        {q:"What does Jiwon do for a living?",options:["A piano teacher","An office worker","A gym trainer","A travel guide"],answer:1,explanation:"지원은 서울의 한 회사에 다니는 직장인이라고 했습니다."},
        {q:"What does Jiwon do in her free time?",options:["Plays the piano and exercises","Travels abroad often","Designs apps at home","Teaches English"],answer:0,explanation:"여가 시간에 피아노를 치고 헬스장에 간다고 했습니다."},
        {q:"Why is Jiwon studying English?",options:["To get a new job","To travel to Europe","To improve her speaking","To teach others"],answer:2,explanation:"말하기 실력을 향상시키기 위해 영어를 공부한다고 했습니다."}]},

    {id:"r2",topic:"hobby",title:"A Weekend Hobby",level:"중",
      passage_en:"Minho has loved hiking ever since he was a college student. Almost every weekend, he wakes up early and takes a bus to a nearby mountain. He says hiking is the best way for him to [[relieve|해소하다]] stress and clear his mind. The fresh air and quiet [[trails|등산로]] help him forget about work for a few hours. Sometimes he goes alone, but he [[prefers|더 좋아하다]] hiking with a small group of friends. After reaching the top, they usually share snacks and enjoy the view together. For Minho, hiking is not just exercise — it's a chance to slow down and feel grateful.",
      passage_ko:"민호는 대학생 때부터 등산을 좋아해 왔어요. 거의 매주 주말에 일찍 일어나 근처 산으로 가는 버스를 타요. 그는 등산이 스트레스를 해소하고 마음을 비우는 가장 좋은 방법이라고 말해요. 신선한 공기와 조용한 등산로는 몇 시간 동안 일을 잊게 해줘요. 가끔은 혼자 가지만, 그는 소규모 친구들과 함께 등산하는 것을 더 좋아해요. 정상에 오른 뒤에는 보통 간식을 나눠 먹고 함께 경치를 즐겨요. 민호에게 등산은 단순한 운동이 아니라 잠시 속도를 늦추고 감사함을 느끼는 시간이에요.",
      questions:[
        {q:"How often does Minho go hiking?",options:["Once a month","Almost every weekend","Only in summer","Every morning"],answer:1,explanation:"거의 매주 주말에 등산을 간다고 했습니다."},
        {q:"Why does Minho enjoy hiking?",options:["To make money","To relieve stress","To lose weight fast","To meet strangers"],answer:1,explanation:"스트레스를 해소하고 마음을 비우기 위해 등산을 즐깁니다."},
        {q:"What do they do after reaching the top?",options:["Go home right away","Share snacks and enjoy the view","Start running","Take a long nap"],answer:1,explanation:"정상에서 간식을 나눠 먹고 경치를 즐긴다고 했습니다."}]},

    {id:"r3",topic:"travel",title:"A Trip to Busan",level:"중",
      passage_en:"Last summer, Sora took a short trip to Busan with two of her closest friends. They [[booked|예약했다]] a small guesthouse near Haeundae Beach a month in advance. During the day, they went [[sightseeing|관광]], tried fresh seafood, and walked along the coast. In the evening, they sat by the sea and talked for hours. The weather was perfect, and the city felt relaxed and friendly. Although the trip was only three days, it gave Sora a chance to rest and [[recharge|재충전하다]]. She still remembers it as one of the most enjoyable trips she has ever taken, and she hopes to go back again soon.",
      passage_ko:"지난여름, 소라는 가장 친한 친구 두 명과 함께 부산으로 짧은 여행을 다녀왔어요. 그들은 한 달 전에 해운대 해변 근처의 작은 게스트하우스를 예약했어요. 낮에는 관광을 하고, 신선한 해산물을 먹고, 해안을 따라 걸었어요. 저녁에는 바닷가에 앉아 몇 시간 동안 이야기를 나눴어요. 날씨는 완벽했고, 도시는 여유롭고 친근하게 느껴졌어요. 여행은 3일뿐이었지만 소라에게 쉬고 재충전할 기회를 주었어요. 그녀는 지금도 그 여행을 가장 즐거웠던 여행 중 하나로 기억하며, 곧 다시 가고 싶어 해요.",
      questions:[
        {q:"Who did Sora travel with?",options:["Her family","Two close friends","Her coworkers","No one"],answer:1,explanation:"가장 친한 친구 두 명과 함께 여행했습니다."},
        {q:"Where did they stay?",options:["A luxury hotel","A guesthouse near the beach","A friend's house","A campsite"],answer:1,explanation:"해운대 해변 근처 게스트하우스를 예약해 머물렀습니다."},
        {q:"How long was the trip?",options:["One day","Three days","One week","One month"],answer:1,explanation:"여행 기간은 3일이었다고 했습니다."}]},

    {id:"r4",topic:"work",title:"A Day at the Office",level:"중",
      passage_en:"Daniel works as an engineer at a company that makes car parts. He usually arrives at the office around nine and starts by checking his email. Most of his day is spent testing products and writing reports. He often works [[closely|긴밀하게]] with his colleagues to solve problems quickly. Although the [[deadlines|마감 기한]] can be stressful, he enjoys the feeling of finishing a difficult task. During lunch, he likes to take a short walk to [[clear his head|머리를 식히다]]. After work, he sometimes stays a little longer to prepare for the next day. Daniel finds his job [[challenging|도전적인]], but he is proud of what he does.",
      passage_ko:"다니엘은 자동차 부품을 만드는 회사에서 엔지니어로 일해요. 보통 아홉 시쯤 사무실에 도착해 이메일 확인부터 시작해요. 하루 대부분을 제품을 테스트하고 보고서를 쓰는 데 보내요. 문제를 빠르게 해결하려고 동료들과 긴밀하게 일하는 경우가 많아요. 마감 기한이 스트레스가 될 수 있지만, 그는 어려운 일을 끝냈을 때의 기분을 좋아해요. 점심시간에는 머리를 식히려고 잠깐 산책하는 걸 좋아해요. 퇴근 후에는 다음 날을 준비하느라 가끔 조금 더 남기도 해요. 다니엘은 자신의 일이 도전적이라고 느끼지만, 자기 일에 자부심을 가지고 있어요.",
      questions:[
        {q:"What is Daniel's job?",options:["A car salesman","An engineer","A delivery driver","A manager"],answer:1,explanation:"자동차 부품 회사의 엔지니어라고 했습니다."},
        {q:"What does Daniel do during lunch?",options:["Takes a short walk","Sleeps at his desk","Goes shopping","Visits clients"],answer:0,explanation:"점심시간에 머리를 식히려고 잠깐 산책을 합니다."},
        {q:"How does Daniel feel about his job?",options:["Bored and tired","Challenged but proud","Angry and stressed","Confused"],answer:1,explanation:"도전적이라고 느끼지만 자부심을 가지고 있다고 했습니다."}]},

    {id:"r5",topic:"fitness",title:"Staying Active",level:"중",
      passage_en:"Hyemin started going to the gym about a year ago to [[stay in shape|건강을 유지하다]]. At first, it was hard to wake up early, but now exercise is part of her daily routine. She usually does some [[stretching|스트레칭]] before lifting light weights. On weekends, she prefers to go for a run in the park near her house. She says working out gives her more energy and helps her sleep better at night. Although she is not training for anything special, she feels [[proud|자랑스러운]] of how far she has come. Her goal is simply to stay healthy and feel good.",
      passage_ko:"혜민은 약 1년 전에 건강을 유지하려고 헬스장에 다니기 시작했어요. 처음엔 일찍 일어나는 게 힘들었지만, 이제 운동은 그녀의 일상 중 하나예요. 보통 가벼운 웨이트를 들기 전에 스트레칭을 해요. 주말에는 집 근처 공원에서 달리는 걸 더 좋아해요. 그녀는 운동이 에너지를 더 주고 밤에 잠을 더 잘 자게 해준다고 말해요. 특별히 무언가를 위해 훈련하는 건 아니지만, 지금까지 해온 것이 자랑스럽다고 느껴요. 그녀의 목표는 그저 건강을 유지하고 기분 좋게 지내는 거예요.",
      questions:[
        {q:"Why did Hyemin start going to the gym?",options:["To win a competition","To stay in shape","To make friends","To become a trainer"],answer:1,explanation:"건강을 유지하려고 헬스장에 다니기 시작했다고 했습니다."},
        {q:"What does she do on weekends?",options:["Lifts heavy weights","Goes for a run in the park","Rests all day","Swims at the gym"],answer:1,explanation:"주말에는 집 근처 공원에서 달리는 것을 더 좋아한다고 했습니다."},
        {q:"How does working out affect her?",options:["It makes her tired","It gives her more energy","It costs too much","It hurts her back"],answer:1,explanation:"운동이 에너지를 더 주고 잠을 더 잘 자게 해준다고 했습니다."}]},

    {id:"r6",topic:"restaurant",title:"My Favorite Cafe",level:"중",
      passage_en:"There is a small cafe near my office that I visit almost every day. The staff are friendly, and they already know my [[usual|늘 먹는]] order. I always get an iced americano and sometimes a slice of cheesecake. What I like most is the quiet [[atmosphere|분위기]], which makes it a great place to read or work. On busy days, I just grab my coffee to go, but when I have time, I sit by the window and relax. The prices are reasonable, and the coffee is always fresh. I would definitely [[recommend|추천하다]] this place to anyone who loves a calm cafe.",
      passage_ko:"제 사무실 근처에 거의 매일 가는 작은 카페가 있어요. 직원들이 친절하고, 제가 늘 시키는 주문을 이미 알아요. 저는 항상 아이스 아메리카노를 마시고 가끔 치즈케이크 한 조각을 먹어요. 가장 마음에 드는 건 조용한 분위기인데, 책을 읽거나 일하기에 아주 좋은 곳이에요. 바쁜 날엔 커피만 테이크아웃하지만, 시간이 있을 땐 창가에 앉아 쉬어요. 가격도 합리적이고 커피는 늘 신선해요. 차분한 카페를 좋아하는 사람이라면 누구에게나 이곳을 꼭 추천하고 싶어요.",
      questions:[
        {q:"How often does the writer visit the cafe?",options:["Once a week","Almost every day","Only on weekends","Rarely"],answer:1,explanation:"사무실 근처라 거의 매일 간다고 했습니다."},
        {q:"What does the writer like most about the cafe?",options:["The loud music","The quiet atmosphere","The large size","The free parking"],answer:1,explanation:"가장 좋아하는 점은 조용한 분위기라고 했습니다."},
        {q:"What does the writer usually order?",options:["An iced americano","Green tea","A hamburger","Orange juice"],answer:0,explanation:"항상 아이스 아메리카노를 마신다고 했습니다."}]},

    {id:"r7",topic:"home",title:"My Studio Apartment",level:"중",
      passage_en:"I live alone in a small studio apartment in the city. It is not very big, but it has everything I need. My favorite part is the large window, which lets in plenty of [[sunlight|햇빛]] during the day. I keep my place simple and tidy, with only a bed, a desk, and a few plants. The [[neighborhood|동네]] is quiet, and there is a convenience store right downstairs. The subway station is only five minutes away, which makes commuting very easy. Although the apartment is small, it feels [[cozy|아늑한]] and comfortable. For now, it is the perfect home for me.",
      passage_ko:"저는 도시의 작은 원룸에서 혼자 살아요. 아주 크진 않지만 필요한 건 다 있어요. 가장 마음에 드는 부분은 큰 창문인데, 낮에 햇빛이 많이 들어와요. 침대, 책상, 화분 몇 개만 두고 집을 단순하고 깔끔하게 유지해요. 동네는 조용하고, 바로 아래층에 편의점이 있어요. 지하철역도 5분 거리라 출퇴근이 아주 편해요. 집은 작지만 아늑하고 편안하게 느껴져요. 지금으로선 저에게 딱 맞는 집이에요.",
      questions:[
        {q:"What type of home does the writer live in?",options:["A large house","A small studio apartment","A dormitory","A shared house"],answer:1,explanation:"도시의 작은 원룸에서 혼자 산다고 했습니다."},
        {q:"What is the writer's favorite part of the home?",options:["The large window","The kitchen","The balcony","The garage"],answer:0,explanation:"가장 좋아하는 부분은 큰 창문이라고 했습니다."},
        {q:"Why is commuting easy?",options:["The subway is close","He has a car","He works from home","The bus is free"],answer:0,explanation:"지하철역이 5분 거리라 출퇴근이 편하다고 했습니다."}]},

    {id:"r8",topic:"weather",title:"Four Seasons in Korea",level:"중",
      passage_en:"Korea has four distinct seasons, and each one feels completely different. Spring is mild and full of flowers, so many people enjoy walking outside. Summer is hot and very [[humid|습한]], which can make the days feel longer than they are. In autumn, the weather becomes cool and the leaves turn beautiful colors. Winter is cold and dry, and it sometimes [[snows|눈이 오다]] heavily. My favorite season is autumn because I love the clear sky and comfortable temperature. Before I go out, I always check the [[forecast|예보]] so I know what to wear. The changing seasons are one of the things I love most about living here.",
      passage_ko:"한국에는 뚜렷한 사계절이 있고, 각 계절은 완전히 다르게 느껴져요. 봄은 온화하고 꽃이 가득해서 많은 사람들이 밖에서 산책하는 걸 즐겨요. 여름은 덥고 아주 습해서 하루가 실제보다 길게 느껴질 수 있어요. 가을에는 날씨가 선선해지고 잎이 아름다운 색으로 물들어요. 겨울은 춥고 건조하며 가끔 눈이 많이 내려요. 제가 가장 좋아하는 계절은 가을인데, 맑은 하늘과 쾌적한 기온을 좋아하기 때문이에요. 외출 전에는 무엇을 입을지 알려고 항상 일기예보를 확인해요. 변화하는 계절은 이곳에 사는 것에서 제가 가장 좋아하는 것 중 하나예요.",
      questions:[
        {q:"How many seasons does Korea have?",options:["Two","Three","Four","Five"],answer:2,explanation:"한국에는 뚜렷한 사계절이 있다고 했습니다."},
        {q:"What is the summer weather like?",options:["Cold and dry","Hot and humid","Cool and clear","Mild and windy"],answer:1,explanation:"여름은 덥고 습하다고 했습니다."},
        {q:"Which season does the writer like most?",options:["Spring","Summer","Autumn","Winter"],answer:2,explanation:"맑은 하늘과 쾌적한 기온 때문에 가을을 가장 좋아한다고 했습니다."}]},

    {id:"r9",topic:"recycling",title:"Recycling in Korea",level:"중",
      passage_en:"In Korea, [[recycling|재활용]] is part of everyday life. Each household has to [[separate|분리하다]] its trash into different types, such as paper, plastic, glass, and food waste. There are special bags for general garbage, and people usually take out their recycling on certain days. At first, the rules felt complicated to me, but now I am used to them. I think these rules are helpful because they keep the streets clean and protect the environment. To [[reduce|줄이다]] waste, I also try to use fewer plastic products and carry my own cup. Small habits like these can make a real difference over time.",
      passage_ko:"한국에서는 재활용이 일상생활의 일부예요. 각 가정은 종이, 플라스틱, 유리, 음식물 쓰레기 같은 여러 종류로 쓰레기를 분리해야 해요. 일반 쓰레기용 전용 봉투가 있고, 사람들은 보통 정해진 날에 재활용품을 내놓아요. 처음에는 규칙이 복잡하게 느껴졌지만 지금은 익숙해졌어요. 이런 규칙은 거리를 깨끗하게 유지하고 환경을 보호하기 때문에 도움이 된다고 생각해요. 쓰레기를 줄이기 위해 저는 플라스틱 제품을 덜 쓰고 개인 컵을 가지고 다니려고 해요. 이런 작은 습관들이 시간이 지나면 정말 큰 차이를 만들 수 있어요.",
      questions:[
        {q:"What do households in Korea have to do with their trash?",options:["Burn it","Separate it into types","Bury it","Sell it"],answer:1,explanation:"가정은 쓰레기를 종류별로 분리해야 한다고 했습니다."},
        {q:"How did the writer feel about the rules at first?",options:["Simple","Complicated","Boring","Unfair"],answer:1,explanation:"처음에는 규칙이 복잡하게 느껴졌다고 했습니다."},
        {q:"What does the writer do to reduce waste?",options:["Uses a personal cup","Buys more plastic","Throws everything away","Stops shopping"],answer:0,explanation:"플라스틱을 덜 쓰고 개인 컵을 가지고 다닌다고 했습니다."}]},

    {id:"r10",topic:"tech",title:"Life with Smartphones",level:"중",
      passage_en:"Like most people, I use my smartphone almost all day. In the morning, I check the news and reply to messages before I even get out of bed. My phone is the one [[device|기기]] I really cannot live without. I use it to [[connect|접속하다]] to the internet, take photos, listen to music, and find my way around the city. It has made daily life much more [[convenient|편리한]], but I also try not to depend on it too much. Sometimes I turn it off for a few hours to rest my eyes and focus on other things. Technology is helpful, but balance is important.",
      passage_ko:"대부분의 사람들처럼 저도 하루 종일 스마트폰을 써요. 아침에는 침대에서 일어나기도 전에 뉴스를 확인하고 메시지에 답해요. 제 폰은 정말 없이는 못 사는 유일한 기기예요. 인터넷에 접속하고, 사진을 찍고, 음악을 듣고, 도시에서 길을 찾는 데 써요. 덕분에 일상이 훨씬 편리해졌지만, 너무 의존하지 않으려고도 해요. 가끔은 몇 시간 꺼두고 눈을 쉬게 하고 다른 일에 집중해요. 기술은 유용하지만 균형이 중요해요.",
      questions:[
        {q:"When does the writer first use the phone?",options:["After breakfast","Before getting out of bed","At work","Late at night"],answer:1,explanation:"아침에 침대에서 일어나기도 전에 폰을 쓴다고 했습니다."},
        {q:"What does the writer do to take a break from the phone?",options:["Turns it off for a few hours","Gives it away","Buys a new one","Uses it more"],answer:0,explanation:"가끔 몇 시간 꺼두고 눈을 쉬게 한다고 했습니다."},
        {q:"What is the writer's main point?",options:["Technology is useless","Balance is important","Phones are cheap","He hates technology"],answer:1,explanation:"기술은 유용하지만 균형이 중요하다고 했습니다."}]},

    {id:"r11",topic:"bank",title:"Banking These Days",level:"중",
      passage_en:"These days, I rarely visit a bank in person. Most of my banking is done on my phone, which saves a lot of time. I can check my [[account|계좌]], pay bills, and [[transfer|송금하다]] money in just a few minutes. When I need cash, I simply [[withdraw|인출하다]] it from an ATM near my house. I still remember waiting in long lines at the bank when I was younger. Now, almost everything can be done online, even opening a new account. Mobile banking is convenient, but I am always careful to keep my password safe.",
      passage_ko:"요즘 저는 은행에 직접 가는 일이 거의 없어요. 대부분의 은행 업무를 폰으로 처리하는데, 시간이 많이 절약돼요. 계좌를 확인하고, 공과금을 내고, 송금하는 걸 몇 분 만에 할 수 있어요. 현금이 필요하면 집 근처 ATM에서 그냥 인출해요. 어릴 때 은행에서 긴 줄을 서서 기다리던 게 아직 기억나요. 이제는 새 계좌를 만드는 것까지 거의 모든 걸 온라인으로 할 수 있어요. 모바일 뱅킹은 편리하지만, 비밀번호를 안전하게 지키려고 늘 조심해요.",
      questions:[
        {q:"How does the writer usually do banking?",options:["By visiting the bank","On the phone","By mail","Through a friend"],answer:1,explanation:"대부분의 은행 업무를 폰으로 한다고 했습니다."},
        {q:"Where does the writer get cash?",options:["From an ATM","From a teller","From a friend","From work"],answer:0,explanation:"집 근처 ATM에서 인출한다고 했습니다."},
        {q:"What is the writer careful about?",options:["Keeping the password safe","Saving receipts","Visiting often","Carrying cash"],answer:0,explanation:"비밀번호를 안전하게 지키려고 조심한다고 했습니다."}]},

    {id:"r12",topic:"fashion",title:"My Style",level:"중",
      passage_en:"I would describe my style as simple and practical. Most days, I wear [[comfortable|편안한]] clothes like jeans and a plain shirt. I don't spend much time choosing an [[outfit|옷차림]], but I always make sure it is clean and neat. I am not someone who follows every [[trend|유행]]; instead, I buy clothes that last a long time. For special occasions, of course, I dress up a little more. I believe that good clothes should make you feel confident and comfortable at the same time. In the end, comfort matters more to me than looking fashionable.",
      passage_ko:"제 스타일은 단순하고 실용적이라고 표현하고 싶어요. 대부분의 날에는 청바지와 무난한 셔츠 같은 편안한 옷을 입어요. 옷차림을 고르는 데 시간을 많이 쓰진 않지만, 항상 깨끗하고 단정한지 확인해요. 저는 모든 유행을 따르는 사람은 아니고, 대신 오래 입을 수 있는 옷을 사요. 물론 특별한 날에는 조금 더 차려입어요. 좋은 옷은 자신감과 편안함을 동시에 느끼게 해줘야 한다고 생각해요. 결국 저에게는 멋지게 보이는 것보다 편안함이 더 중요해요.",
      questions:[
        {q:"How does the writer describe their style?",options:["Simple and practical","Bright and bold","Formal and expensive","Always trendy"],answer:0,explanation:"단순하고 실용적이라고 표현했습니다."},
        {q:"Does the writer follow every trend?",options:["Yes, always","No, not every trend","Only in summer","Only at work"],answer:1,explanation:"모든 유행을 따르는 사람은 아니라고 했습니다."},
        {q:"What matters most to the writer?",options:["Comfort","Price","Brand","Color"],answer:0,explanation:"멋지게 보이는 것보다 편안함이 더 중요하다고 했습니다."}]},

    {id:"r13",topic:"geography",title:"The Land of Korea",level:"중",
      passage_en:"Korea is a country located on a [[peninsula|반도]] in East Asia. About seventy percent of its land is covered with [[mountains|산]], so beautiful hiking trails can be found almost everywhere. The country is [[surrounded|둘러싸인]] by the sea on three sides, which means fresh seafood is easy to find. There are also many rivers that flow through the cities and provide water for farming. Because of its clear four seasons, the scenery changes greatly throughout the year. I feel lucky to live in a country with such varied and beautiful nature. Every region has something special to offer.",
      passage_ko:"한국은 동아시아의 반도에 위치한 나라예요. 국토의 약 70%가 산으로 덮여 있어서, 아름다운 등산로를 거의 어디서나 찾을 수 있어요. 나라가 삼면이 바다로 둘러싸여 있어 신선한 해산물을 쉽게 구할 수 있어요. 또한 도시를 가로지르며 흐르고 농사에 물을 공급하는 강도 많아요. 뚜렷한 사계절 덕분에 경치가 일 년 내내 크게 바뀌어요. 이렇게 다양하고 아름다운 자연을 가진 나라에 사는 게 행운이라고 느껴요. 모든 지역이 저마다 특별한 것을 지니고 있어요.",
      questions:[
        {q:"Where is Korea located?",options:["On an island","On a peninsula","In the desert","Inland only"],answer:1,explanation:"동아시아의 반도에 위치해 있다고 했습니다."},
        {q:"About how much of Korea is mountains?",options:["About 30%","About 50%","About 70%","About 90%"],answer:2,explanation:"국토의 약 70%가 산으로 덮여 있다고 했습니다."},
        {q:"Why is fresh seafood easy to find?",options:["It is surrounded by sea on three sides","There are many farms","It is all imported","There are many lakes"],answer:0,explanation:"삼면이 바다로 둘러싸여 있기 때문이라고 했습니다."}]},
    {id:"r14",topic:"selfintro",title:"A Day in Minho's Life",level:"중",
      passage_en:"Minho is a university student who studies computer science in Busan. He wakes up early and goes to the gym before class, because exercise helps him [[focus|집중하다]]. During the day, he attends lectures and works part-time at a cafe. In the evenings, he likes to code small projects for fun. Minho is a [[curious|호기심 많은]] person, and he enjoys learning new skills on his own. On weekends, he usually meets his friends or calls his family back home. His goal is to become a software developer after he [[graduates|졸업하다]].",
      passage_ko:"민호는 부산에서 컴퓨터 공학을 공부하는 대학생이에요. 그는 일찍 일어나 수업 전에 헬스장에 가는데, 운동이 집중하는 데 도움이 되기 때문이에요. 낮에는 강의를 듣고 카페에서 아르바이트를 해요. 저녁에는 재미로 작은 프로젝트를 코딩하는 걸 좋아해요. 민호는 호기심이 많은 사람이라 혼자서 새로운 기술을 배우는 걸 즐겨요. 주말에는 보통 친구들을 만나거나 고향의 가족에게 전화해요. 그의 목표는 졸업 후 소프트웨어 개발자가 되는 거예요.",
      questions:[
        {q:"What does Minho do before class?",options:["He codes projects","He goes to the gym","He meets his family","He works at a cafe"],answer:1,explanation:"민호는 수업 전에 헬스장에 간다고 했습니다."},
        {q:"Why does Minho exercise in the morning?",options:["To meet friends","To earn money","To help him focus","To graduate early"],answer:2,explanation:"운동이 집중하는 데 도움이 되기 때문이라고 했습니다."},
        {q:"What is Minho's goal?",options:["To become a developer","To open a cafe","To travel abroad","To teach coding"],answer:0,explanation:"졸업 후 소프트웨어 개발자가 되는 것이 목표라고 했습니다."}]},
    {id:"r15",topic:"selfintro",title:"About Sujin",level:"초",
      passage_en:"Hello, I'm Sujin. I live in a small town with my parents and my little brother. I work at a bookstore, and I really enjoy it because I love books. In my free time, I like to draw and take walks in the park near my house. My friends say I'm [[friendly|친근한]] and easy to talk to. I'm a little [[shy|수줍어하는]] at first, but I open up quickly once I feel comfortable. I hope to travel more and meet new people this year.",
      passage_ko:"안녕하세요, 저는 수진이에요. 부모님, 남동생과 함께 작은 마을에 살아요. 저는 서점에서 일하는데, 책을 좋아해서 정말 즐거워요. 여가 시간에는 그림을 그리고 집 근처 공원에서 산책하는 걸 좋아해요. 친구들은 제가 친근하고 대화하기 편하다고 말해요. 처음엔 좀 수줍어하지만 편해지면 금방 마음을 열어요. 올해는 여행을 더 다니고 새로운 사람들을 만나고 싶어요.",
      questions:[
        {q:"Where does Sujin work?",options:["At a park","At a bookstore","At a school","At a cafe"],answer:1,explanation:"수진은 서점에서 일한다고 했습니다."},
        {q:"What does Sujin do in her free time?",options:["Reads and sleeps","Draws and takes walks","Works and studies","Cooks and cleans"],answer:1,explanation:"여가 시간에 그림을 그리고 공원에서 산책한다고 했습니다."},
        {q:"How does Sujin describe herself?",options:["Loud and busy","Shy at first but friendly","Serious and quiet","Careless and lazy"],answer:1,explanation:"처음엔 수줍지만 친근하고 금방 마음을 연다고 했습니다."}]},
    {id:"r16",topic:"selfintro",title:"My Friend Daniel",level:"고",
      passage_en:"Daniel is one of the most [[ambitious|야심 있는]] people I know. He works as a marketing manager at a mid-sized company, where he leads a small team. What impresses me most is how he stays calm under pressure, even when [[deadlines|마감 기한]] are tight. Outside of work, he volunteers at a community center and plays in an amateur soccer league. He believes that a good balance between work and personal life is [[essential|필수적인]] for long-term success. Daniel often says that curiosity, not talent, is what keeps him growing.",
      passage_ko:"다니엘은 제가 아는 사람 중 가장 야심 있는 사람 중 한 명이에요. 그는 중견 회사에서 마케팅 매니저로 일하며 작은 팀을 이끌어요. 제가 가장 감명받는 점은 마감이 촉박할 때조차 압박 속에서 침착함을 유지하는 방식이에요. 일 외에는 지역 센터에서 봉사하고 아마추어 축구 리그에서 뛰어요. 그는 일과 개인 생활의 좋은 균형이 장기적인 성공에 필수적이라고 믿어요. 다니엘은 재능이 아니라 호기심이 자신을 계속 성장하게 한다고 자주 말해요.",
      questions:[
        {q:"What is Daniel's job?",options:["A soccer coach","A marketing manager","A volunteer worker","A team of one"],answer:1,explanation:"다니엘은 마케팅 매니저로 일한다고 했습니다."},
        {q:"What impresses the writer most about Daniel?",options:["His soccer skills","His calmness under pressure","His salary","His free time"],answer:1,explanation:"마감이 촉박할 때도 침착함을 유지하는 점에 가장 감명받는다고 했습니다."},
        {q:"What does Daniel believe keeps him growing?",options:["Talent","Money","Curiosity","Luck"],answer:2,explanation:"재능이 아니라 호기심이 성장의 원동력이라고 말했습니다."}]},
    {id:"r17",topic:"hobby",title:"Weekend Baking",level:"중",
      passage_en:"Every Saturday morning, Yuna bakes bread and cookies in her small kitchen. She started this hobby two years ago, when she wanted a way to relax after busy weeks. At first, her bread often came out too hard, but she kept [[practicing|연습하다]] until she got better. Now she enjoys trying new [[recipes|조리법]] and sharing the results with her neighbors. Baking is not cheap, but Yuna thinks it is worth it because it makes her happy. She says the best part is the warm smell that fills her home.",
      passage_ko:"매주 토요일 아침, 유나는 작은 부엌에서 빵과 쿠키를 구워요. 그녀는 2년 전 바쁜 한 주를 보낸 뒤 쉴 방법을 원해서 이 취미를 시작했어요. 처음엔 빵이 너무 딱딱하게 나올 때가 많았지만, 나아질 때까지 계속 연습했어요. 이제는 새로운 조리법을 시도하고 그 결과를 이웃들과 나누는 걸 즐겨요. 베이킹이 저렴하지는 않지만, 유나는 자신을 행복하게 해주기 때문에 그만한 가치가 있다고 생각해요. 가장 좋은 점은 집을 채우는 따뜻한 냄새라고 말해요.",
      questions:[
        {q:"When did Yuna start baking?",options:["Last month","Two years ago","Five years ago","As a child"],answer:1,explanation:"2년 전에 이 취미를 시작했다고 했습니다."},
        {q:"Why did she start this hobby?",options:["To make money","To relax after busy weeks","To feed her neighbors","To open a bakery"],answer:1,explanation:"바쁜 한 주 뒤에 쉴 방법을 원해서 시작했다고 했습니다."},
        {q:"What does Yuna say is the best part?",options:["The money she saves","The warm smell at home","The hard bread","The quiet kitchen"],answer:1,explanation:"집을 채우는 따뜻한 냄새가 가장 좋다고 했습니다."}]},
    {id:"r18",topic:"hobby",title:"Learning the Guitar",level:"초",
      passage_en:"Junho got his first guitar when he was in high school. In the beginning, his fingers hurt and the sound was not good. But he practiced a little every day, and slowly he got better. Now he can play many songs, and he sometimes plays for his friends. Junho likes the guitar because it helps him [[relax|긴장을 풀다]] after school. He says anyone can learn if they are [[patient|인내심 있는]]. His dream is to play in a small band someday.",
      passage_ko:"준호는 고등학교 때 첫 기타를 얻었어요. 처음엔 손가락이 아팠고 소리도 좋지 않았어요. 하지만 매일 조금씩 연습했고, 천천히 실력이 늘었어요. 이제 그는 많은 곡을 칠 수 있고 가끔 친구들 앞에서 연주해요. 준호는 기타가 방과 후에 긴장을 푸는 데 도움이 돼서 좋아해요. 그는 인내심만 있으면 누구나 배울 수 있다고 말해요. 그의 꿈은 언젠가 작은 밴드에서 연주하는 거예요.",
      questions:[
        {q:"When did Junho get his first guitar?",options:["In high school","In college","Last year","As a child"],answer:0,explanation:"고등학교 때 첫 기타를 얻었다고 했습니다."},
        {q:"How did Junho improve?",options:["He took classes","He practiced daily","He joined a band","He bought a new guitar"],answer:1,explanation:"매일 조금씩 연습해서 실력이 늘었다고 했습니다."},
        {q:"What does Junho say is needed to learn?",options:["Money","Talent","Patience","A teacher"],answer:2,explanation:"인내심만 있으면 누구나 배울 수 있다고 했습니다."}]},
    {id:"r19",topic:"hobby",title:"Why I Love Hiking",level:"고",
      passage_en:"For me, hiking is more than just exercise; it is a way to clear my mind. I usually go on weekends, often to a mountain about an hour from the city. The climb can be [[exhausting|진을 빼는]], but the view from the top always makes it worth it. Along the way, I notice small things I would normally miss, like the sound of a stream or the [[scent|향기]] of pine trees. Hiking has taught me to be patient and to [[appreciate|감사하다]] the present moment. I always come home tired but refreshed.",
      passage_ko:"저에게 등산은 단순한 운동 그 이상으로, 마음을 비우는 방법이에요. 저는 보통 주말에, 도시에서 한 시간쯤 떨어진 산으로 자주 가요. 오르막은 진을 뺄 수 있지만, 정상에서 보는 풍경이 언제나 그만한 가치를 느끼게 해요. 가는 길에 저는 평소라면 놓쳤을 작은 것들, 이를테면 개울 소리나 소나무 향기를 알아차려요. 등산은 저에게 인내심을 갖고 현재의 순간에 감사하는 법을 가르쳐줬어요. 저는 늘 지쳐서 돌아오지만 상쾌해요.",
      questions:[
        {q:"What is hiking to the writer?",options:["Just exercise","A way to clear the mind","A job","A team sport"],answer:1,explanation:"등산은 단순한 운동 이상으로 마음을 비우는 방법이라고 했습니다."},
        {q:"What makes the climb worth it?",options:["The scent of pine","The view from the top","The exercise","The stream"],answer:1,explanation:"정상에서 보는 풍경이 그만한 가치를 느끼게 한다고 했습니다."},
        {q:"What has hiking taught the writer?",options:["To be patient and appreciate the moment","To climb faster","To avoid the city","To hike alone"],answer:0,explanation:"인내심을 갖고 현재의 순간에 감사하는 법을 배웠다고 했습니다."}]},
    {id:"r20",topic:"travel",title:"A Trip to Busan",level:"중",
      passage_en:"Last summer, I took a trip to Busan with two close friends. We traveled by train, which was comfortable and gave us a nice view of the countryside. On the first day, we visited the beach and watched the sunset over the sea. The next morning, we explored a busy market and tried fresh seafood. The trip was not expensive because we planned everything in [[advance|미리]]. What I enjoyed most was simply spending time with my friends. We already want to go back and explore more of the city.",
      passage_ko:"지난여름, 저는 친한 친구 두 명과 부산으로 여행을 갔어요. 우리는 기차로 이동했는데, 편안했고 시골 풍경도 잘 보였어요. 첫날에는 해변에 가서 바다 위로 지는 노을을 봤어요. 다음 날 아침에는 붐비는 시장을 둘러보고 신선한 해산물을 먹어봤어요. 모든 걸 미리 계획해서 여행 비용이 비싸지 않았어요. 제가 가장 즐거웠던 건 그저 친구들과 시간을 보낸 거예요. 우리는 벌써 다시 가서 도시를 더 둘러보고 싶어요.",
      questions:[
        {q:"How did they travel to Busan?",options:["By car","By train","By plane","By bus"],answer:1,explanation:"기차로 이동했다고 했습니다."},
        {q:"Why was the trip not expensive?",options:["They stayed one day","They planned in advance","They didn't eat out","They walked everywhere"],answer:1,explanation:"모든 걸 미리 계획해서 비싸지 않았다고 했습니다."},
        {q:"What did the writer enjoy most?",options:["The seafood","The train","Time with friends","The market"],answer:2,explanation:"친구들과 시간을 보낸 것이 가장 즐거웠다고 했습니다."}]},
    {id:"r21",topic:"travel",title:"My First Solo Trip",level:"고",
      passage_en:"Traveling alone for the first time felt both exciting and a little [[frightening|무서운]]. I chose a quiet coastal town where I knew no one. Without friends to rely on, I had to make every decision myself, from where to eat to which streets to explore. At times I felt lonely, but I also gained a strong sense of [[independence|독립심]]. I learned to enjoy my own company and to trust my [[instincts|직감]]. By the end of the trip, I felt more confident than ever. That experience changed the way I see myself.",
      passage_ko:"처음으로 혼자 여행하는 건 설레면서도 조금 무서웠어요. 저는 아는 사람이 아무도 없는 조용한 해안 마을을 골랐어요. 의지할 친구가 없어서 어디서 먹을지, 어느 거리를 둘러볼지까지 모든 결정을 스스로 해야 했어요. 때로는 외로웠지만, 강한 독립심도 얻었어요. 저는 혼자만의 시간을 즐기고 제 직감을 믿는 법을 배웠어요. 여행이 끝날 무렵 저는 그 어느 때보다 자신감이 생겼어요. 그 경험은 제가 스스로를 보는 방식을 바꿔놨어요.",
      questions:[
        {q:"How did the writer feel about the solo trip at first?",options:["Bored","Excited but a little scared","Angry","Completely calm"],answer:1,explanation:"설레면서도 조금 무서웠다고 했습니다."},
        {q:"What did the writer gain from traveling alone?",options:["New friends","A sense of independence","A lot of money","A new job"],answer:1,explanation:"강한 독립심을 얻었다고 했습니다."},
        {q:"How did the writer feel by the end?",options:["More confident","More lonely","More tired","More worried"],answer:0,explanation:"그 어느 때보다 자신감이 생겼다고 했습니다."}]},
    {id:"r22",topic:"travel",title:"Packing for a Trip",level:"초",
      passage_en:"When I plan a trip, packing is always the hardest part for me. I try to bring only what I really need, but I often pack too much. I always make a short list before I start, so I don't [[forget|잊다]] anything important. My most important item is a portable charger, because my phone dies quickly. I also pack light clothes that are easy to [[fold|접다]]. These days, I try to travel with just one small bag. It makes moving around much easier.",
      passage_ko:"여행을 계획할 때, 짐 싸기는 저에게 항상 가장 어려운 부분이에요. 저는 정말 필요한 것만 챙기려 하지만, 종종 너무 많이 싸요. 저는 시작하기 전에 항상 짧은 목록을 만들어서 중요한 걸 잊지 않아요. 제 가장 중요한 물건은 보조 배터리인데, 폰이 빨리 닳기 때문이에요. 또 접기 쉬운 가벼운 옷을 챙겨요. 요즘 저는 작은 가방 하나만 들고 여행하려고 해요. 그게 돌아다니기를 훨씬 편하게 만들어줘요.",
      questions:[
        {q:"What is the hardest part of a trip for the writer?",options:["Booking hotels","Packing","Finding food","Buying tickets"],answer:1,explanation:"짐 싸기가 항상 가장 어려운 부분이라고 했습니다."},
        {q:"Why is a portable charger important?",options:["It is cheap","The phone dies quickly","It is light","It is small"],answer:1,explanation:"폰이 빨리 닳기 때문에 보조 배터리가 중요하다고 했습니다."},
        {q:"How does the writer try to travel these days?",options:["With one small bag","With two suitcases","Without a bag","With a friend's bag"],answer:0,explanation:"작은 가방 하나만 들고 여행하려 한다고 했습니다."}]},
    {id:"r23",topic:"restaurant",title:"My Favorite Cafe",level:"초",
      passage_en:"There is a small cafe near my house that I visit almost every weekend. It is quiet and has warm lighting, so it is a great place to read. My go-to order is an iced americano and a slice of cheesecake. The staff are [[friendly|친절한]], and they remember my usual order. The cafe is a little more expensive than others, but I think it is worth it. I like to sit by the window and watch people walk by. It is my favorite place to relax.",
      passage_ko:"우리 집 근처에 제가 거의 매주 주말마다 가는 작은 카페가 있어요. 조용하고 조명이 따뜻해서 책 읽기에 아주 좋은 곳이에요. 제가 늘 시키는 건 아이스 아메리카노와 치즈케이크 한 조각이에요. 직원들이 친절하고 제 단골 주문을 기억해요. 그 카페는 다른 곳보다 조금 비싸지만, 그만한 가치가 있다고 생각해요. 저는 창가에 앉아 지나가는 사람들을 보는 걸 좋아해요. 제가 가장 좋아하는 쉬는 장소예요.",
      questions:[
        {q:"How often does the writer visit the cafe?",options:["Every day","Almost every weekend","Once a month","Rarely"],answer:1,explanation:"거의 매주 주말마다 간다고 했습니다."},
        {q:"What is the writer's go-to order?",options:["Tea and cake","Iced americano and cheesecake","Coffee only","Water"],answer:1,explanation:"아이스 아메리카노와 치즈케이크를 늘 시킨다고 했습니다."},
        {q:"Why does the writer like the cafe despite the price?",options:["It is close","It is worth it","It is new","It is large"],answer:1,explanation:"조금 비싸지만 그만한 가치가 있다고 했습니다."}]},
    {id:"r24",topic:"restaurant",title:"Eating Out in Seoul",level:"중",
      passage_en:"Seoul is a great city for people who love to eat out. From tiny noodle shops to fancy restaurants, there is something for every [[budget|예산]]. On busy weekends, popular places often have long lines, so many people book a table in advance. I usually go out with my coworkers for lunch, and we like to try different dishes to share. One thing I've noticed is that portions are often [[generous|푸짐한]], so we rarely leave hungry. Eating out is not only about the food; it is also a way to [[connect|교류하다]] with others.",
      passage_ko:"서울은 외식을 좋아하는 사람들에게 좋은 도시예요. 작은 국숫집부터 고급 식당까지, 어떤 예산에도 맞는 곳이 있어요. 붐비는 주말에는 인기 있는 곳에 줄이 길어서 많은 사람들이 미리 자리를 예약해요. 저는 보통 동료들과 점심을 먹으러 나가고, 여러 요리를 나눠 먹는 걸 좋아해요. 한 가지 알아차린 건 양이 보통 푸짐해서 배고픈 채로 나오는 일이 거의 없다는 거예요. 외식은 음식만의 문제가 아니라 다른 사람들과 교류하는 방법이기도 해요.",
      questions:[
        {q:"What does the passage say about Seoul?",options:["It has few restaurants","It suits every budget","It is only for the rich","It has no lines"],answer:1,explanation:"작은 곳부터 고급 식당까지 어떤 예산에도 맞는다고 했습니다."},
        {q:"Why do people book a table in advance?",options:["Food is cheaper","Popular places have long lines","It is required","To get a discount"],answer:1,explanation:"주말에 인기 있는 곳은 줄이 길어서 미리 예약한다고 했습니다."},
        {q:"According to the writer, eating out is also a way to do what?",options:["Save money","Connect with others","Lose weight","Stay home"],answer:1,explanation:"외식은 다른 사람들과 교류하는 방법이기도 하다고 했습니다."}]},
    {id:"r25",topic:"restaurant",title:"A Memorable Dinner",level:"고",
      passage_en:"One of the most memorable meals I've had was at a small family-run restaurant in the countryside. The place looked plain from the outside, but the food was [[remarkable|놀라운]]. Everything was made from fresh, local [[ingredients|재료]], and you could taste the difference. The owner personally greeted each table and explained how the dishes were prepared. Although the meal took nearly two hours, no one felt rushed. That evening taught me that a great dining experience is about more than just taste; it is also about [[atmosphere|분위기]] and care.",
      passage_ko:"제가 먹어본 가장 기억에 남는 식사 중 하나는 시골의 작은 가족 운영 식당에서였어요. 겉보기에는 소박했지만 음식은 놀라웠어요. 모든 게 신선한 지역 재료로 만들어졌고, 그 차이를 맛으로 느낄 수 있었어요. 주인이 직접 각 테이블에 인사하며 요리가 어떻게 준비되었는지 설명해줬어요. 식사가 거의 두 시간이나 걸렸지만 아무도 서두르는 기분이 들지 않았어요. 그날 저녁은 훌륭한 식사 경험이 단지 맛만의 문제가 아니라 분위기와 정성에 관한 것이기도 하다는 걸 가르쳐줬어요.",
      questions:[
        {q:"What was special about the restaurant's food?",options:["It was cheap","It used fresh local ingredients","It was fast","It was foreign"],answer:1,explanation:"신선한 지역 재료로 만들어져 차이를 맛으로 느낄 수 있었다고 했습니다."},
        {q:"What did the owner do?",options:["Cooked outside","Greeted each table personally","Rushed the guests","Stayed in the kitchen"],answer:1,explanation:"주인이 직접 각 테이블에 인사하며 요리를 설명했다고 했습니다."},
        {q:"What did the evening teach the writer?",options:["Dining is only about taste","Atmosphere and care matter too","Meals should be quick","Local food is expensive"],answer:1,explanation:"훌륭한 식사는 맛뿐 아니라 분위기와 정성에 관한 것이라고 배웠습니다."}]},

    {id:"r26",topic:"home",title:"Moving Day",level:"초",
      passage_en:"Last month, I moved to a new apartment. Moving day was very busy. I packed all my things in big boxes and put [[labels|라벨, 이름표]] on them. My friends came to help me carry the [[furniture|가구]]. We moved the sofa, the bed, and my desk. It took all day, but we finished before dinner. That night, I ordered pizza for everyone. Now I am slowly [[unpacking|짐을 풀기]] the boxes. My new home is small, but it feels warm and cozy.",
      passage_ko:"지난달에 저는 새 아파트로 이사했습니다. 이삿날은 매우 바빴습니다. 저는 모든 물건을 큰 상자에 싸고 라벨을 붙였습니다. 친구들이 가구 옮기는 것을 도와주러 왔습니다. 우리는 소파, 침대, 그리고 제 책상을 옮겼습니다. 하루 종일 걸렸지만 저녁 전에 끝냈습니다. 그날 밤 저는 모두를 위해 피자를 주문했습니다. 지금은 천천히 상자에서 짐을 풀고 있습니다. 새집은 작지만 따뜻하고 아늑하게 느껴집니다.",
      questions:[
        {q:"Who helped the writer move the furniture?",options:["A moving company","The writer's friends","The writer's family","The apartment manager"],answer:1,explanation:"본문에서 'My friends came to help me carry the furniture'라고 했으므로 친구들이 도와주었습니다."},
        {q:"What did the writer do that night?",options:["Unpacked all the boxes","Went to a restaurant","Ordered pizza for everyone","Bought new furniture"],answer:2,explanation:"'That night, I ordered pizza for everyone'이라고 명시되어 있습니다."},
        {q:"How does the writer feel about the new home?",options:["It is too small and cold","It is warm and cozy","It is too far from work","It is noisy"],answer:1,explanation:"마지막 문장에서 'it feels warm and cozy'라고 표현했습니다."}]},
    {id:"r27",topic:"home",title:"My Favorite Room",level:"중",
      passage_en:"My favorite room in my house is the living room. It faces south, so it gets plenty of [[sunlight|햇빛]] during the day. I placed a large bookshelf against one wall and a comfortable armchair next to the window. On weekends, I like to sit there with a cup of coffee and read for hours. I also added some [[houseplants|실내 식물]] last year, which make the air feel fresher. The room is not fancy, but its [[atmosphere|분위기]] is calm and peaceful. Whenever I feel stressed, spending time in this room helps me relax and recharge.",
      passage_ko:"우리 집에서 제가 가장 좋아하는 방은 거실입니다. 남향이라 낮 동안 햇빛이 많이 들어옵니다. 저는 한쪽 벽에 큰 책장을 놓고 창가에는 편안한 안락의자를 두었습니다. 주말에는 커피 한 잔을 들고 거기 앉아 몇 시간씩 책을 읽는 것을 좋아합니다. 작년에는 실내 식물도 몇 개 들였는데, 공기가 더 상쾌하게 느껴집니다. 화려한 방은 아니지만 분위기가 차분하고 평화롭습니다. 스트레스를 받을 때마다 이 방에서 시간을 보내면 긴장이 풀리고 재충전이 됩니다.",
      questions:[
        {q:"Why does the living room get plenty of sunlight?",options:["It has many lamps","It faces south","It has glass walls","It is on the top floor"],answer:1,explanation:"'It faces south, so it gets plenty of sunlight'이라고 남향이기 때문임을 밝히고 있습니다."},
        {q:"What did the writer add to the room last year?",options:["A large bookshelf","An armchair","Houseplants","A coffee machine"],answer:2,explanation:"'I also added some houseplants last year'라고 했습니다. 책장과 안락의자는 이미 배치된 것입니다."},
        {q:"What does the writer do in this room when stressed?",options:["Watches TV to forget problems","Spends time there to relax and recharge","Cleans the room thoroughly","Calls friends for advice"],answer:1,explanation:"마지막 문장에서 스트레스를 받으면 이 방에서 시간을 보내며 'relax and recharge'한다고 했습니다."}]},
    {id:"r28",topic:"home",title:"Living Alone vs. Living with Family",level:"고",
      passage_en:"After living with my parents for most of my life, I moved out two years ago, and the change taught me more than I expected. Living alone offers [[independence|독립, 자립]], but it also comes with [[responsibilities|책임]] that are easy to underestimate: paying bills on time, cooking every meal, and dealing with repairs by myself. At first, I often felt lonely on quiet evenings. However, I gradually built routines that made the apartment feel like home. Looking back, I would not [[trade|맞바꾸다]] this experience for anything, because managing a household on my own has made me far more capable and confident.",
      passage_ko:"인생의 대부분을 부모님과 함께 살다가 2년 전 독립했는데, 그 변화는 예상보다 많은 것을 가르쳐 주었습니다. 혼자 사는 것은 독립을 주지만, 과소평가하기 쉬운 책임도 따라옵니다. 제때 공과금을 내고, 매 끼니를 요리하고, 수리 문제를 혼자 처리하는 것 말입니다. 처음에는 조용한 저녁마다 자주 외로웠습니다. 하지만 점차 아파트를 집처럼 느끼게 해 주는 루틴을 만들었습니다. 돌이켜 보면, 이 경험을 무엇과도 바꾸지 않을 것입니다. 혼자 살림을 꾸려 온 것이 저를 훨씬 유능하고 자신감 있게 만들었기 때문입니다.",
      questions:[
        {q:"When did the writer move out of the parents' house?",options:["Last month","Two years ago","Ten years ago","The writer still lives with parents"],answer:1,explanation:"'I moved out two years ago'라고 명시되어 있습니다."},
        {q:"Which is NOT mentioned as a responsibility of living alone?",options:["Paying bills on time","Cooking every meal","Dealing with repairs","Taking care of pets"],answer:3,explanation:"본문에는 공과금, 요리, 수리가 언급되었고 반려동물 돌보기는 언급되지 않았습니다."},
        {q:"How does the writer evaluate the experience of living alone?",options:["It was a mistake and lonely","It made the writer more capable and confident","It was too expensive to continue","It was easier than expected"],answer:1,explanation:"마지막 문장에서 혼자 살림을 꾸린 경험이 자신을 'far more capable and confident'하게 만들었다고 긍정적으로 평가합니다."}]},
    {id:"r29",topic:"work",title:"My First Day at Work",level:"초",
      passage_en:"I still remember my first day at my company. I was very nervous, so I arrived thirty minutes early. My team leader showed me around the office and introduced me to my [[coworkers|동료들]]. Everyone was kind and welcomed me warmly. At lunch, we went to a small restaurant near the office together. In the afternoon, I set up my computer and read some [[documents|문서, 서류]] about my new job. The day passed quickly. When I went home, I was tired but happy. It was a good [[beginning|시작]].",
      passage_ko:"저는 아직도 회사에서의 첫날을 기억합니다. 너무 긴장해서 30분 일찍 도착했습니다. 팀장님이 사무실을 안내해 주시고 동료들에게 저를 소개해 주셨습니다. 모두 친절했고 저를 따뜻하게 맞아 주었습니다. 점심에는 다 함께 사무실 근처의 작은 식당에 갔습니다. 오후에는 컴퓨터를 설정하고 새 업무에 관한 문서를 읽었습니다. 하루가 빨리 지나갔습니다. 집에 갈 때 피곤했지만 행복했습니다. 좋은 시작이었습니다.",
      questions:[
        {q:"Why did the writer arrive thirty minutes early?",options:["The bus came early","The writer was very nervous","There was a morning meeting","The team leader asked for it"],answer:1,explanation:"'I was very nervous, so I arrived thirty minutes early'라고 긴장했기 때문임을 밝혔습니다."},
        {q:"Where did the writer have lunch?",options:["At the office cafeteria","At home","At a small restaurant near the office","The writer skipped lunch"],answer:2,explanation:"'we went to a small restaurant near the office together'라고 했습니다."},
        {q:"How did the writer feel at the end of the day?",options:["Tired but happy","Bored and sleepy","Angry and stressed","Scared and worried"],answer:0,explanation:"'I was tired but happy'라고 하루를 마무리하는 감정을 표현했습니다."}]},
    {id:"r30",topic:"work",title:"Working from Home",level:"중",
      passage_en:"My company allows employees to work from home twice a week, and I have mixed feelings about it. On the positive side, I save almost two hours of [[commuting|통근]] time, and I can focus deeply without office noise. I also enjoy having lunch in my own kitchen. On the other hand, [[communication|의사소통]] with my team is sometimes slower because we rely on messages instead of quick conversations. I also find it harder to separate work from rest when both happen in the same space. Overall, I think a [[hybrid|혼합형의, 하이브리드]] schedule gives me the best of both worlds.",
      passage_ko:"우리 회사는 직원들이 주 2회 재택근무를 할 수 있게 해 주는데, 저는 이에 대해 복합적인 감정이 있습니다. 긍정적인 면으로는 통근 시간을 거의 두 시간 절약하고, 사무실 소음 없이 깊이 집중할 수 있습니다. 제 부엌에서 점심을 먹는 것도 좋습니다. 반면, 빠른 대화 대신 메시지에 의존하다 보니 팀과의 의사소통이 가끔 느려집니다. 또한 일과 휴식이 같은 공간에서 이루어지다 보니 둘을 분리하기가 더 어렵습니다. 전반적으로 하이브리드 근무 일정이 양쪽의 장점을 모두 준다고 생각합니다.",
      questions:[
        {q:"How often can employees work from home?",options:["Every day","Once a month","Twice a week","Only on Fridays"],answer:2,explanation:"'work from home twice a week'라고 주 2회임을 명시했습니다."},
        {q:"What problem does the writer mention about working from home?",options:["The internet is too slow","Communication with the team is sometimes slower","Lunch costs more money","The commute takes longer"],answer:1,explanation:"'communication with my team is sometimes slower'가 단점으로 언급되었습니다."},
        {q:"What is the writer's overall conclusion?",options:["Working from home should be banned","Office work is always better","A hybrid schedule is the best option","The writer wants to work from home every day"],answer:2,explanation:"마지막 문장에서 'a hybrid schedule gives me the best of both worlds'라고 결론지었습니다."}]},
    {id:"r31",topic:"work",title:"A Project I Am Proud Of",level:"고",
      passage_en:"Last year, our team was asked to redesign a product under a very tight [[deadline|마감 기한]]. At first, the schedule seemed impossible, and several members doubted we could deliver on time. Instead of panicking, we broke the project into small weekly goals and reviewed our progress every Friday. When unexpected problems appeared, we adjusted the plan rather than blaming each other. In the end, we finished three days early, and the client praised the quality of our work. That project taught me that clear [[priorities|우선순위]] and honest communication matter more than working overtime. It remains my proudest professional [[achievement|성취, 업적]].",
      passage_ko:"작년에 우리 팀은 매우 촉박한 마감 기한 안에 제품을 재설계해 달라는 요청을 받았습니다. 처음에는 일정이 불가능해 보였고, 몇몇 팀원은 제때 끝낼 수 있을지 의심했습니다. 우리는 당황하는 대신 프로젝트를 작은 주간 목표로 나누고 매주 금요일에 진행 상황을 점검했습니다. 예상치 못한 문제가 나타났을 때는 서로를 탓하기보다 계획을 조정했습니다. 결국 우리는 3일 일찍 끝냈고, 고객은 우리 작업의 품질을 칭찬했습니다. 그 프로젝트는 명확한 우선순위와 솔직한 의사소통이 야근보다 더 중요하다는 것을 가르쳐 주었습니다. 그것은 여전히 제가 가장 자랑스러워하는 직업적 성취입니다.",
      questions:[
        {q:"How did the team manage the tight schedule?",options:["They worked overtime every night","They broke the project into small weekly goals","They hired more people","They asked the client for more time"],answer:1,explanation:"'we broke the project into small weekly goals and reviewed our progress every Friday'라고 했습니다."},
        {q:"What happened when unexpected problems appeared?",options:["The team blamed each other","The project was canceled","The team adjusted the plan","The deadline was extended"],answer:2,explanation:"'we adjusted the plan rather than blaming each other'라고 명시되어 있습니다."},
        {q:"What lesson did the writer learn from the project?",options:["Working overtime is the key to success","Clear priorities and honest communication matter most","Clients always change their minds","Tight deadlines should be refused"],answer:1,explanation:"'clear priorities and honest communication matter more than working overtime'이 핵심 교훈입니다."}]},
    {id:"r32",topic:"fitness",title:"Morning Jogging",level:"초",
      passage_en:"I go jogging every morning before work. I wake up at six, put on my running shoes, and go to the park near my house. In the morning, the air is fresh and the park is quiet. I usually run for about thirty minutes. After jogging, I do some simple [[stretching|스트레칭]] to relax my [[muscles|근육]]. Then I take a shower and eat breakfast. Jogging gives me [[energy|에너지, 활력]] for the whole day. On rainy days, I cannot run outside, so I exercise at home instead.",
      passage_ko:"저는 매일 아침 출근 전에 조깅을 합니다. 6시에 일어나 러닝화를 신고 집 근처 공원에 갑니다. 아침에는 공기가 상쾌하고 공원이 조용합니다. 저는 보통 30분 정도 달립니다. 조깅 후에는 근육을 풀기 위해 간단한 스트레칭을 합니다. 그다음 샤워를 하고 아침을 먹습니다. 조깅은 하루 종일 쓸 에너지를 줍니다. 비 오는 날에는 밖에서 달릴 수 없어서 대신 집에서 운동합니다.",
      questions:[
        {q:"What time does the writer wake up?",options:["At five","At six","At seven","At eight"],answer:1,explanation:"'I wake up at six'라고 명시되어 있습니다."},
        {q:"What does the writer do right after jogging?",options:["Eats breakfast","Takes a shower","Does simple stretching","Goes to work"],answer:2,explanation:"'After jogging, I do some simple stretching'이라고 했고, 샤워와 아침 식사는 그 다음입니다."},
        {q:"What does the writer do on rainy days?",options:["Skips exercise","Runs with an umbrella","Goes to a gym","Exercises at home"],answer:3,explanation:"'On rainy days ... I exercise at home instead'라고 했습니다."}]},
    {id:"r33",topic:"fitness",title:"Joining a Gym",level:"중",
      passage_en:"Three months ago, I joined a gym near my office because I was sitting all day and my back started to hurt. At first, I had no idea how to use the machines, so I signed up for two sessions with a personal [[trainer|트레이너, 코치]]. He taught me the correct [[posture|자세]] for basic exercises like squats and deadlifts. Now I work out three times a week, usually after work. My back pain has almost disappeared, and I sleep much better than before. The monthly fee is a little expensive, but I consider it an [[investment|투자]] in my health.",
      passage_ko:"3개월 전, 하루 종일 앉아 있다 보니 허리가 아프기 시작해서 회사 근처 헬스장에 등록했습니다. 처음에는 기구 사용법을 전혀 몰라서 퍼스널 트레이너와 2회 세션을 신청했습니다. 그는 스쿼트와 데드리프트 같은 기본 운동의 올바른 자세를 가르쳐 주었습니다. 지금은 주 3회, 주로 퇴근 후에 운동합니다. 허리 통증은 거의 사라졌고, 전보다 잠도 훨씬 잘 잡니다. 월 회비가 조금 비싸지만, 저는 그것을 건강에 대한 투자라고 생각합니다.",
      questions:[
        {q:"Why did the writer join a gym?",options:["To make new friends","Because of back pain from sitting all day","To prepare for a marathon","Because the gym was free"],answer:1,explanation:"'I was sitting all day and my back started to hurt'가 헬스장 등록의 이유입니다."},
        {q:"What did the personal trainer teach the writer?",options:["How to run faster","A special diet plan","The correct posture for basic exercises","How to swim"],answer:2,explanation:"'He taught me the correct posture for basic exercises'라고 했습니다."},
        {q:"How does the writer feel about the monthly fee?",options:["It is too expensive to continue","It is cheaper than expected","It is an investment in health","The company pays for it"],answer:2,explanation:"'I consider it an investment in my health'라고 회비를 긍정적으로 받아들입니다."}]},
    {id:"r34",topic:"fitness",title:"Why Consistency Beats Intensity",level:"고",
      passage_en:"When people start exercising, they often push themselves too hard in the first week and then quit. I made the same mistake several times before I understood a simple truth: [[consistency|꾸준함, 일관성]] beats [[intensity|강도]]. Exercising lightly four times a week for a year will change your body far more than one exhausting month. The key is to lower the barrier: keep your gym bag ready, choose a place close to home, and never plan workouts that you secretly dread. Once exercise becomes a [[habit|습관]], like brushing your teeth, motivation stops being necessary. Discipline gets you started, but routine keeps you going.",
      passage_ko:"사람들은 운동을 시작할 때 첫 주에 지나치게 무리하다가 그만두는 경우가 많습니다. 저도 같은 실수를 여러 번 한 뒤에야 간단한 진리를 이해했습니다. 꾸준함이 강도를 이긴다는 것입니다. 1년 동안 주 4회 가볍게 운동하는 것이 진 빠지는 한 달보다 몸을 훨씬 크게 바꿉니다. 핵심은 문턱을 낮추는 것입니다. 운동 가방을 항상 준비해 두고, 집에서 가까운 곳을 고르고, 속으로 두려워하는 운동은 절대 계획하지 마세요. 운동이 양치질처럼 습관이 되면 동기부여는 더 이상 필요하지 않습니다. 규율은 시작하게 해 주지만, 계속하게 해 주는 것은 루틴입니다.",
      questions:[
        {q:"What mistake do many beginners make?",options:["They exercise too lightly","They push too hard at first and then quit","They only exercise at home","They spend too much on equipment"],answer:1,explanation:"'they often push themselves too hard in the first week and then quit'이 초보자의 흔한 실수로 제시됩니다."},
        {q:"Which is mentioned as a way to lower the barrier to exercise?",options:["Hiring an expensive trainer","Keeping your gym bag ready","Exercising only on weekends","Buying new shoes every month"],answer:1,explanation:"'keep your gym bag ready'가 문턱을 낮추는 방법 중 하나로 언급됩니다."},
        {q:"According to the writer, what happens when exercise becomes a habit?",options:["Motivation stops being necessary","The body stops improving","Workouts become boring","You need a stricter plan"],answer:0,explanation:"'Once exercise becomes a habit ... motivation stops being necessary'라고 했습니다."}]},
    {id:"r35",topic:"tech",title:"My New Wireless Earphones",level:"초",
      passage_en:"Last week, I bought new [[wireless|무선의]] earphones. My old ones were broken, so I needed a new pair. The new earphones are small and light. The sound is very clear, and the [[battery|배터리]] lasts about eight hours. I use them every day on the subway to listen to music and podcasts. They also have a [[noise-canceling|소음 차단]] mode, so I cannot hear the loud train sounds. The price was a little high, but I am very happy with them. Good earphones make my commute much more enjoyable.",
      passage_ko:"지난주에 저는 새 무선 이어폰을 샀습니다. 예전 것이 고장 나서 새것이 필요했습니다. 새 이어폰은 작고 가볍습니다. 소리가 매우 선명하고 배터리는 약 8시간 지속됩니다. 저는 매일 지하철에서 음악과 팟캐스트를 들을 때 사용합니다. 소음 차단 모드도 있어서 시끄러운 열차 소리가 들리지 않습니다. 가격은 조금 비쌌지만 매우 만족합니다. 좋은 이어폰은 제 통근을 훨씬 즐겁게 만들어 줍니다.",
      questions:[
        {q:"Why did the writer buy new earphones?",options:["The old ones were broken","They were on sale","A friend recommended them","The old ones were lost"],answer:0,explanation:"'My old ones were broken, so I needed a new pair'라고 이유를 밝혔습니다."},
        {q:"How long does the battery last?",options:["About four hours","About six hours","About eight hours","About ten hours"],answer:2,explanation:"'the battery lasts about eight hours'라고 명시되어 있습니다."},
        {q:"Where does the writer usually use the earphones?",options:["At the gym","On the subway","At the office","At home"],answer:1,explanation:"'I use them every day on the subway'라고 했습니다."}]},
    {id:"r36",topic:"tech",title:"Online Shopping Habits",level:"중",
      passage_en:"These days, I buy almost everything online, from groceries to electronics. Shopping [[apps|앱, 애플리케이션]] make the process incredibly easy: I can compare prices, read [[reviews|후기, 리뷰]] from other buyers, and get most items delivered the next morning. However, this convenience has a downside. Because buying takes only a few taps, I sometimes order things I do not really need. Last month, I was surprised by my credit card bill. So I made a new rule: I keep items in my cart for two days before paying. This simple [[strategy|전략]] has already reduced my impulse purchases significantly.",
      passage_ko:"요즘 저는 식료품부터 전자제품까지 거의 모든 것을 온라인으로 삽니다. 쇼핑 앱은 그 과정을 놀라울 만큼 쉽게 만들어 줍니다. 가격을 비교하고, 다른 구매자의 후기를 읽고, 대부분의 물건을 다음 날 아침에 배송받을 수 있습니다. 하지만 이 편리함에는 단점이 있습니다. 몇 번의 터치만으로 구매가 끝나기 때문에 가끔 정말 필요하지 않은 것을 주문하기도 합니다. 지난달에는 신용카드 청구서를 보고 놀랐습니다. 그래서 새 규칙을 만들었습니다. 결제하기 전에 물건을 장바구니에 이틀 동안 두는 것입니다. 이 간단한 전략은 이미 제 충동구매를 크게 줄였습니다.",
      questions:[
        {q:"What advantage of shopping apps is mentioned?",options:["Free items every month","Comparing prices and reading reviews","Meeting other shoppers","Unlimited returns"],answer:1,explanation:"'I can compare prices, read reviews from other buyers'가 장점으로 언급됩니다."},
        {q:"What surprised the writer last month?",options:["A delivery mistake","The credit card bill","A broken product","A price increase"],answer:1,explanation:"'Last month, I was surprised by my credit card bill'이라고 했습니다."},
        {q:"What is the writer's new rule?",options:["Shopping only on weekends","Using cash instead of cards","Keeping items in the cart for two days before paying","Deleting all shopping apps"],answer:2,explanation:"'I keep items in my cart for two days before paying'가 새 규칙입니다."}]},
    {id:"r37",topic:"tech",title:"AI in Everyday Life",level:"고",
      passage_en:"[[Artificial intelligence|인공지능]] has quietly become part of my daily routine. In the morning, my phone summarizes the news it thinks I will care about. At work, I use an AI assistant to draft emails and translate documents, which saves me at least an hour a day. Even my banking app uses AI to detect unusual [[transactions|거래]]. Still, I try to stay careful. AI tools sometimes sound confident while being wrong, so I always [[verify|검증하다, 확인하다]] important information myself. In my view, AI is like a talented but inexperienced assistant: extremely useful, as long as you review its work before trusting it.",
      passage_ko:"인공지능은 어느새 제 일상의 일부가 되었습니다. 아침이면 휴대폰이 제가 관심 가질 만한 뉴스를 요약해 줍니다. 직장에서는 AI 비서로 이메일 초안을 쓰고 문서를 번역하는데, 하루에 최소 한 시간은 절약됩니다. 은행 앱조차 AI로 이상 거래를 감지합니다. 그래도 저는 조심하려고 합니다. AI 도구는 가끔 틀리면서도 자신 있게 말하기 때문에, 중요한 정보는 항상 직접 검증합니다. 제가 보기에 AI는 재능은 있지만 경험이 부족한 비서와 같습니다. 그 결과물을 검토한 뒤에 신뢰하기만 한다면 대단히 유용합니다.",
      questions:[
        {q:"How much time does the AI assistant save the writer at work?",options:["About ten minutes a day","At least an hour a day","Half a day","No time at all"],answer:1,explanation:"'which saves me at least an hour a day'라고 명시되어 있습니다."},
        {q:"Why does the writer verify important information?",options:["The company requires it","AI tools sometimes sound confident while being wrong","The phone battery is unreliable","The writer enjoys double-checking"],answer:1,explanation:"'AI tools sometimes sound confident while being wrong, so I always verify'가 이유입니다."},
        {q:"How does the writer describe AI?",options:["A perfect replacement for humans","A dangerous technology to avoid","A talented but inexperienced assistant","A tool only for engineers"],answer:2,explanation:"'AI is like a talented but inexperienced assistant'라는 비유로 요약했습니다."}]},

    {id:"r38",topic:"weather",title:"A Rainy Day",level:"초",
      passage_en:"Today it rained all day. I checked the weather [[forecast|일기예보]] in the morning, so I took my [[umbrella|우산]] with me. On the way to work, the rain became very heavy. Many people were running to the subway station. My shoes got wet, but my clothes stayed dry. At lunch time, I watched the rain from the office window. The city looked gray and quiet. In the evening, the rain finally stopped. The air smelled fresh and clean. I actually enjoy rainy days because they feel calm and [[peaceful|평화로운]].",
      passage_ko:"오늘은 하루 종일 비가 왔습니다. 아침에 일기예보를 확인해서 우산을 챙겼습니다. 출근길에 비가 매우 거세졌습니다. 많은 사람들이 지하철역으로 뛰어가고 있었습니다. 신발은 젖었지만 옷은 마른 채였습니다. 점심시간에는 사무실 창문으로 비를 바라보았습니다. 도시는 회색빛으로 조용해 보였습니다. 저녁이 되자 비가 마침내 그쳤습니다. 공기에서 상쾌하고 깨끗한 냄새가 났습니다. 저는 사실 비 오는 날을 좋아하는데, 차분하고 평화롭게 느껴지기 때문입니다.",
      questions:[
        {q:"Why did the writer take an umbrella?",options:["A friend gave it as a gift","The writer checked the weather forecast","It was already raining at home","The writer always carries one"],answer:1,explanation:"'I checked the weather forecast in the morning, so I took my umbrella'라고 이유를 밝혔습니다."},
        {q:"What happened to the writer's shoes?",options:["They stayed dry","They got wet","They were lost","They were broken"],answer:1,explanation:"'My shoes got wet, but my clothes stayed dry'라고 했습니다."},
        {q:"How does the writer feel about rainy days?",options:["They are annoying","They are scary","They feel calm and peaceful","They are boring"],answer:2,explanation:"마지막 문장에서 비 오는 날이 'calm and peaceful'하게 느껴져 좋아한다고 했습니다."}]},
    {id:"r39",topic:"weather",title:"Surviving the Korean Summer",level:"중",
      passage_en:"Korean summers are famous for being hot and [[humid|습한]]. From July to August, the temperature often rises above thirty-three degrees, and the [[humidity|습도]] makes it feel even worse. During this period, I change my daily routine. I exercise early in the morning before the heat becomes strong, and I carry a small fan in my bag. I also drink much more water than usual. The hardest part is the tropical nights, when the temperature stays above twenty-five degrees even after midnight. Without [[air conditioning|에어컨, 냉방]], sleeping well is almost impossible. Everyone I know counts the days until autumn arrives.",
      passage_ko:"한국의 여름은 덥고 습하기로 유명합니다. 7월부터 8월까지 기온이 33도를 넘는 일이 잦고, 습도 때문에 체감은 더 심합니다. 이 기간에 저는 일과를 바꿉니다. 더위가 심해지기 전 이른 아침에 운동하고, 가방에 작은 선풍기를 들고 다닙니다. 물도 평소보다 훨씬 많이 마십니다. 가장 힘든 것은 열대야인데, 자정이 지나도 기온이 25도 아래로 내려가지 않습니다. 에어컨 없이는 잘 자는 것이 거의 불가능합니다. 제가 아는 모든 사람이 가을이 오기만을 손꼽아 기다립니다.",
      questions:[
        {q:"When does the writer exercise in summer?",options:["Late at night","Early in the morning","During lunch time","In the late afternoon"],answer:1,explanation:"'I exercise early in the morning before the heat becomes strong'이라고 했습니다."},
        {q:"What are tropical nights?",options:["Nights with heavy rain","Nights when the temperature stays above twenty-five degrees","Nights with strong wind","Nights when it is cooler than usual"],answer:1,explanation:"'tropical nights, when the temperature stays above twenty-five degrees even after midnight'라고 설명합니다."},
        {q:"Which is NOT mentioned as the writer's summer habit?",options:["Carrying a small fan","Drinking more water","Exercising early","Taking cold showers"],answer:3,explanation:"휴대용 선풍기, 물 많이 마시기, 아침 운동은 언급되었지만 찬물 샤워는 언급되지 않았습니다."}]},
    {id:"r40",topic:"weather",title:"How Weather Shapes My Mood",level:"고",
      passage_en:"Weather has a surprisingly strong [[influence|영향]] on my mood and productivity. On clear days, I wake up easily and finish tasks quickly. On gray, cloudy days, however, I feel sluggish and struggle to concentrate. Scientists say this is partly because sunlight affects [[hormones|호르몬]] that control sleep and mood. Instead of simply accepting this, I developed a few [[countermeasures|대책, 대응책]]: on dark days, I turn on bright lights early, take a short walk at lunch, and schedule my hardest work for the morning. Understanding my own patterns has made bad weather much easier to handle.",
