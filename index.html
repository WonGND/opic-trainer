      passage_ko:"저는 날씨가 제 기분과 생산성에 놀라울 만큼 강한 영향을 미친다는 것을 알게 되었습니다. 맑은 날에는 쉽게 일어나고, 활기차게 걸어서 출근하며, 일을 빨리 끝냅니다. 하지만 흐리고 우중충한 날에는 몸이 처지고 집중하기 어렵습니다. 과학자들은 이것이 부분적으로 햇빛이 수면과 기분을 조절하는 호르몬에 영향을 주기 때문이라고 말합니다. 저는 이를 그냥 받아들이는 대신 몇 가지 대책을 마련했습니다. 어두운 날에는 일찍 밝은 조명을 켜고, 추워도 점심에 짧은 산책을 하고, 가장 어려운 일을 오전에 배치합니다. 제 패턴을 이해하고 나니 나쁜 날씨를 다루기가 훨씬 쉬워졌습니다.",
      questions:[
        {q:"How does the writer feel on cloudy days?",options:["Energetic and focused","Sluggish and unable to concentrate","Angry and stressed","The same as on clear days"],answer:1,explanation:"'On gray, cloudy days ... I feel sluggish and struggle to concentrate'라고 했습니다."},
        {q:"According to scientists, why does weather affect mood?",options:["Sunlight affects hormones related to sleep and mood","Rain lowers body temperature","Clouds block phone signals","Cold weather slows the heart"],answer:0,explanation:"'sunlight affects hormones that control sleep and mood'라고 과학적 이유를 제시합니다."},
        {q:"Which countermeasure does the writer use on dark days?",options:["Sleeping longer in the morning","Scheduling difficult work for the evening","Turning on bright lights early","Staying indoors all day"],answer:2,explanation:"'I turn on bright lights early'가 대책 중 하나로 언급됩니다. 어려운 일은 오전에 배치한다고 했습니다."}]},
    {id:"r41",topic:"recycling",title:"Recycling Day in My Apartment",level:"초",
      passage_en:"In my apartment, recycling day is every Thursday. On that day, I take my [[recyclables|재활용품]] to the collection area on the first floor. There are big boxes for paper, [[plastic|플라스틱]], glass, and cans. I wash the plastic bottles and remove the labels before I put them in the box. Food waste goes into a special machine with a card. At first, the rules were difficult for me, but now they are easy. My neighbors also follow the rules well. Our apartment is clean because everyone [[participates|참여하다]] in recycling.",
      passage_ko:"우리 아파트의 분리수거 날은 매주 목요일입니다. 그날 저는 재활용품을 1층 수거장으로 가져갑니다. 종이, 플라스틱, 유리, 캔을 위한 큰 상자들이 있습니다. 저는 플라스틱 병을 씻고 라벨을 제거한 뒤 상자에 넣습니다. 음식물 쓰레기는 카드를 이용해 전용 기계에 버립니다. 처음에는 규칙이 어려웠지만 지금은 쉽습니다. 이웃들도 규칙을 잘 지킵니다. 모두가 분리수거에 참여하기 때문에 우리 아파트는 깨끗합니다.",
      questions:[
        {q:"When is recycling day in the writer's apartment?",options:["Every Monday","Every Wednesday","Every Thursday","Every Saturday"],answer:2,explanation:"'recycling day is every Thursday'라고 명시되어 있습니다."},
        {q:"What does the writer do before putting plastic bottles in the box?",options:["Cuts them into pieces","Washes them and removes the labels","Puts them in a plastic bag","Fills them with water"],answer:1,explanation:"'I wash the plastic bottles and remove the labels'라고 했습니다."},
        {q:"Why is the apartment clean?",options:["A cleaning company visits daily","Everyone participates in recycling","There are few residents","The manager cleans everything"],answer:1,explanation:"'Our apartment is clean because everyone participates in recycling'이라고 이유를 밝혔습니다."}]},
    {id:"r42",topic:"recycling",title:"My Zero-Waste Challenge",level:"중",
      passage_en:"Last spring, I challenged myself to produce less trash for one month. The first step was replacing [[disposable|일회용의]] items with reusable ones. I bought a tumbler for coffee, cloth bags for shopping, and a set of metal straws. The most difficult part was food [[packaging|포장]]: almost everything at the supermarket comes wrapped in plastic. So I started visiting a local market where I could buy vegetables without wrapping. By the end of the month, my weekly trash had shrunk to half its original amount. The challenge is over, but most of these [[habits|습관]] have stayed with me.",
      passage_ko:"지난봄, 저는 한 달 동안 쓰레기를 줄이는 도전을 했습니다. 첫 단계는 일회용품을 재사용 가능한 것으로 바꾸는 것이었습니다. 커피용 텀블러, 장보기용 천 가방, 금속 빨대 세트를 샀습니다. 가장 어려운 부분은 식품 포장이었습니다. 슈퍼마켓의 거의 모든 것이 플라스틱에 싸여 있습니다. 그래서 포장 없이 채소를 살 수 있는 동네 시장에 다니기 시작했습니다. 한 달이 끝날 무렵, 주간 쓰레기가 원래 양의 절반으로 줄었습니다. 도전은 끝났지만, 이 습관들 대부분은 여전히 저와 함께 남아 있습니다.",
      questions:[
        {q:"What was the first step of the challenge?",options:["Buying less food","Replacing disposable items with reusable ones","Moving to a smaller house","Eating out more often"],answer:1,explanation:"'The first step was replacing disposable items with reusable ones'라고 했습니다."},
        {q:"What was the most difficult part?",options:["Carrying cloth bags","Washing the tumbler","Food packaging at supermarkets","Finding metal straws"],answer:2,explanation:"'The most difficult part was food packaging'이라고 명시했습니다."},
        {q:"What was the result at the end of the month?",options:["The trash doubled","The weekly trash shrank to half","Nothing changed","The writer gave up early"],answer:1,explanation:"'my weekly trash had shrunk to half its original amount'라고 했습니다."}]},
    {id:"r43",topic:"recycling",title:"Why Good Recycling Starts at Home",level:"고",
      passage_en:"Many people believe that once they place items in a recycling bin, their job is done. In reality, [[contaminated|오염된]] recyclables — a greasy pizza box or an unwashed yogurt cup — can ruin an entire batch and send it to a landfill instead. That is why correct sorting at home matters. Experts recommend three simple rules: empty, rinse, and separate. Remove leftover contents, rinse containers briefly, and keep different [[materials|재료, 소재]] apart. These small actions take less than a minute, yet they dramatically improve the [[efficiency|효율]] of the whole system. Real change begins in the kitchen, not at the recycling plant.",
      passage_ko:"많은 사람들은 재활용함에 물건을 넣으면 할 일이 끝났다고 생각합니다. 실제로는 기름 묻은 피자 박스나 씻지 않은 요거트 컵 같은 오염된 재활용품이 전체 배치를 망쳐 매립지로 보내 버릴 수 있습니다. 그래서 집에서 올바르게 분류하는 것이 우리 대부분이 생각하는 것보다 훨씬 중요합니다. 전문가들은 세 가지 간단한 규칙을 권합니다. 비우고, 헹구고, 분리하라. 남은 내용물을 제거하고, 용기를 잠깐 헹구고, 서로 다른 재료를 따로 두는 것입니다. 이 작은 행동들은 1분도 걸리지 않지만 전체 재활용 시스템의 효율을 극적으로 개선합니다. 진짜 변화는 재활용 공장이 아니라 부엌에서 시작됩니다.",
      questions:[
        {q:"What can contaminated recyclables cause?",options:["Higher recycling profits","An entire batch going to a landfill","Faster recycling","More recycling bins"],answer:1,explanation:"'can ruin an entire batch and send it to a landfill'이라고 했습니다."},
        {q:"What are the three rules experts recommend?",options:["Buy, use, and throw away","Empty, rinse, and separate","Collect, sell, and donate","Wash, dry, and fold"],answer:1,explanation:"'empty, rinse, and separate'가 전문가들이 권하는 세 가지 규칙입니다."},
        {q:"What is the main message of the passage?",options:["Recycling plants need better machines","Recycling is a waste of time","Proper recycling starts with sorting at home","Plastic should be banned completely"],answer:2,explanation:"'Real change begins in the kitchen'이라며 가정에서의 올바른 분류가 핵심임을 강조합니다."}]},
    {id:"r44",topic:"bank",title:"Opening a Bank Account",level:"초",
      passage_en:"Last week, I went to the bank to open a new [[account|계좌]]. I took my ID card with me. At the bank, I took a number ticket and waited for about twenty minutes. When my turn came, a kind staff member helped me. I filled out a form and made a [[password|비밀번호]] for my new card. The whole process took about thirty minutes. Now I can use the bank's mobile app to check my money and send money to my friends. It is very [[convenient|편리한]].",
      passage_ko:"지난주에 저는 새 계좌를 만들기 위해 은행에 갔습니다. 신분증을 챙겨 갔습니다. 은행에서 번호표를 뽑고 약 20분을 기다렸습니다. 제 차례가 되자 친절한 직원이 도와주었습니다. 저는 서류를 작성하고 새 카드의 비밀번호를 만들었습니다. 전체 과정은 약 30분 걸렸습니다. 이제 저는 은행 모바일 앱으로 잔액을 확인하고 친구들에게 송금할 수 있습니다. 매우 편리합니다.",
      questions:[
        {q:"What did the writer take to the bank?",options:["A passport","An ID card","A credit card","A letter"],answer:1,explanation:"'I took my ID card with me'라고 했습니다."},
        {q:"How long did the writer wait after taking a number ticket?",options:["About ten minutes","About twenty minutes","About thirty minutes","About one hour"],answer:1,explanation:"'waited for about twenty minutes'라고 명시되어 있습니다. 30분은 전체 과정 시간입니다."},
        {q:"What can the writer do with the mobile app?",options:["Order food","Check money and send money","Buy movie tickets","Book a hotel"],answer:1,explanation:"'check my money and send money to my friends'가 앱으로 할 수 있는 일입니다."}]},
    {id:"r45",topic:"bank",title:"Why I Rarely Visit Bank Branches",level:"중",
      passage_en:"I realized recently that I have not visited a physical bank [[branch|지점]] in over a year. Almost everything I need — checking my balance, paying bills, sending money, even opening a savings account — can be done through my banking app in a few minutes. [[Biometric|생체 인식의]] login with my fingerprint makes it fast and secure. The only time I still need a branch is for complicated services like loans or large cash [[withdrawals|출금, 인출]]. Many branches in my neighborhood have actually closed because so few customers visit. Banking has quietly become something I do on my phone during a coffee break.",
      passage_ko:"저는 최근에 실제 은행 지점을 1년 넘게 방문하지 않았다는 것을 깨달았습니다. 잔액 확인, 공과금 납부, 송금, 심지어 적금 계좌 개설까지 필요한 거의 모든 것을 은행 앱으로 몇 분 만에 할 수 있습니다. 지문을 이용한 생체 인식 로그인은 빠르고 안전합니다. 여전히 지점이 필요한 유일한 경우는 대출이나 큰 금액의 현금 인출 같은 복잡한 업무입니다. 우리 동네의 많은 지점이 방문 고객이 너무 적어 실제로 문을 닫았습니다. 은행 업무는 어느새 커피 마시는 짬에 휴대폰으로 처리하는 일이 되었습니다.",
      questions:[
        {q:"How long has it been since the writer visited a bank branch?",options:["One month","Six months","Over a year","Five years"],answer:2,explanation:"'I have not visited a physical bank branch in over a year'라고 했습니다."},
        {q:"How does the writer log in to the banking app?",options:["With a long password","With a fingerprint","With a security card","By calling the bank"],answer:1,explanation:"'Biometric login with my fingerprint'라고 했습니다."},
        {q:"When does the writer still need to visit a branch?",options:["To check the balance","To pay bills","For loans or large cash withdrawals","To send money to friends"],answer:2,explanation:"'The only time I still need a branch is for complicated services like loans or large cash withdrawals'라고 했습니다."}]},
    {id:"r46",topic:"bank",title:"Learning to Save Automatically",level:"고",
      passage_en:"For years, my saving strategy was simple and completely wrong: I planned to save whatever money was left at the end of the month. Unsurprisingly, nothing was ever left. Everything changed when a friend introduced me to [[automatic transfers|자동 이체]]. Now, on payday, thirty percent of my [[salary|급여, 월급]] moves into a separate account before I can touch it. Since the money disappears immediately, I never feel I am giving anything up. Within a year, I built an emergency fund covering six months of living [[expenses|지출, 생활비]]. Good financial habits should not depend on willpower — they should be built into the system.",
      passage_ko:"수년 동안 제 저축 전략은 단순하면서 완전히 잘못되어 있었습니다. 월말에 남는 돈을 저축하겠다는 계획이었죠. 당연하게도 남는 돈은 거의 없었습니다. 친구가 자동 이체를 알려주면서 모든 것이 바뀌었습니다. 이제 월급날이 되면 급여의 30퍼센트가 제가 손대기 전에 별도의 저축 계좌로 옮겨집니다. 돈이 즉시 사라지기 때문에 무언가를 포기한다는 느낌이 들지 않습니다. 1년 안에 저는 6개월치 생활비를 감당할 수 있는 비상금을 만들었습니다. 제가 배운 교훈은, 좋은 금융 습관은 의지력에 의존해서는 안 되고 시스템 안에 심어져야 한다는 것입니다.",
      questions:[
        {q:"What was wrong with the writer's old saving strategy?",options:["It saved too much money","There was rarely money left at the end of the month","The bank charged high fees","It required visiting the bank often"],answer:1,explanation:"'I planned to save whatever money was left ... there was rarely anything left'라고 했습니다."},
        {q:"How much of the salary is transferred automatically?",options:["Ten percent","Twenty percent","Thirty percent","Fifty percent"],answer:2,explanation:"'thirty percent of my salary moves into a separate savings account'라고 명시되어 있습니다."},
        {q:"What lesson did the writer learn?",options:["Willpower is the key to saving","Good financial habits should be built into the system","Saving is impossible with a low salary","Emergency funds are unnecessary"],answer:1,explanation:"'good financial habits should not depend on willpower — they should be built into the system'이 결론입니다."}]},

    {id:"r47",topic:"fashion",title:"Shopping for Winter Clothes",level:"초",
      passage_en:"Last weekend, I went shopping for winter clothes. The weather is getting cold, so I needed a warm [[jacket|재킷, 외투]]. I visited three stores in the shopping mall. In the first store, the jackets were too expensive. In the second store, I found a nice black jacket, but they did not have my [[size|사이즈, 치수]]. Finally, in the third store, I found a warm gray jacket at a good [[price|가격]]. I also bought a scarf and some gloves. Now I am ready for the cold winter.",
      passage_ko:"지난 주말에 저는 겨울옷을 사러 갔습니다. 날씨가 추워지고 있어서 따뜻한 재킷이 필요했습니다. 쇼핑몰에서 세 개의 매장을 둘러봤습니다. 첫 번째 매장의 재킷은 너무 비쌌습니다. 두 번째 매장에서 멋진 검은색 재킷을 찾았지만 제 사이즈가 없었습니다. 마침내 세 번째 매장에서 좋은 가격의 따뜻한 회색 재킷을 찾았습니다. 목도리와 장갑도 샀습니다. 이제 추운 겨울을 맞을 준비가 되었습니다.",
      questions:[
        {q:"Why did the writer go shopping?",options:["To buy a birthday gift","Because the weather is getting cold","To return a jacket","Because of a big sale"],answer:1,explanation:"'The weather is getting cold, so I needed a warm jacket'이라고 이유를 밝혔습니다."},
        {q:"What was the problem in the second store?",options:["The jackets were too expensive","The store was closed","They did not have the writer's size","The color was ugly"],answer:2,explanation:"'they did not have my size'가 두 번째 매장의 문제였습니다."},
        {q:"What did the writer finally buy?",options:["A black jacket only","A gray jacket, a scarf, and gloves","Only a scarf","Winter boots"],answer:1,explanation:"회색 재킷을 샀고 'I also bought a scarf and some gloves'라고 했습니다."}]},
    {id:"r48",topic:"fashion",title:"Building a Capsule Wardrobe",level:"중",
      passage_en:"A few months ago, my closet was full of clothes, but I always felt I had nothing to wear. So I tried a capsule [[wardrobe|옷장, 의류 컬렉션]] — a small collection of items that all match each other. First, I donated the clothes I had not worn in a year. Then I kept only [[neutral|무채색의, 중립적인]] colors like black, white, gray, and navy. Now I own fewer than forty items, but getting dressed takes two minutes because everything goes together. I also spend less, buying one quality piece instead of five cheap ones. Simple choices reduced my daily [[stress|스트레스]].",
      passage_ko:"몇 달 전, 제 옷장은 옷으로 가득했지만 저는 늘 입을 게 없다고 느꼈습니다. 그래서 서로 모두 어울리는 소수의 아이템으로 구성된 캡슐 옷장을 시도하기로 했습니다. 먼저 1년 동안 입지 않은 옷을 기부했습니다. 그다음 검정, 흰색, 회색, 네이비 같은 무채색만 남겼습니다. 지금 저는 40벌이 안 되는 옷을 갖고 있지만, 모든 옷이 서로 어울리기 때문에 옷 입는 데 2분이면 충분합니다. 싼 옷 다섯 벌 대신 질 좋은 옷 한 벌을 사기 때문에 돈도 덜 씁니다. 단순한 선택이 저의 일상 스트레스를 줄여 주었습니다.",
      questions:[
        {q:"What is a capsule wardrobe?",options:["A closet with many colorful clothes","A small collection of items that match each other","A wardrobe for special occasions only","A rental clothing service"],answer:1,explanation:"'a small collection of items that all match each other'라고 정의했습니다."},
        {q:"What did the writer do first?",options:["Bought new expensive clothes","Donated clothes not worn in a year","Painted the closet","Made a shopping list"],answer:1,explanation:"'First, I donated the clothes I had not worn in a year'라고 했습니다."},
        {q:"Why does getting dressed take only two minutes now?",options:["The writer wears a uniform","Everything goes together","A stylist helps every morning","The writer owns only one outfit"],answer:1,explanation:"'getting dressed takes just two minutes because everything goes together'라고 했습니다."}]},
    {id:"r49",topic:"fashion",title:"The True Cost of Fast Fashion",level:"고",
      passage_en:"Fast fashion brands release new designs almost weekly at surprisingly low prices, and for years I was a loyal customer. My opinion changed when I learned the industry's hidden costs. Producing one cotton T-shirt requires about 2,700 liters of water, and cheap clothes are often made in factories with poor working [[conditions|환경, 조건]]. Worse, most garments are worn only a few times before being thrown away, adding to mountains of [[textile|직물, 섬유]] waste. I still buy clothes, but I now choose fewer, more [[durable|내구성 있는, 오래가는]] items and wear them longer. Small changes in habits, multiplied by millions, can pressure the industry to improve.",
      passage_ko:"패스트 패션 브랜드들은 놀랄 만큼 낮은 가격으로 거의 매주 새 디자인을 내놓고, 저는 수년간 충성 고객이었습니다. 이 산업의 숨겨진 비용을 알게 되면서 제 생각이 바뀌었습니다. 면 티셔츠 한 장을 만드는 데 약 2,700리터의 물이 필요하고, 값싼 옷은 열악한 노동 환경의 공장에서 만들어지는 경우가 많습니다. 더 나쁜 것은, 이런 옷 대부분이 몇 번 입히지도 않고 버려져 산더미 같은 섬유 폐기물이 된다는 점입니다. 저는 옷 사는 것을 멈추지는 않았지만, 이제는 더 적고 더 내구성 있는 옷을 골라 더 오래 입습니다. 수백만 명이 만들어 내는 쇼핑 습관의 작은 변화가 산업의 개선을 압박할 수 있습니다.",
      questions:[
        {q:"How much water does producing one cotton T-shirt require?",options:["About 27 liters","About 270 liters","About 2,700 liters","About 27,000 liters"],answer:2,explanation:"'requires about 2,700 liters of water'라고 명시되어 있습니다."},
        {q:"What happens to most fast fashion garments?",options:["They are recycled into new clothes","They are worn only a few times and thrown away","They are donated to charity","They last for many years"],answer:1,explanation:"'worn only a few times before being thrown away'라고 했습니다."},
        {q:"How did the writer change their shopping habits?",options:["Stopped buying clothes completely","Buys fewer, more durable items","Only buys from fast fashion brands","Makes clothes at home"],answer:1,explanation:"'I now choose fewer, more durable items and wear them longer'라고 했습니다."}]},
    {id:"r50",topic:"geography",title:"A Country of Mountains",level:"초",
      passage_en:"Korea is a country of [[mountains|산]]. About seventy percent of the land is mountains and hills. Because of this, many Koreans love hiking. On weekends, the mountains near big cities are full of hikers. My favorite mountain is Bukhansan in Seoul. It is high, but the [[trails|등산로, 오솔길]] are safe and well marked. From the top, you can see the whole city. The [[view|경치, 전망]] is amazing, especially in autumn when the leaves turn red and yellow. Hiking in Korea is easy to start because a mountain is always nearby.",
      passage_ko:"한국은 산의 나라입니다. 국토의 약 70퍼센트가 산과 언덕입니다. 이 때문에 많은 한국인들이 등산을 좋아합니다. 주말이면 대도시 근처의 산은 등산객으로 가득합니다. 제가 가장 좋아하는 산은 서울의 북한산입니다. 높지만 등산로가 안전하고 표시가 잘 되어 있습니다. 정상에서는 도시 전체를 볼 수 있습니다. 특히 잎이 붉고 노랗게 물드는 가을에는 경치가 놀랍습니다. 한국에서 등산은 시작하기 쉬운데, 산이 항상 가까이에 있기 때문입니다.",
      questions:[
        {q:"How much of Korea's land is mountains and hills?",options:["About thirty percent","About fifty percent","About seventy percent","About ninety percent"],answer:2,explanation:"'About seventy percent of the land is mountains and hills'라고 했습니다."},
        {q:"What is the writer's favorite mountain?",options:["Hallasan","Seoraksan","Bukhansan","Jirisan"],answer:2,explanation:"'My favorite mountain is Bukhansan in Seoul'이라고 명시했습니다."},
        {q:"When is the view especially amazing?",options:["In spring","In summer","In autumn","In winter"],answer:2,explanation:"'especially in autumn when the leaves turn red and yellow'라고 했습니다."}]},
    {id:"r51",topic:"geography",title:"Living on a Peninsula",level:"중",
      passage_en:"Korea is a [[peninsula|반도]], which means it is surrounded by the sea on three sides. This geography shapes daily life deeply. Fresh seafood is available everywhere, and coastal cities like Busan and Sokcho are popular weekend [[destinations|목적지, 여행지]]. The east coast has deep blue water and sandy beaches, while the west coast is famous for dramatic tides and mud flats. Thanks to the fast trains, I can leave Seoul in the morning and eat fresh fish by the sea before noon. Living where the ocean is never far away is a [[privilege|특권, 혜택]] I did not appreciate until I traveled abroad.",
      passage_ko:"한국은 반도인데, 이는 삼면이 바다로 둘러싸여 있다는 뜻입니다. 이 지리는 여러 방식으로 일상을 형성합니다. 신선한 해산물을 어디서나 구할 수 있고, 부산과 속초 같은 해안 도시들은 인기 있는 주말 여행지입니다. 동해안은 짙푸른 바다와 모래 해변이 있고, 서해안은 극적인 조수 간만과 갯벌로 유명합니다. 잘 발달된 철도 덕분에 아침에 서울을 떠나 정오 전에 바닷가에서 신선한 생선을 먹을 수 있습니다. 바다가 늘 멀지 않은 나라에 사는 것은 해외여행을 하고 나서야 감사하게 된 특권입니다.",
      questions:[
        {q:"What does it mean that Korea is a peninsula?",options:["It is an island","It is surrounded by the sea on three sides","It has no coastline","It is covered by desert"],answer:1,explanation:"'surrounded by the sea on three sides'라고 반도의 의미를 설명했습니다."},
        {q:"What is the west coast famous for?",options:["Deep blue water","Sandy beaches","Dramatic tides and mud flats","Coral reefs"],answer:2,explanation:"'the west coast is famous for its dramatic tides and mud flats'라고 했습니다."},
        {q:"How can the writer reach the sea from Seoul quickly?",options:["By airplane","By the well-developed train system","By boat","By walking"],answer:1,explanation:"'Thanks to the well-developed train system'으로 정오 전에 바닷가에 도착할 수 있다고 했습니다."}]},
    {id:"r52",topic:"geography",title:"Why Cities Grow Where They Do",level:"고",
      passage_en:"Why are major cities located where they are? The answer is almost always geography. Most great cities grew next to rivers or natural [[harbors|항구]], because water meant transportation, trade, and drinking supplies. Seoul developed along the Han River, and Busan became Korea's second city thanks to its deep harbor. Mountains, in contrast, historically acted as [[barriers|장벽, 장애물]] that separated regions and even shaped dialects. Today, technology has weakened geography's power, but it has not erased it. Land prices, port [[logistics|물류]], and even internet cable routes still follow patterns written by rivers and mountains long ago.",
      passage_ko:"주요 도시들이 왜 지금의 위치에 있는지 궁금해한 적이 있나요? 답은 거의 언제나 지리입니다. 대부분의 대도시는 강이나 천연 항구 옆에서 성장했는데, 물은 곧 교통, 무역, 식수를 의미했기 때문입니다. 서울은 한강을 따라 발전했고, 부산은 깊은 항구 덕분에 한국 제2의 도시가 되었습니다. 반면 산은 역사적으로 지역을 나누는 장벽 역할을 했고 지역 사투리까지 형성했습니다. 오늘날 기술은 지리의 힘을 약화시켰습니다. 터널을 뚫고 즉시 소통할 수 있으니까요. 하지만 지리를 지우지는 못했습니다. 땅값, 항만 물류, 심지어 인터넷 케이블 경로까지 여전히 오래전 강과 산이 써 놓은 패턴을 따릅니다.",
      questions:[
        {q:"Why did most great cities grow next to rivers or harbors?",options:["The weather was warmer there","Water meant transportation, trade, and drinking supplies","Mountains were dangerous","Land was cheaper there"],answer:1,explanation:"'water meant transportation, trade, and drinking supplies'가 이유로 제시됩니다."},
        {q:"What role did mountains historically play?",options:["They connected regions","They acted as barriers separating regions","They provided drinking water","They attracted traders"],answer:1,explanation:"'Mountains ... historically acted as barriers that separated regions'라고 했습니다."},
        {q:"What is the main point about technology and geography?",options:["Technology has completely erased geography's influence","Technology has weakened but not erased geography's power","Geography no longer matters for cities","Technology follows no patterns"],answer:1,explanation:"'technology has weakened geography's power ... but it has not erased it'이 핵심 논지입니다."}]},

/* ---------------- 유틸 ---------------- */
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const byTopic=arr=>state.topic==="all"?arr:arr.filter(x=>x.topic===state.topic);
const topicLabel=k=>(TOPICS.find(t=>t.key===k)||{}).label||"";
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
const normalize=s=>s.toLowerCase().replace(/[.,!?;:'"]/g,"").replace(/\s+/g," ").trim();
function ymd(d){d=new Date(d);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
const todayKey=()=>ymd(new Date());

/* 활동 기록 + 스트릭 갱신 (학습 행동이 있을 때마다 호출) */
function touchDay(){
  const t=todayKey();
  stats.days[t]=stats.days[t]||{reviews:0,questions:0};
  if(stats.lastDay!==t){
    const y=ymd(Date.now()-86400000);
    stats.streak=(stats.lastDay===y)?(stats.streak||0)+1:1;
    stats.lastDay=t;
  }
  saveStats();
}
function bumpReview(){touchDay();stats.days[todayKey()].reviews++;saveStats();addXP(5);}
function bumpQuestion(){touchDay();stats.days[todayKey()].questions++;saveStats();addXP(10);}

/* ---------------- 간격 반복(SRS) ---------------- */
const SRS_DAYS={1:0,2:1,3:2,4:4,5:7}; // 박스가 높을수록 다음 복습까지 더 오래
function deckFids(){return [...DATA.vocab.map(v=>"vocab:"+v.id),...DATA.patterns.map(p=>"pattern:"+p.id)];}
function isDue(fid){const s=srs[fid];return !s||s.due<=Date.now();}
function dueFids(){return deckFids().filter(isDue);}
function srsRate(fid,good){
  const cur=srs[fid]||{box:1,due:0};
  const box=good?Math.min(5,cur.box+1):1;
  const due=good?Date.now()+SRS_DAYS[box]*86400000:Date.now()+60*1000; // 모르면 1분 뒤(이번 세션 재등장)
  srs[fid]={box,due};saveSrs();
}
function cardOf(fid){
  const i=fid.indexOf(":"),mode=fid.slice(0,i),id=fid.slice(i+1);
  if(mode==="vocab"){const v=DATA.vocab.find(x=>x.id===id);return{mode,front:v.word,pron:v.pron,mean:v.meaning,ex:v.examples[0],kind:"단어",topic:v.topic};}
  const p=DATA.patterns.find(x=>x.id===id);return{mode,front:p.expression,pron:"",mean:p.meaning,ex:p.example,kind:"표현",topic:p.topic};
}

/* ③ 독해 */
function parsePassage(r){
  let idx=0;
  return esc(r.passage_en).replace(/\[\[([^|\]]+)\|([^\]]+)\]\]/g,(m,en,ko)=>{
    const key=r.id+"-"+(idx++),open=ui.glossOpen.has(key);
    return `<span class="gloss" data-action="gloss" data-key="${key}">${en}${open?`<span class="ko"> (${ko})</span>`:""}</span>`;
  });
}
/* 지문에서 아직 안 푼 첫 문제 번호(전부 풀었으면 마지막 번호) */
function firstUnansweredQ(r){
  for(let i=0;i<r.questions.length;i++) if(progress.reading[r.id+"-"+i]==null) return i;
  return r.questions.length-1;
}
/* 지문 위치를 안전하게 이동하고, 해당 지문의 시작 문제를 설정 */
function setReadingPos(idx){
  const list=byTopic(DATA.reading);
  if(!list.length){state.readingPos=0;state.readingQPos=0;return;}
  state.readingPos=Math.max(0,Math.min(list.length-1,idx));
  state.readingQPos=firstUnansweredQ(list[state.readingPos]);
}
function renderReading(){
  const list=byTopic(DATA.reading);
  if(!list.length)return emptyMsg("이 주제의 지문이 아직 없어요.");
  if(state.readingPos>=list.length)state.readingPos=0;              // 범위 보정

  const fid="reading:"+r.id,on=favorites.has(fid),showKo=ui.glossOpen.has("ko-"+r.id);

  const qi=state.readingQPos,qq=r.questions[qi],key=r.id+"-"+qi,rec=progress.reading[key],answered=rec!=null;
  const opts=qq.options.map((o,oi)=>{

    return `<button class="${cls}" data-action="answer" data-key="${key}" data-rid="${r.id}" data-qi="${qi}" data-oi="${oi}"><span class="en">${esc(o)}</span></button>`;

        : `<div class="w-actions"><button class="btn" data-action="read-passnext">다음 지문 →</button></div>`;

  }

/* 완료 축하용 색종이(의존성 없는 CSS 애니메이션) */
function confettiHtml(){
  const colors=["#2BB3A3","#F4B400","#E8615A","#5B8DEF","#9B6DD6"];
  let s="";
  for(let i=0;i<26;i++){
    const l=(Math.random()*100).toFixed(1),d=(Math.random()*0.5).toFixed(2),dur=(1.1+Math.random()*0.8).toFixed(2),c=colors[i%colors.length],rot=(Math.random()*360)|0;
    s+=`<span style="left:${l}%;background:${c};animation-delay:${d}s;animation-duration:${dur}s;transform:rotate(${rot}deg)"></span>`;
  }
  return `<div class="confetti" aria-hidden="true">${s}</div>`;
}

/* 퀴즈: 단어·표현 뜻 쓰기 + 빈칸 채우기 (능동 회상) */
const escapeRe=s=>String(s).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
function quizPool(){
  let n=0;
  byTopic(DATA.vocab).forEach(v=>{n++;if(!v.word.includes(" ")&&new RegExp("\\b"+escapeRe(v.word)+"\\b","i").test(v.examples[0].en))n++;});
  n+=byTopic(DATA.patterns).length;
  return n;
}
function buildQuiz(){
  const items=[];
  byTopic(DATA.vocab).forEach(v=>{
    items.push({type:"vmean",fid:"vocab:"+v.id,prompt:v.word,pron:v.pron,answer:v.meaning,kind:"단어 뜻 쓰기"});
    if(!v.word.includes(" ")){
      const re=new RegExp("\\b"+escapeRe(v.word)+"\\b","i");
      if(re.test(v.examples[0].en))
        items.push({type:"blank",fid:"vocab:"+v.id,prompt:v.examples[0].en.replace(re,"_____"),answer:v.word,ko:v.examples[0].ko,kind:"빈칸 채우기"});
    }
  });
  byTopic(DATA.patterns).forEach(p=>items.push({type:"pmean",fid:"pattern:"+p.id,prompt:p.expression,answer:p.meaning,kind:"표현 뜻 쓰기"}));
  return shuffle(items).slice(0,10);
}
function looseKoMatch(user,ans){
  const n=s=>String(s).replace(/[\s,.~·/()]/g,"").toLowerCase();
  const u=n(user);if(!u)return false;const a=n(ans);if(u===a)return true;
  const parts=ans.split(/[,/]/).map(n).filter(Boolean);
  if(parts.some(pt=>pt.includes(u)||u.includes(pt)))return true;
  return a.includes(u)||u.includes(a);
}
function renderQuiz(){
  const q=ui.quiz;
  if(q.finished){
    const acc=q.items.length?Math.round(q.correct/q.items.length*100):0;
    const wrong=q.results.filter(r=>!r.correct);

    const msg=acc>=80?"훌륭해요! 이 주제는 거의 마스터했어요.":acc>=50?"좋아요. 틀린 것만 복습하면 금방 올라가요.":"괜찮아요. 복습 카드로 약점을 채워봐요.";
    return `${celebrate&&acc>=50?confettiHtml():""}<div class="card done-screen"><div class="big pop-in">${acc>=80?"🏆":acc>=50?"👍":"💪"}</div>
      <h3>${q.correct} / ${q.items.length} 정답 (${acc}%)</h3>
      <p>${msg}</p>
      <button class="btn big" data-action="quiz-start">한 번 더 풀기</button></div>
      ${wrong.length?`<div class="fav-group-title">다시 볼 문항 (${wrong.length})</div>`+wrong.map(r=>`<div class="card wrong-card">
        <div class="wq en">${esc(r.prompt.replace("_____","____"))}</div>

      </div>`).join(""):""}`;
  }
  if(!q.active){
    const n=Math.min(10,quizPool());
    if(!n)return emptyMsg("이 주제에는 퀴즈로 낼 항목이 없어요. 주제를 바꿔보세요.");
    return `<div class="card done-screen"><div class="big">📝</div><h3>단어·문장 퀴즈</h3>
      <p>${topicLabel(state.topic)} 주제에서 ${n}문항.<br>뜻을 직접 적고, 빈칸을 채워요. (위 주제 버튼으로 범위 변경)</p>
      <button class="btn big" data-action="quiz-start">퀴즈 시작</button></div>`;
  }
  const it=q.items[q.pos],pct=Math.round(q.pos/q.items.length*100),txt=q.text[q.pos]||"";
  const head=`<div class="rev-progress">${q.pos+1} / ${q.items.length}문항</div><div class="rev-bar"><span style="width:${pct}%"></span></div>`;

/* === 예상 등급 + 약점 분석 (기존 학습 데이터 기반, 참고용) === */
function gradeEstimate(){
  const vTotal=DATA.vocab.length, vMem=DATA.vocab.filter(v=>memorized.has("vocab:"+v.id)).length;
  const pTotal=DATA.patterns.length, pMem=DATA.patterns.filter(p=>memorized.has("pattern:"+p.id)).length;
  let qTotal=0; DATA.reading.forEach(r=>qTotal+=r.questions.length);
  const qAns=Object.keys(progress.reading).length;
  const qCorrect=Object.values(progress.reading).filter(v=>v&&v.correct).length;
  const wTotal=DATA.writing.length, wDone=Object.keys(progress.writing).length;
  const coverage=Math.round((vMem+pMem+qAns+wDone)/Math.max(1,vTotal+pTotal+qTotal+wTotal)*100);
  const comprehension=qAns>0?Math.round(qCorrect/qAns*100):null;
  const fbScores=Object.values(feedback).map(f=>(f&&typeof f.score==="number")?f.score:null).filter(s=>s!=null);
  const production=fbScores.length?Math.round(fbScores.reduce((a,b)=>a+b,0)/fbScores.length):null;
  const comboStages=Object.keys(COMBO).length*3;
  const comboDone=Object.keys(drafts).filter(k=>k.indexOf("combo:")===0&&(drafts[k]||"").trim()).length;
  const speaking=Math.round(Math.min(1,comboDone/Math.max(1,comboStages))*100);
  const parts=[[coverage,0.30],[comprehension,0.20],[production,0.35],[speaking,0.15]];
  let sum=0,wsum=0; parts.forEach(([v,wt])=>{if(v!=null){sum+=v*wt;wsum+=wt;}});
  const score=wsum?Math.round(sum/wsum):0;
  const band=score>=82?"AL":score>=65?"IH":score>=45?"IM":score>=25?"IL":"NH";
  const bandLabel={AL:"Advanced Low",IH:"Intermediate High",IM:"Intermediate Mid",IL:"Intermediate Low",NH:"Novice High"}[band];
  return {score,band,bandLabel,coverage,comprehension,production,speaking,hasProduction:production!=null};
}
function topicMastery(){
  return TOPICS.filter(t=>t.key!=="all").map(t=>{
    const vs=DATA.vocab.filter(v=>v.topic===t.key),vM=vs.filter(v=>memorized.has("vocab:"+v.id)).length;
    const ps=DATA.patterns.filter(p=>p.topic===t.key),pM=ps.filter(p=>memorized.has("pattern:"+p.id)).length;
    const rs=DATA.reading.filter(r=>r.topic===t.key);let rTotalQ=0,rAns=0;
    rs.forEach(r=>{rTotalQ+=r.questions.length;r.questions.forEach((q,i)=>{if(progress.reading[r.id+"-"+i]!=null)rAns++;});});
    const ws=DATA.writing.filter(w=>w.topic===t.key),wD=ws.filter(w=>progress.writing[w.id]).length;
    const total=vs.length+ps.length+rTotalQ+ws.length,done=vM+pM+rAns+wD;
    return {key:t.key,label:t.label,pct:total?Math.round(done/total*100):0};
  }).sort((a,b)=>a.pct-b.pct);
}
function feedbackSeries(){
  return Object.entries(feedback)
    .filter(([k,v])=>v&&typeof v.score==="number")
    .map(([k,v])=>({ts:v.ts||0,score:v.score}))
    .sort((a,b)=>a.ts-b.ts);
}
function weekInfo(){
  const now=new Date(),dowMon=(now.getDay()+6)%7; // 0=월
  const monday=new Date(now);monday.setHours(0,0,0,0);monday.setDate(now.getDate()-dowMon);
  const dows=["월","화","수","목","금","토","일"];
  const tkey=todayKey();const week=[];let activeDays=0,total=0;
  for(let i=0;i<7;i++){
    const dt=new Date(monday);dt.setDate(monday.getDate()+i);const k=ymd(dt);
    const a=stats.days[k]||{reviews:0,questions:0};const v=(a.reviews||0)+(a.questions||0);
    const isToday=k===tkey,isFuture=dt>now&&!isToday;
    if(v>0)activeDays++;total+=v;
    week.push({label:dows[i],active:v>0,today:isToday,future:isFuture});
  }
  let lastTotal=0;
  for(let i=1;i<=7;i++){const dt=new Date(monday);dt.setDate(monday.getDate()-i);const a=stats.days[ymd(dt)]||{};lastTotal+=(a.reviews||0)+(a.questions||0);}
  const goal=state.weeklyGoal||5;
  return {week,activeDays,total,lastTotal,goal,met:activeDays>=goal};
}

/* ================================================================
   5) 이벤트 처리
   ================================================================ */
function captureInputs(){
  document.querySelectorAll("textarea.w-input").forEach(t=>{
    const id=t.getAttribute("data-tid");
    ui.translate[id]=ui.translate[id]||{text:"",show:false};ui.translate[id].text=t.value;
    drafts[id]=t.value;                 // 작문 답안 영속 저장(재실행해도 유지)
  });
  saveDrafts();
  document.querySelectorAll("input.quiz-input").forEach(t=>{ui.quiz.text[t.getAttribute("data-qpos")]=t.value;});
}

/* 무료 첨삭 서버에 답안을 보내 첨삭을 받아온다(작문·콤보 공용).
   결과는 localStorage(opic_feedback)에 fbKey로 저장되어 재실행해도 유지된다. */
async function callFeedback(fbKey,prompt_ko,answer,model){
  ui.fbError[fbKey]="";ui.fbLoading[fbKey]=true;renderAll();
  try{
    const res=await fetch(state.aiEndpoint,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({task:"opic-writing-feedback",prompt_ko,answer,model})
    });
    if(!res.ok) throw new Error("서버 응답 오류 ("+res.status+")");
    const data=await res.json();
    feedback[fbKey]={corrected:data.corrected||"",comment:data.feedback||data.comment||"",score:(data.score==null?null:data.score),ts:Date.now()};
    saveFeedback();
  }catch(err){
    ui.fbError[fbKey]="첨삭을 가져오지 못했어요: "+(err&&err.message||err)+" (서버 주소·온라인 상태를 확인하세요)";
  }finally{
    ui.fbLoading[fbKey]=false;renderAll();
  }
}
function requestFeedback(id){
  const w=DATA.writing.find(x=>x.id===id);if(!w)return;
  const text=((ui.translate[id]&&ui.translate[id].text)||drafts[id]||"").trim();
  if(!text){alert("먼저 영어로 답안을 작성해 주세요.");return;}
  if(!state.aiEndpoint){state.tab="dash";saveSettings();renderAll();return;}
  callFeedback(id,w.prompt_ko,text,w.answer_en);
}
function requestComboFeedback(topic,stage){
  const c=COMBO[topic];if(!c)return;
  const q=c[["describe","routine","experience"][stage]];
  const comboId="combo:"+topic+":"+stage;
  const text=((ui.translate[comboId]&&ui.translate[comboId].text)||drafts[comboId]||"").trim();
  if(!text){alert("먼저 영어로 답안을 작성해 주세요.");return;}
  if(!state.aiEndpoint){state.tab="dash";saveSettings();renderAll();return;}
  callFeedback(comboId,q.ko+" / "+q.en,text,"");
}
function requestMockFeedback(topic){
  const c=COMBO[topic];if(!c)return;
  const order=["describe","routine","experience"],labels=["묘사","루틴","경험"];
  const parts=order.map((k,i)=>{const id="combo:"+topic+":"+i;return {q:c[k],a:((ui.translate[id]&&ui.translate[id].text)||drafts[id]||"").trim()};});
  if(parts.every(p=>!p.a)){alert("먼저 답변을 작성해 주세요.");return;}
  if(!state.aiEndpoint){state.tab="dash";saveSettings();renderAll();return;}
  const prompt_ko=parts.map((p,i)=>`${labels[i]}: ${p.q.ko}`).join("\n");
  const answer=parts.map((p,i)=>`[${labels[i]}] Q: ${p.q.en}\nA: ${p.a||"(빈칸)"}`).join("\n\n");
  callFeedback("mock:"+topic,prompt_ko,answer,"");
}
document.body.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]");if(!el)return;
  const a=el.getAttribute("data-action");
  if(el.hasAttribute("data-stop")||["fav","mem"].includes(a))e.stopPropagation();
  captureInputs();
  switch(a){
    case "theme": state.theme=state.theme==="dark"?"light":"dark";saveSettings();applyTheme();break;
    case "tab": state.tab=el.dataset.tab;state.revealed=false;saveSettings();break;
    case "topic": state.topic=el.dataset.topic;state.vocabPos=0;state.patternPos=0;state.writingPos=0;state.comboStage=0;state.revealed=false;ui.quiz.active=false;ui.quiz.finished=false;setReadingPos(0);saveSettings();break;

    /* 단어 */
    case "flip": state.revealed=!state.revealed;break;
    case "toggle-hide": state.hideMeaning=!state.hideMeaning;state.revealed=false;break;
    case "prev": state.vocabPos=Math.max(0,state.vocabPos-1);state.revealed=false;break;
    case "next": state.vocabPos=Math.min(byTopic(DATA.vocab).length-1,state.vocabPos+1);state.revealed=false;break;
    case "fav":{const f=el.dataset.fid;favorites.has(f)?favorites.delete(f):favorites.add(f);saveFav();break;}
    case "mem":{const f=el.dataset.fid;memorized.has(f)?memorized.delete(f):(memorized.add(f),touchDay(),addXP(5));saveMem();break;}

    /* 문장 네비 */
    case "pat-prev": state.patternPos=Math.max(0,state.patternPos-1);break;
    case "pat-next": state.patternPos=Math.min(byTopic(DATA.patterns).length-1,state.patternPos+1);break;
    /* 작문 네비 */
    case "write-prev": state.writingPos=Math.max(0,state.writingPos-1);break;
    case "write-next": state.writingPos=Math.min(byTopic(DATA.writing).length-1,state.writingPos+1);break;
    /* 독해 지문/문제 네비 */
    case "read-prev": setReadingPos(state.readingPos-1);break;
    case "read-next": case "read-passnext": setReadingPos(state.readingPos+1);break;
    case "read-qnext":{const rl=byTopic(DATA.reading);const rr=rl[state.readingPos];if(!rr)break;state.readingQPos=Math.min(rr.questions.length-1,state.readingQPos+1);break;}

    /* 독해 */
    case "gloss":{const k=el.dataset.key;ui.glossOpen.has(k)?ui.glossOpen.delete(k):ui.glossOpen.add(k);break;}
    case "toggle-ko":{const k="ko-"+el.dataset.rid;ui.glossOpen.has(k)?ui.glossOpen.delete(k):ui.glossOpen.add(k);break;}
    case "answer":{
      const key=el.dataset.key;
      if(progress.reading[key]==null){
        const chosen=+el.dataset.oi,r=DATA.reading.find(x=>x.id===el.dataset.rid);
        const correct=chosen===r.questions[+el.dataset.qi].answer;
        progress.reading[key]={chosen,correct};saveProgress();bumpQuestion();
      }break;
    }

    /* 작문 */
    case "arr-add":{const id=el.dataset.id;ui.arrange[id]=ui.arrange[id]||[];ui.arrange[id].push(+el.dataset.i);ui.arrange[id+"_done"]=false;break;}
    case "arr-del":{const id=el.dataset.id;if(!ui.arrange[id])break;ui.arrange[id].splice(+el.dataset.pos,1);ui.arrange[id+"_done"]=false;break;}
    case "arr-check":{
      const id=el.dataset.id,w=DATA.writing.find(x=>x.id===id);
      ui.arrange[id+"_done"]=true;
      const ok=normalize((ui.arrange[id]||[]).map(i=>w.words[i]).join(" "))===normalize(w.answer_en);
      if(!progress.writing[id])bumpQuestion();
      progress.writing[id]={done:true,correct:ok};saveProgress();break;
    }
    case "arr-reset":{const id=el.dataset.id;ui.arrange[id]=[];ui.arrange[id+"_done"]=false;break;}
    case "blank-pick":{
      const id=el.dataset.id,w=DATA.writing.find(x=>x.id===id);
      if(ui.blank[id]==null){
        const oi=+el.dataset.oi;ui.blank[id]=oi;
        if(!progress.writing[id])bumpQuestion();
        progress.writing[id]={done:true,correct:w.options[oi]===w.answer};saveProgress();
      }break;
    }
    case "blank-reset": delete ui.blank[el.dataset.id];break;
    case "trans-show":{
      const id=el.dataset.id;ui.translate[id]=ui.translate[id]||{text:"",show:false};ui.translate[id].show=true;
      if(!progress.writing[id]){progress.writing[id]={done:true,correct:null};saveProgress();bumpQuestion();}
      break;
    }
    case "ai-feedback": requestFeedback(el.dataset.id);break;   // 비동기 — 내부에서 다시 렌더
    case "copy-answer":{
      const id=el.dataset.id,txt=(ui.translate[id]&&ui.translate[id].text||"").trim();
      if(!txt){alert("먼저 영어로 답안을 작성해 주세요.");return;}
      const w=DATA.writing.find(x=>x.id===id);
      const payload=`다음 OPIc 한→영 작문을 첨삭해줘.\n[한국어] ${w.prompt_ko}\n[내 답안] ${txt}`;
      try{navigator.clipboard.writeText(payload).then(()=>alert("답안이 복사됐어요. 채팅에 붙여넣어 첨삭을 요청하세요."),()=>alert(payload));}
      catch(e){alert(payload);}
      return;
    }
    case "save-endpoint":{
      const inp=document.getElementById("aiEndpointInput");
      const v=inp?inp.value.trim():"";
      if(v&&!/^https?:\/\//i.test(v)){alert("http:// 또는 https:// 로 시작하는 주소를 입력해 주세요.");return;}
      state.aiEndpoint=v;saveSettings();
      alert(v?"첨삭 서버가 등록됐어요.":"첨삭 서버 주소를 비웠어요.");
      break;
    }

    /* 말하기 콤보 */
    case "combo-go": state.comboStage=Math.max(0,Math.min(2,+el.dataset.i));break;
    case "combo-prev": state.comboStage=Math.max(0,state.comboStage-1);break;
    case "combo-next": state.comboStage=Math.min(2,state.comboStage+1);break;
    case "combo-feedback": requestComboFeedback(state.topic,state.comboStage);break;
    case "combo-copy":{
      const c=COMBO[state.topic];if(!c)return;
      const q=c[["describe","routine","experience"][state.comboStage]];
      const comboId="combo:"+state.topic+":"+state.comboStage;
      const txt=((ui.translate[comboId]&&ui.translate[comboId].text)||drafts[comboId]||"").trim();
      if(!txt){alert("먼저 영어로 답안을 작성해 주세요.");return;}
      const payload=`다음 OPIc 답변을 첨삭해줘.\n[질문] ${q.en}\n[내 답변] ${txt}`;
      try{navigator.clipboard.writeText(payload).then(()=>alert("답안이 복사됐어요. 채팅에 붙여넣어 첨삭을 요청하세요."),()=>alert(payload));}
      catch(e){alert(payload);}
      return;
    }
    case "combo-mode": ui.comboMode=el.dataset.mode==="mock"?"mock":"step";break;
    case "mock-feedback": requestMockFeedback(state.topic);break;
    case "mock-copy":{
      const c=COMBO[state.topic];if(!c)return;
      const order=["describe","routine","experience"],labels=["묘사","루틴","경험"];
      const parts=order.map((k,i)=>{const id="combo:"+state.topic+":"+i;return {q:c[k],a:((ui.translate[id]&&ui.translate[id].text)||drafts[id]||"").trim()};});
      if(parts.every(p=>!p.a)){alert("먼저 답변을 작성해 주세요.");return;}
      const payload="다음 OPIc 모의 인터뷰 답변(묘사→루틴→경험)을 종합 첨삭해줘.\n\n"+parts.map((p,i)=>`[${labels[i]}] ${p.q.en}\n${p.a||"(빈칸)"}`).join("\n\n");
      try{navigator.clipboard.writeText(payload).then(()=>alert("답변이 복사됐어요. 채팅에 붙여넣어 첨삭을 요청하세요."),()=>alert(payload));}
      catch(e){alert(payload);}
      return;
    }

    /* 복습 세그먼트 + SRS */
    case "rseg": state.reviewSeg=el.dataset.seg;ui.quiz.active=false;ui.quiz.finished=false;break;
    case "quiz-start":{
      const qitems=buildQuiz();
      if(!qitems.length){ui.quiz.active=false;ui.quiz.finished=false;break;}
      ui.quiz={active:true,finished:false,items:qitems,pos:0,stage:"input",text:{},results:[],correct:0,lastCorrect:false};break;
    }
    case "quiz-check":{
      const q=ui.quiz,it=q.items[q.pos],t=(q.text[q.pos]||"").trim();
      if(!it)break;
      if(it.type==="blank"){
        const ok=normalize(t)===normalize(it.answer);q.lastCorrect=ok;
        q.results.push({type:it.type,prompt:it.prompt,answer:it.answer,user:t,correct:ok});
        if(ok)q.correct++; if(it.fid)srsRate(it.fid,ok); bumpQuestion();
      }
      q.stage="checked";break;
    }
    case "quiz-mark":{
      const q=ui.quiz,it=q.items[q.pos],t=(q.text[q.pos]||"").trim(),ok=el.dataset.correct==="1";
      if(!it)break;
      q.results.push({type:it.type,prompt:it.prompt,answer:it.answer,user:t,correct:ok});
      if(ok)q.correct++; if(it.fid)srsRate(it.fid,ok); bumpQuestion();
      q.pos++;q.stage="input"; if(q.pos>=q.items.length){q.active=false;q.finished=true;ui.celebrate=true;}
      break;
    }
    case "quiz-next":{
      const q=ui.quiz;q.pos++;q.stage="input"; if(q.pos>=q.items.length){q.active=false;q.finished=true;ui.celebrate=true;}
      break;
    }
    case "srs-start":{
      const due=shuffle(dueFids());
      ui.review={active:true,finished:false,queue:due,total:due.length,revealed:false,count:0};break;
    }
    case "srs-reveal": ui.review.revealed=true;break;
    case "srs-rate":{
      const r=ui.review,fid=r.queue[0],good=el.dataset.good==="1";
      srsRate(fid,good);bumpReview();r.count++;r.revealed=false;
      r.queue.shift();
      if(!good)r.queue.push(fid);              // 모르면 이번 세션 뒤쪽에 다시 등장
      if(!r.queue.length){r.active=false;r.finished=true;}
      break;
    }
    case "srs-exit": ui.review={active:false,finished:false,queue:[],total:0,revealed:false,count:0};state.tab="dash";saveSettings();break;

    /* 오답노트 제거 */
    case "wrong-clear":{
      if(el.dataset.kind==="reading")delete progress.reading[el.dataset.key];
      else delete progress.writing[el.dataset.key];
      saveProgress();break;
    }

    /* 대시보드 */
    case "set-goal": state.dailyGoal=+el.dataset.n;saveSettings();break;
    case "set-weekly": state.weeklyGoal=+el.dataset.n;saveSettings();break;
    case "set-textsize": state.textSize=el.dataset.size;saveSettings();applyTextSize();break;
    case "toggle-sec": state.dashSections[el.dataset.sec]=!state.dashSections[el.dataset.sec];saveSettings();break;
    case "study-topic": state.topic=el.dataset.topic;state.tab="vocab";state.vocabPos=0;state.patternPos=0;state.writingPos=0;state.comboStage=0;state.revealed=false;ui.quiz.active=false;ui.quiz.finished=false;setReadingPos(0);saveSettings();break;
    case "goto-tab": state.tab=el.dataset.tab;saveSettings();break;
    case "goto-review": state.tab="review";state.reviewSeg="srs";saveSettings();break;
    case "reset-data":
      if(confirm("즐겨찾기·암기·복습·통계 기록을 모두 지울까요?")){
        store.clear();favorites=new Set();memorized=new Set();srs={};progress={reading:{},writing:{}};
        stats={streak:0,lastDay:null,days:{}};drafts={};feedback={};xp=0;saveXp();badges=new Set();saveBadges();
        ui.arrange={};ui.blank={};ui.translate={};ui.glossOpen=new Set();ui.fbLoading={};ui.fbError={};
        ui.review={active:false,finished:false,queue:[],total:0,revealed:false,count:0};
        ui.quiz={active:false,finished:false,items:[],pos:0,stage:"input",text:{},results:[],correct:0,lastCorrect:false};
        state.topic="all";state.vocabPos=0;state.patternPos=0;state.writingPos=0;state.readingPos=0;state.readingQPos=0;state.comboStage=0;
      }else return;
      break;
    default: return;
  }
  renderAll();
});
document.body.addEventListener("input",e=>{

    ui.translate[id]=ui.translate[id]||{text:"",show:false};ui.translate[id].text=e.target.value;
    drafts[id]=e.target.value;saveDrafts();   // 타이핑 즉시 저장
  }
  if(e.target.classList.contains("quiz-input")){
    ui.quiz.text[e.target.getAttribute("data-qpos")]=e.target.value;
  }
});

applyTheme();

  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
